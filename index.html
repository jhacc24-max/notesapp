<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>notapp v43</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#000020" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="notapp" />
  <link rel="apple-touch-icon" id="apple-touch-icon" />
  <link rel="manifest" id="pwa-manifest" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: #050a10;
      font-family: 'Outfit', sans-serif;
      /* Deshabilitar selección de texto y traducción automática */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* Permitir selección en áreas de edición y contenido de notas */
    input, textarea, [contenteditable],
    .note-content, p, span, li, blockquote,
    h1, h2, h3, h4, h5, h6 {
      -webkit-user-select: text;
      -moz-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-10px);} to {opacity:1;transform:translateY(0);} }
    ::-webkit-scrollbar-thumb { background: #00f0ff30; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
  <script>
    const manifest = {name:"notapp",short_name:"notapp",start_url:"./",display:"standalone",background_color:"#050a10",theme_color:"#050a10",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000020'/%3E%3Ctext y='.9em' font-size='80'%3E📝%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
    const blob = new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    document.getElementById("pwa-manifest").setAttribute("href",URL.createObjectURL(blob));
    if("serviceWorker" in navigator){
    // ── Update manifest icon and apple-touch-icon with actual app icon after load
    window.addEventListener('load', function() {
      if (typeof ICON_SRC !== 'undefined') {
        const updatedManifest = {name:"notapp",short_name:"notapp",start_url:"./",display:"standalone",background_color:"#050a10",theme_color:"#050a10",icons:[{src:ICON_SRC,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
        const mb = new Blob([JSON.stringify(updatedManifest)],{type:"application/manifest+json"});
        document.getElementById("pwa-manifest").setAttribute("href",URL.createObjectURL(mb));
        const ai = document.getElementById("apple-touch-icon");
        if (ai) ai.setAttribute("href", ICON_SRC);
      }
    });
      // ── Registrar el Service Worker (offline + click en notificación local)
      navigator.serviceWorker.register('./sw.js').then(reg=>{
        window.__swReg = reg;
      }).catch(()=>{});
      window.__swReady = navigator.serviceWorker.ready;

      // ══════════════════════════════════════════════════════════════
      // TELEGRAM — recordatorios reales vía un Worker de Cloudflare que
      // hace de "reloj" (cron cada 1 min) y manda el aviso por Telegram.
      // Reemplazá esto por la URL real de tu Worker (PASOS-TELEGRAM.md).
      // ══════════════════════════════════════════════════════════════
      window.__REMINDERS_API = "https://notapp-reminders.javcabcal2026.workers.dev";

      window.__telegramConnect = function(chatId){
        if(!chatId || !/^-?\d+$/.test(String(chatId).trim())) return false;
        localStorage.setItem("telegram_chat_id", String(chatId).trim());
        return true;
      };
      window.__telegramDisconnect = function(){
        localStorage.removeItem("telegram_chat_id");
      };
      window.__telegramChatId = function(){
        return localStorage.getItem("telegram_chat_id");
      };

      // Crea, actualiza o borra el recordatorio en el Worker según el estado de la nota.
      window.__reminderSyncCache = window.__reminderSyncCache || {};
      window.__syncReminderToCloud = async function(note){
        try{
          const active = !!note.reminder && !note.archived && !note.deleted;
          const cache = window.__reminderSyncCache;
          const fingerprint = active ? `${note.reminder}|${note.recurrence||"once"}|${note.title}` : "none";
          if(cache[note.id] === fingerprint) return null; // sin cambios

          if(window.__REMINDERS_API === "__TU_WORKER_URL__") return null; // falta configurar

          if(!active){
            cache[note.id] = fingerprint;
            await fetch(`${window.__REMINDERS_API}/reminder?noteId=${encodeURIComponent(note.id)}`, { method:"DELETE" }).catch(()=>{});
            return null;
          }
          const chatId = window.__telegramChatId();
          if(!chatId) return null; // el usuario no conectó Telegram todavía

          const res = await fetch(`${window.__REMINDERS_API}/reminder`, {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              chatId,
              noteId: note.id,
              title: note.title || "Nota sin título",
              text: note.content ? note.content.slice(0,300) : "",
              fireAt: new Date(note.reminder).getTime(),
              recurrence: note.recurrence || "once",
            }),
          });
          if(!res.ok){
            console.error("El Worker respondió con error:", res.status, await res.text());
            return null;
          }
          cache[note.id] = fingerprint;
          return null; // no necesitamos guardar un id de evento, el Worker usa note.id
        }catch(e){ console.error("No se pudo sincronizar el recordatorio con el Worker:", e); return null; }
      };
    }
    // ── Menú contextual personalizado al seleccionar texto
    document.addEventListener("contextmenu", e => e.preventDefault());
    // ── Capturar prompt de instalación PWA (Android Chrome)
    window.__pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window.__pwaInstallPrompt = e;
    });
    window.addEventListener('appinstalled', () => {
      window.__pwaInstallPrompt = null;
    });
    document.addEventListener("selectstart", e => {
      if(!["INPUT","TEXTAREA"].includes(e.target.tagName) && !e.target.isContentEditable) e.preventDefault();
    });

    // ══════════════════════════════════════════════════════
    // PORTAPAPELES GLOBAL — persiste entre notas durante la sesión
    // ══════════════════════════════════════════════════════
    window.__MYO_CLIPBOARD__ = { text: "", ts: 0 };

    (function(){
      let selMenu  = null;
      let pasteBar = null;
      let lastTarget = null;
      let lastCursorPos = -1;

      // window.getSelection() NO funciona para <textarea>/<input> — el texto
      // seleccionado ahí vive en un modelo aparte (el.selectionStart/End).
      // Esta función mide la posición real usando un "espejo" invisible del
      // textarea con la misma tipografía, para ubicar el menú justo ahí.
      function getFieldSelectionRect(el){
        const style=window.getComputedStyle(el);
        const div=document.createElement("div");
        ["fontFamily","fontSize","fontWeight","fontStyle","letterSpacing","lineHeight","padding","borderWidth","boxSizing","textTransform"].forEach(p=>{div.style[p]=style[p];});
        div.style.position="absolute";
        div.style.visibility="hidden";
        div.style.whiteSpace="pre-wrap";
        div.style.wordWrap="break-word";
        div.style.width=el.clientWidth+"px";
        div.style.top="0px"; div.style.left="-9999px";

        const start=el.selectionStart||0, end=el.selectionEnd||0;
        const mid=Math.round((start+end)/2);
        div.textContent=el.value.substring(0,mid);
        const marker=document.createElement("span");
        marker.textContent=el.value.substring(mid,mid+1)||".";
        div.appendChild(marker);
        document.body.appendChild(div);

        const elRect=el.getBoundingClientRect();
        const divRect=div.getBoundingClientRect();
        const markerRect=marker.getBoundingClientRect();
        const relTop=markerRect.top-divRect.top;
        const relLeft=markerRect.left-divRect.left;
        document.body.removeChild(div);

        return {
          x: elRect.left + relLeft - el.scrollLeft,
          y: elRect.top + relTop - el.scrollTop,
        };
      }

      const CB = () => window.__MYO_CLIPBOARD__;

      function setClip(txt){
        window.__MYO_CLIPBOARD__ = { text: txt, ts: Date.now() };
        try { navigator.clipboard.writeText(txt); } catch(e){}
        showPasteBar();
      }

      function clearClip(){
        window.__MYO_CLIPBOARD__ = { text: "", ts: 0 };
        hidePasteBar();
      }

      function showPasteBar(){
        if(pasteBar) pasteBar.remove();
        const txt = CB().text;
        if(!txt) return;
        pasteBar = document.createElement("div");
        pasteBar.id = "__paste_bar__";
        const preview = txt.length > 36 ? txt.slice(0,36)+"…" : txt;
        Object.assign(pasteBar.style, {
          position:"fixed", bottom:"80px", left:"50%",
          transform:"translateX(-50%)", zIndex:"99998",
          display:"flex", alignItems:"center", gap:"8px",
          background:"rgba(5,12,24,0.97)",
          border:"1px solid rgba(0,240,255,0.45)",
          borderRadius:"14px", padding:"8px 12px",
          boxShadow:"0 6px 28px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,240,255,0.10)",
          backdropFilter:"blur(16px)",
          fontFamily:"'Outfit', sans-serif", fontSize:"13px", fontWeight:"500",
          color:"#9BAED4", maxWidth:"calc(100vw - 32px)",
          userSelect:"none", WebkitUserSelect:"none",
          animation:"pbSlideIn 0.2s ease",
        });
        if(!document.getElementById("__pb_style__")){
          const s = document.createElement("style");
          s.id = "__pb_style__";
          s.textContent = "@keyframes pbSlideIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}";
          document.head.appendChild(s);
        }
        const icon = document.createElement("span");
        icon.textContent = "📋"; icon.style.fontSize = "16px";
        pasteBar.appendChild(icon);
        const label = document.createElement("span");
        label.textContent = `"${preview}"`;
        Object.assign(label.style, {flex:"1",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",color:"#9BAED4",fontSize:"12px",maxWidth:"140px"});
        pasteBar.appendChild(label);
        const sep = document.createElement("div");
        Object.assign(sep.style, {width:"1px",height:"18px",background:"rgba(0,240,255,0.18)",margin:"0 2px",flexShrink:"0"});
        pasteBar.appendChild(sep);
        const btnPaste = mkBtn("Pegar","#00f0ff", () => {
          const target = lastTarget || document.activeElement;
          const clipTxt = CB().text;
          if(!clipTxt) return;
          if(target && (["INPUT","TEXTAREA"].includes(target.tagName))){
            const pos = (target===lastTarget && lastCursorPos>=0) ? lastCursorPos : (target.selectionEnd??target.value.length);
            target.value = target.value.slice(0,pos)+clipTxt+target.value.slice(pos);
            target.selectionStart = target.selectionEnd = pos+clipTxt.length;
            target.focus();
            target.dispatchEvent(new Event("input",{bubbles:true}));
          } else if(target && target.isContentEditable){
            target.focus();
            const s2=window.getSelection();
            if(s2&&s2.rangeCount){const r=s2.getRangeAt(0);r.collapse(false);s2.removeAllRanges();s2.addRange(r);}
            document.execCommand("insertText",false,clipTxt);
          } else {
            try{navigator.clipboard.writeText(clipTxt);}catch(e){}
            alert("Haz clic donde quieres pegar y usa Ctrl+V / ⌘V");
          }
        });
        pasteBar.appendChild(btnPaste);
        const btnClear = mkBtn("✕","#8AACDC", ()=>clearClip());
        btnClear.style.padding="5px 8px"; btnClear.style.border="none";
        pasteBar.appendChild(btnClear);
        document.body.appendChild(pasteBar);
      }

      function hidePasteBar(){
        if(pasteBar){ pasteBar.remove(); pasteBar=null; }
      }

      function mkBtn(label,color,action){
        const b=document.createElement("button");
        b.textContent=label;
        Object.assign(b.style,{
          background:"none",border:"1px solid rgba(0,240,255,0.22)",
          cursor:"pointer",padding:"5px 11px",borderRadius:"8px",
          color:color,fontFamily:"'Outfit',sans-serif",
          fontSize:"13px",fontWeight:"600",
          transition:"background 0.12s",flexShrink:"0",
        });
        b.onmouseenter=()=>b.style.background="rgba(0,240,255,0.10)";
        b.onmouseleave=()=>b.style.background="none";
        b.onmousedown=e=>{e.preventDefault();e.stopPropagation();};
        b.onclick=e=>{e.preventDefault();e.stopPropagation();action();};
        return b;
      }

      // Track last editable & cursor
      document.addEventListener("focusin",e=>{
        const el=e.target;
        if(el&&(["INPUT","TEXTAREA"].includes(el.tagName)||el.isContentEditable)){lastTarget=el;}
      });
      document.addEventListener("keyup",e=>{
        const el=e.target;
        if(el&&["INPUT","TEXTAREA"].includes(el.tagName)){lastCursorPos=el.selectionStart??-1;}
      });
      document.addEventListener("click",e=>{
        const el=e.target;
        if(el&&["INPUT","TEXTAREA"].includes(el.tagName)){lastCursorPos=el.selectionStart??-1;}
      });

      // ── Menú de selección flotante
      function removeSelMenu(){
        if(selMenu){selMenu.remove();selMenu=null;}
      }

      function showSelMenu(x,y,selectedText,target){
        removeSelMenu();
        const isEditable=target&&(["INPUT","TEXTAREA"].includes(target.tagName)||target.isContentEditable);
        selMenu=document.createElement("div");
        selMenu.id="__sel_menu__";
        Object.assign(selMenu.style,{
          position:"fixed",left:"0px",top:"0px",
          zIndex:"99999",display:"flex",flexDirection:"row",
          alignItems:"center",gap:"2px",
          background:"rgba(8,15,28,0.97)",
          border:"1px solid rgba(0,240,255,0.25)",
          borderRadius:"11px",padding:"4px 6px",
          boxShadow:"0 4px 24px rgba(0,0,0,0.75), 0 0 0 1px rgba(0,240,255,0.08)",
          backdropFilter:"blur(14px)",
          fontFamily:"'Outfit',sans-serif",
          userSelect:"none",WebkitUserSelect:"none",
          pointerEvents:"auto",
          transition:"opacity 0.12s ease",opacity:"0",
        });

        const sbtn=(label,icon,color,action)=>{
          const b=document.createElement("button");
          b.innerHTML=`<span style="font-size:14px;line-height:1">${icon}</span><span style="margin-left:4px;color:${color}">${label}</span>`;
          Object.assign(b.style,{
            display:"flex",alignItems:"center",gap:"2px",
            background:"none",border:"none",cursor:"pointer",
            padding:"5px 9px",borderRadius:"7px",
            color:"#DCE2F9",fontFamily:"inherit",
            fontSize:"13px",fontWeight:"600",
            transition:"background 0.12s",
          });
          b.onmouseenter=()=>b.style.background="rgba(0,240,255,0.10)";
          b.onmouseleave=()=>b.style.background="none";
          b.onmousedown=e=>{e.preventDefault();e.stopPropagation();};
          b.onclick=e=>{e.preventDefault();e.stopPropagation();action();removeSelMenu();};
          return b;
        };

        const ssep=()=>{
          const d=document.createElement("div");
          Object.assign(d.style,{width:"1px",height:"18px",background:"rgba(0,240,255,0.15)",margin:"0 2px",flexShrink:"0"});
          return d;
        };

        // Copiar
        selMenu.appendChild(sbtn("Copiar","📋","#00f0ff",()=>setClip(selectedText)));

        // Cortar
        if(isEditable){
          selMenu.appendChild(ssep());
          selMenu.appendChild(sbtn("Cortar","✂️","#f7c948",()=>{
            setClip(selectedText);
            const el=target;
            if(el.tagName==="INPUT"||el.tagName==="TEXTAREA"){
              const s=el.selectionStart,e2=el.selectionEnd;
              el.value=el.value.slice(0,s)+el.value.slice(e2);
              el.selectionStart=el.selectionEnd=s; lastCursorPos=s;
              el.dispatchEvent(new Event("input",{bubbles:true}));
            } else if(el.isContentEditable){document.execCommand("delete");}
          }));
        }

        // Duplicar aquí mismo
        if(isEditable){
          selMenu.appendChild(ssep());
          selMenu.appendChild(sbtn("Duplicar","📋↩","#6feab1",()=>{
            const txt=selectedText; setClip(txt);
            const el=target;
            if(el.tagName==="INPUT"||el.tagName==="TEXTAREA"){
              const s=el.selectionStart,e2=el.selectionEnd;
              el.value=el.value.slice(0,e2)+txt+el.value.slice(e2);
              el.selectionStart=el.selectionEnd=e2+txt.length; lastCursorPos=e2+txt.length;
              el.dispatchEvent(new Event("input",{bubbles:true}));
            } else if(el.isContentEditable){
              const s2=window.getSelection();
              if(s2&&s2.rangeCount){const r=s2.getRangeAt(0);r.collapse(false);s2.removeAllRanges();s2.addRange(r);}
              document.execCommand("insertText",false,txt);
            }
          }));
        }

        // Pegar portapapeles interno
        if(isEditable&&CB().text){
          selMenu.appendChild(ssep());
          const prev=CB().text.length>14?CB().text.slice(0,14)+"…":CB().text;
          selMenu.appendChild(sbtn(`Pegar "${prev}"`,"📥","#a78bfa",()=>{
            const clipTxt=CB().text; const el=target;
            if(el.tagName==="INPUT"||el.tagName==="TEXTAREA"){
              const s=el.selectionStart,e2=el.selectionEnd;
              el.value=el.value.slice(0,s)+clipTxt+el.value.slice(e2);
              el.selectionStart=el.selectionEnd=s+clipTxt.length; lastCursorPos=s+clipTxt.length;
              el.dispatchEvent(new Event("input",{bubbles:true}));
            } else if(el.isContentEditable){document.execCommand("insertText",false,clipTxt);}
          }));
        }

        document.body.appendChild(selMenu);
        const mw=selMenu.offsetWidth||260, mh=selMenu.offsetHeight||42;
        let left=x-mw/2, top=y-mh-10;
        if(left<6) left=6;
        if(left+mw>window.innerWidth-6) left=window.innerWidth-mw-6;
        if(top<6) top=y+26;
        selMenu.style.left=left+"px"; selMenu.style.top=top+"px";
        requestAnimationFrame(()=>{if(selMenu)selMenu.style.opacity="1";});
      }

      function onSelEnd(e){
        if(selMenu&&selMenu.contains(e.target)) return;
        if(pasteBar&&pasteBar.contains(e.target)) return;
        setTimeout(()=>{
          const active=document.activeElement;
          const isField=active&&["TEXTAREA","INPUT"].includes(active.tagName);
          if(isField){
            const txt=active.value.substring(active.selectionStart,active.selectionEnd).trim();
            if(!txt){removeSelMenu();return;}
            const pos=getFieldSelectionRect(active);
            showSelMenu(pos.x,pos.y,txt,active);
            return;
          }
          const sel=window.getSelection();
          const txt=sel?sel.toString().trim():"";
          if(!txt){removeSelMenu();return;}
          if(!sel.rangeCount) return;
          const rect=sel.getRangeAt(0).getBoundingClientRect();
          const cx=(rect.left+rect.right)/2, cy=rect.top;
          showSelMenu(cx,cy,txt,document.activeElement||e.target);
        },10);
      }

      document.addEventListener("mouseup",onSelEnd);
      document.addEventListener("touchend",e=>{
        if(selMenu&&selMenu.contains(e.target)) return;
        if(pasteBar&&pasteBar.contains(e.target)) return;
        setTimeout(()=>{
          const active=document.activeElement;
          const isField=active&&["TEXTAREA","INPUT"].includes(active.tagName);
          if(isField){
            const txt=active.value.substring(active.selectionStart,active.selectionEnd).trim();
            if(!txt){removeSelMenu();return;}
            const pos=getFieldSelectionRect(active);
            showSelMenu(pos.x,pos.y,txt,active);
            return;
          }
          const sel=window.getSelection();
          const txt=sel?sel.toString().trim():"";
          if(!txt){removeSelMenu();return;}
          if(!sel.rangeCount) return;
          const rect=sel.getRangeAt(0).getBoundingClientRect();
          const cx=(rect.left+rect.right)/2, cy=rect.top;
          const tp=e.changedTouches[0];
          showSelMenu(cx,cy,txt,document.activeElement||(tp?document.elementFromPoint(tp.clientX,tp.clientY):null));
        },80);
      },{passive:true});

      document.addEventListener("mousedown",e=>{
        if(selMenu&&!selMenu.contains(e.target)) removeSelMenu();
      });
      document.addEventListener("keydown",e=>{
        if(e.key==="Escape") removeSelMenu();
        if((e.ctrlKey||e.metaKey)&&(e.key==="c"||e.key==="x")) setTimeout(removeSelMenu,200);
      });
      document.addEventListener("selectionchange",()=>{
        const sel=window.getSelection();
        if(!sel||!sel.toString().trim()) removeSelMenu();
      });

    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ── CONSTANTS
const ACCENT = "#00f0ff";
const ACCENT2 = "#7c3aed";

// ── Enlaces bi-direccionales: detecta con precisión "[[Título exacto]]" en un
// texto (a diferencia de una simple búsqueda de substring, evita falsos positivos).
const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
const notesLinkTo = (title, content) => {
  if(!title || title.trim().length<2 || !content) return false;
  return new RegExp("\\[\\["+escapeRegex(title.trim())+"\\]\\]","i").test(content);
};

// Convierte "[[Título]]" dentro de un texto en spans clickeables (solo para
// vistas de solo-lectura, como Zen — un textarea no puede renderizar esto).
const renderLinkedText = (content, notes, onOpenNote) => {
  if(!content) return null;
  const re = /\[\[([^\]\n]+)\]\]/g;
  const parts = []; let lastIndex = 0, m, key = 0;
  while((m = re.exec(content)) !== null){
    if(m.index > lastIndex) parts.push(React.createElement("span", {key:key++}, content.slice(lastIndex, m.index)));
    const target = notes && notes.find(n => (n.title||"").toLowerCase() === m[1].trim().toLowerCase());
    parts.push(
      React.createElement("span", {
        key:key++,
        className:"zen-link"+(target?"":" zen-link-missing"),
        onClick: target && onOpenNote ? ()=>onOpenNote(target) : undefined,
        title: target ? "Ir a \""+m[1].trim()+"\"" : "No existe una nota con ese título",
      }, "🔗 "+m[1].trim())
    );
    lastIndex = re.lastIndex;
  }
  if(lastIndex < content.length) parts.push(React.createElement("span", {key:key++}, content.slice(lastIndex)));
  return parts;
};

// ── Negrita/cursiva/tachado SIN símbolos de marcado (**, _, ~~): convierte el
// texto directamente a caracteres Unicode con el estilo ya aplicado. Se ve
// bien en cualquier lado (textarea, Zen, pegado afuera) sin necesitar render.
const BOLD_MAP = {}, ITALIC_MAP = {};
"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach((c,i)=>{ BOLD_MAP[c]=String.fromCodePoint(0x1D400+i); ITALIC_MAP[c]=String.fromCodePoint(0x1D434+i); });
"abcdefghijklmnopqrstuvwxyz".split("").forEach((c,i)=>{ BOLD_MAP[c]=String.fromCodePoint(0x1D41A+i); ITALIC_MAP[c]=String.fromCodePoint(0x1D44E+i); });
"0123456789".split("").forEach((c,i)=>{ BOLD_MAP[c]=String.fromCodePoint(0x1D7CE+i); });
ITALIC_MAP["h"] = "\u210E"; // excepción real de Unicode: la 'h' cursiva minúscula vive en otro bloque (símbolo de Planck)

const toUnicodeStyle = (text, style) => {
  return text.split("").map(ch=>{
    let out = ch;
    if(style==="bold") out = BOLD_MAP[ch] || ch;
    else if(style==="italic") out = ITALIC_MAP[ch] || ch;
    if(style==="strike") out = ch + "\u0336";
    return out;
  }).join("");
};

// Para vistas previa en texto plano (no interactivas): saca los corchetes de
// [[Título]] dejando solo el texto, sin convertirlo en elemento clickeable.
const stripLinkSyntax = (text) => (text||"").replace(/\[\[/g,"").replace(/\]\]/g,"");

const evalMath = (text) => {
  return text.replace(/(\d[\d\s\+\-\*\/\.\(\)%]*=)/g, (match) => {
    try {
      const expr = match.slice(0,-1).trim();
      if(/[a-zA-Z]/.test(expr)) return match;
      const r = Function('"use strict";return ('+expr+')')(  );
      if(typeof r === 'number' && isFinite(r)) return match + ' ' + (Number.isInteger(r)?r:r.toFixed(2));
    } catch {}
    return match;
  });
};

const autoDetectInfo = (text) => {
  const tags = [];
  const lower = text.toLowerCase();
  Object.entries(AUTO_TAGS).forEach(([tag, kws]) => {
    if(kws.some(kw => lower.includes(kw))) tags.push(tag);
  });
  // Date/time detection
  const timeMatch = text.match(/(\d{1,2})\s*(?:am|pm|h|hrs?)/i);
  const dateWords = ["mañana","hoy","lunes","martes","miércoles","jueves","viernes","sábado","domingo"];
  const hasDate = dateWords.some(d => lower.includes(d));
  let reminder = null;
  if(timeMatch && hasDate) {
    let h = parseInt(timeMatch[1]);
    if(text.toLowerCase().includes("pm") && h < 12) h += 12;
    const d = new Date();
    if(lower.includes("mañana")) d.setDate(d.getDate()+1);
    d.setHours(h,0,0,0);
    reminder = d.toISOString();
  }
  return { tags, reminder };
};

const fillTemplate = (text) => {
  const d = new Date();
  return text
    .replace(/\{\{fecha\}\}/g, d.toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}))
    .replace(/\{\{hora\}\}/g, d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}))
    .replace(/\{\{año\}\}/g, d.getFullYear());
};

// ── CONFETTI
function Confetti({ onDone }) {
  const pieces = Array.from({length:18},(_,i)=>({
    id:i, x:Math.random()*100, color:["#00f0ff","#f7c948","#6feab1","#a78bfa","#f97676"][i%5],
    delay:Math.random()*400, size:Math.random()*8+4
  }));
  useEffect(()=>{ const t=setTimeout(onDone,1200); return()=>clearTimeout(t); },[]);
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute",left:`${p.x}%`,bottom:"20%",width:p.size,height:p.size,background:p.color,borderRadius:Math.random()>0.5?"50%":2,animation:`confetti .9s ease forwards`,animationDelay:`${p.delay}ms`,boxShadow:`0 0 6px ${p.color}`}} />
      ))}
    </div>
  );
}

// ── AUDIO FIRST / HANDS FREE
function AudioMode({ notes, onBack, showToast }) {
  const [playing,setPlaying]=useState(false);
  const [idx,setIdx]=useState(0);
  const [transcript,setTranscript]=useState("");
  const [listening,setListening]=useState(false);
  const synth=window.speechSynthesis;
  const recRef=useRef(null);

  const readNote=(n)=>{
    synth.cancel();
    const text=`${n.title}. ${stripLinkSyntax(n.content).replace(/[#*_~`]/g,"")}`;
    const u=new SpeechSynthesisUtterance(text);
    u.lang="es-ES"; u.rate=0.95; u.pitch=1;
    const voices=synth.getVoices().filter(v=>v.lang.startsWith("es"));
    if(voices.length>0) u.voice=voices[0];
    u.onend=()=>{setPlaying(false);};
    synth.speak(u);
    setPlaying(true);
  };

  const startListen=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("Reconocimiento de voz no disponible","warn");return;}
    const r=new SR(); r.lang="es-ES"; r.interimResults=true;
    r.onresult=(e)=>{
      const t=[...e.results].map(r=>r[0].transcript).join(" ");
      setTranscript(t);
    };
    r.onend=()=>setListening(false);
    r.start(); setListening(true); recRef.current=r;
  };

  const stopListen=()=>{ recRef.current?.stop(); setListening(false); };
  const activeNotes=notes.filter(n=>!n.archived);
  const current=activeNotes[idx];

  return (
    <div style={{minHeight:"100vh",background:BASE,display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px",borderBottom:`1px solid ${ACCENT}20`}}>
        <button style={{background:"#f9767618",border:"1px solid #f9767630",cursor:"pointer",padding:"6px 8px",borderRadius:10,fontSize:18,lineHeight:1}} onClick={onBack}>
          ✕
        </button>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:"#e0e8ff"}}>🎙 Modo Manos Libres</div>
          <div style={{fontSize:12,color:"#8AACDC"}}>Interfaz de audio — conduce sin mirar</div>
        </div>
      </div>

      {current&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,gap:24}}>
          {/* Big card */}
          <div style={{...G.glass,...G.card,padding:"24px 20px",width:"100%",maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>{current.icon}</div>
            <div style={{fontSize:TYPE.headline.fontSize,fontWeight:TYPE.headline.fontWeight,color:TEXT.primary,marginBottom:8}}>{current.title||"Sin título"}</div>

  );
}

// ── GALERÍA DE PLANTILLAS — buscador + filtro por categoría, reutilizable
// mode="insert": tocar una plantilla la inserta (usado en el editor)
// mode="browse": modo de referencia, solo muestra cómo invocarla con "/"
function TemplateGallery({ onSelect, mode = "browse" }) {
  const [search, setSearch] = useState("");
  const [activeCat, setActiveCat] = useState(null);

  const filtered = SNIPPETS.filter(s => {
    if (activeCat && s.category !== activeCat) return false;
    if (search) {
      const q = search.toLowerCase();
      const catLabel = SNIPPET_CATEGORIES.find(c => c.id === s.category)?.label || "";
      return s.name.toLowerCase().includes(q) || catLabel.toLowerCase().includes(q);
    }
    return true;
  });

  const grouped = SNIPPET_CATEGORIES
    .map(c => ({ ...c, items: filtered.filter(s => s.category === c.id) }))
    .filter(g => g.items.length > 0);

  return (
    <div>
      <input
        value={search}
        onChange={e => setSearch(e.target.value)}
        placeholder="🔍 Buscar plantilla…"
        style={{ width: "100%", background: "#0a1828", border: `1px solid ${ACCENT}30`, color: TEXT.primary, padding: "10px 12px", borderRadius: 10, fontSize: 13, fontFamily: "inherit", outline: "none", marginBottom: 10 }}
      />
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8, marginBottom: 10 }}>
        <button
          onClick={() => setActiveCat(null)}
          style={{ flexShrink: 0, background: activeCat === null ? `${ACCENT}25` : "#0a1520", border: `1px solid ${activeCat === null ? ACCENT : "#1a2a5a"}`, color: activeCat === null ? ACCENT : "#6a8ab8", padding: "6px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 600, whiteSpace: "nowrap" }}
        >Todas · {SNIPPETS.length}</button>
        {SNIPPET_CATEGORIES.map(c => (
          <button
            key={c.id}
            onClick={() => setActiveCat(prev => prev === c.id ? null : c.id)}
            style={{ flexShrink: 0, background: activeCat === c.id ? `${c.color}25` : "#0a1520", border: `1px solid ${activeCat === c.id ? c.color : "#1a2a5a"}`, color: activeCat === c.id ? c.color : "#6a8ab8", padding: "6px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 600, whiteSpace: "nowrap" }}
          >{c.emoji} {c.label}</button>
        ))}
      </div>

      {grouped.length === 0 && (
        <div style={{ textAlign: "center", padding: "30px 10px", color: "#6A8CC0", fontSize: 13 }}>
          Sin resultados para "{search}"
        </div>
      )}

      {grouped.map((g, gi) => (
        <div key={g.id} style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: g.color, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
            {g.emoji} {g.label} · {g.items.length}
          </div>
          {g.items.map((s, i) => (
            <div
              key={s.name}
              onClick={mode === "insert" ? () => onSelect(s) : undefined}
              style={{ ...G.glass, ...G.card, padding: "12px 14px", marginBottom: 8, display: "flex", alignItems: "center", gap: 12, animationDelay: `${(gi * 4 + i) * 30}ms`, cursor: mode === "insert" ? "pointer" : "default" }}
              className={mode === "insert" ? "anim-card hover-lift" : "anim-card"}
            >
              <span style={{ fontSize: 22 }}>{s.emoji}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#e0e8ff" }}>{s.name}</div>
                <div style={{ fontSize: 12, color: "#8AACDC" }}>
                  {mode === "insert"
                    ? "Toca para insertar"
                    : <>Usar: escribe <span className="snippet-cmd">/{s.name}</span> en el editor</>}
                </div>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function NoteCard({ n, idx, onEdit, onPin, onArchive, onDelete, onMoveNote, onCopyNote, folders }) {
  const [swipeX,    setSwipeX]    = useState(0);
  const [swiping,   setSwiping]   = useState(false);
  const [showActions,setShowActions] = useState(false);
  const [showFolderModal, setShowFolderModal] = useState(false);
  const [confirm,   setConfirm]   = useState(null);

  const startX   = useRef(0);
  const startY   = useRef(0);
  const dragging = useRef(false);

  const THRESHOLD = 72;

  const handleTouchStart = (e) => {
    startX.current   = e.touches[0].clientX;
    startY.current   = e.touches[0].clientY;
    dragging.current = false;
    setSwiping(false);
  };

  const handleTouchMove = (e) => {
    const dx = e.touches[0].clientX - startX.current;
    const dy = e.touches[0].clientY - startY.current;
    if (!dragging.current && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 8) return;
    if (Math.abs(dx) > 8) {
      dragging.current = true;
      setSwiping(true);
      const clamped = Math.sign(dx) * Math.min(Math.abs(dx), THRESHOLD + (Math.abs(dx) - THRESHOLD) * 0.25);
      setSwipeX(clamped);
    }
  };

  const handleTouchEnd = () => {
    if (Math.abs(swipeX) >= THRESHOLD) {
      if (swipeX > 0) setConfirm("archive");
      else            setConfirm("delete");
    }
    setSwipeX(0);
    setSwiping(false);
    dragging.current = false;
  };

  const handleConfirm = () => {
    if (confirm === "archive") onArchive(n.id);
    else                       onDelete(n.id);
    setConfirm(null);
  };

  const progress    = Math.min(Math.abs(swipeX) / THRESHOLD, 1);
  const isRight     = swipeX > 0;
  const isLeft      = swipeX < 0;
  const isTriggered = Math.abs(swipeX) >= THRESHOLD;
  const archiveColor = "#a78bfa";
  const deleteColor  = "#f97676";

  return (
    <div style={{position:"relative"}}>
      {confirm && (
        <SwipeConfirmModal
          type={confirm}
          noteName={n.title}
          onConfirm={handleConfirm}
          onCancel={()=>setConfirm(null)}
        />
      )}
      {/* Swipe hint layer */}
      <div style={{
        position:"absolute", inset:0, borderRadius:16, overflow:"hidden",
        display: swiping ? "flex" : "none",
        alignItems:"center",
        justifyContent: isRight ? "flex-start" : "flex-end",
        padding:"0 24px",
        background: isRight
          ? `linear-gradient(90deg, #7c3aed${Math.round(progress*180).toString(16).padStart(2,"0")}, transparent)`
          : `linear-gradient(270deg, #f97676${Math.round(progress*180).toString(16).padStart(2,"0")}, transparent)`,
        pointerEvents:"none", zIndex:0,
      }}>
        <div style={{
          display:"flex", flexDirection:"column", alignItems:"center", gap:4,
          transform:`scale(${0.6 + progress*0.5})`,
          opacity: progress,
          transition:"transform 0.05s, opacity 0.05s",
        }}>
          <span style={{fontSize:28}}>{isRight ? "📦" : "🗑"}</span>
          <span style={{fontSize:10,fontWeight:700,color:"#fff",letterSpacing:1,textTransform:"uppercase",textShadow:"0 1px 4px #00000080"}}>
            {isRight ? "Archivar" : "Eliminar"}
          </span>
        </div>
      </div>

    <div className="anim-card hover-lift swipe-note"
      style={{
        ...G.card, background:n.color||"#0a1520", padding:"14px 12px",
        cursor:"pointer", minHeight:260, animationDelay:`${idx*45}ms`,
        transform:`translateX(${swipeX}px)`,
        position:"relative", zIndex:1,
        transition: swiping ? "none" : "transform .3s cubic-bezier(.34,1.2,.64,1), box-shadow .2s",
        boxShadow: isTriggered
          ? `0 0 0 2px ${isRight ? archiveColor : deleteColor}80, 0 8px 32px ${isRight ? "#7c3aed" : "#f97676"}40`
          : undefined,
      }}
      onClick={()=>{ if(!dragging.current) onEdit(n); }}
      onTouchStart={handleTouchStart}
      onTouchMove={handleTouchMove}
      onTouchEnd={handleTouchEnd}
    >
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:22}}>{n.icon}</span>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {n.pinned&&<span style={{fontSize:12}}>📌</span>}
          {n.reminder&&<span style={{fontSize:12}}>🔔</span>}
          {n.locked&&<span style={{fontSize:12}}>🔒</span>}
          {/* Quick actions toggle */}
          <button style={{background:"none",border:"none",cursor:"pointer",color:"#6A8CC0",fontSize:14,padding:"0 2px",lineHeight:1}} onClick={e=>{e.stopPropagation();setShowActions(a=>!a);}}>⋯</button>
        </div>
      </div>
      {/* ── Bottom-sheet action modal via portal (never clipped by card) */}
      {showActions&&ReactDOM.createPortal(
        <div style={{position:"fixed",inset:0,zIndex:8500,background:"#000000b0",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{e.stopPropagation();setShowActions(false);}}>
          <div style={{width:"100%",maxWidth:480,background:"#0c1824",borderRadius:"22px 22px 0 0",padding:"8px 16px 32px",border:"1px solid #1a3060",boxShadow:"0 -8px 40px #000000aa"}} onClick={e=>e.stopPropagation()}>
            <div style={{width:40,height:4,background:"#2a3a5a",borderRadius:2,margin:"10px auto 16px"}}/>
            <div style={{fontSize:13,fontWeight:700,color:"#8AACDC",marginBottom:14,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",paddingLeft:4}}>{n.icon} {n.title||"Sin título"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <button style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"16px 10px",borderRadius:16,background:n.pinned?"#f7c94818":"#0f1e30",border:`1.5px solid ${n.pinned?"#f7c94860":"#1a3060"}`,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>{onPin(n.id);setShowActions(false);}}>
                <span style={{fontSize:24}}>📌</span>
                <span style={{fontSize:12,fontWeight:600,color:n.pinned?"#f7c948":"#8AACDC"}}>{n.pinned?"Quitar fijado":"Fijar"}</span>
              </button>
              <button style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"16px 10px",borderRadius:16,background:n.archived?"#a78bfa18":"#0f1e30",border:`1.5px solid ${n.archived?"#a78bfa60":"#1a3060"}`,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>{onArchive(n.id);setShowActions(false);}}>
                <span style={{fontSize:24}}>{n.archived?"📤":"📦"}</span>
                <span style={{fontSize:12,fontWeight:600,color:n.archived?"#a78bfa":"#8AACDC"}}>{n.archived?"Restaurar":"Archivar"}</span>
              </button>
              {onMoveNote&&(

function TiltStackView({ notes, onEdit, onPin, onArchive, onDelete }) {
  const [topIdx, setTopIdx] = useState(0);
  const TILTS=[-6,4,-3,5,-4,3];
  if(!notes.length) return <Empty />;
  const max = Math.min(notes.length, 6);
  const visible = Array.from({length:max},(_,k)=>notes[(topIdx+k)%notes.length]);

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 12px 100px",minHeight:420}}>
      <div className="tilt-stack-wrap">
        {visible.slice().reverse().map((n,ri)=>{
          const i=visible.length-1-ri; // 0 = front/top card
          const tilt=TILTS[i%TILTS.length];
          const isTop=i===0;
          return (
            <div key={n.id+"_"+i} className="tilt-card hover-lift"
              style={{
                "--tilt":`${tilt}deg`,

                <span style={{fontSize:26}}>{n.icon}</span>
                <div style={{display:"flex",gap:4}}>

                  {n.locked&&<span style={{fontSize:13}}>🔒</span>}

function CalendarView({ notes, onEdit }) {
  const now2=new Date();
  const days=Array.from({length:14},(_,i)=>{const d=new Date(now2);d.setDate(d.getDate()+i);return d;});
  const fmt=d=>d.toLocaleDateString("es",{weekday:"short",day:"numeric",month:"short"});

  // Get all fire dates for a note within the next 14 days
  const getFireDates = (note) => {
    if(!note.reminder) return [];
    const base = new Date(note.reminder);
    const result = [];
    const end = new Date(now2); end.setDate(end.getDate()+14);
    if(!note.recurrence || note.recurrence==="once") {
      if(base >= now2 && base <= end) result.push(new Date(base));
      return result;
    }
    let cur = new Date(base);
    // Walk forward to first future occurrence
    while(cur < now2) {
      if(note.recurrence==="daily") cur.setDate(cur.getDate()+1);
      else if(note.recurrence==="weekly") cur.setDate(cur.getDate()+7);
      else if(note.recurrence==="monthly") cur.setMonth(cur.getMonth()+1);
      else break;
    }
    // Collect all occurrences within 14 days
    while(cur <= end) {
      result.push(new Date(cur));
      if(note.recurrence==="daily") cur.setDate(cur.getDate()+1);
      else if(note.recurrence==="weekly") cur.setDate(cur.getDate()+7);
      else if(note.recurrence==="monthly") cur.setMonth(cur.getMonth()+1);
      else break;
    }
    return result;
  };

  const forDay = (d) => {
    const matches = [];
    notes.forEach(note => {
      const fires = getFireDates(note);
      if(fires.some(f => f.toDateString()===d.toDateString())) matches.push(note);
    });
    return matches;
  };

  return (
    <div style={{padding:"12px 14px 90px"}}>
      <div style={{fontSize:12,fontWeight:700,color:ACCENT,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>📅 Próximos 14 días</div>
      {days.map((d,i)=>{
        const dn=forDay(d), today=d.toDateString()===now2.toDateString();
        return (
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,borderBottom:`1px solid ${ACCENT}10`,padding:"8px 0",...(today?{background:`${ACCENT}08`,borderRadius:10,padding:"8px 10px"}:{})}}>
            <div style={{minWidth:90,fontSize:12,color:today?ACCENT:"#8AACDC",fontWeight:today?700:400}}>{fmt(d)}</div>
            <div style={{flex:1,display:"flex",flexWrap:"wrap",gap:6}}>
              {dn.length===0?<span style={{opacity:.25,fontSize:12}}>—</span>:dn.map(n=>(
                <div key={n.id} style={{...G.glass,color:ACCENT,fontSize:12,padding:"3px 10px",borderRadius:10,cursor:"pointer",border:`1px solid ${ACCENT}30`,display:"flex",alignItems:"center",gap:5}} onClick={()=>onEdit(n)}>
                  {n.icon} {n.title||"Sin título"}
                  {n.recurrence&&n.recurrence!=="once"&&<span style={{fontSize:10,color:ACCENT,opacity:.7}}>🔄</span>}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function MindMapView({ notes, onEdit, mode="notes" }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const stateRef = useRef({
    rotX: 0.3, rotY: 0,
    velX: 0, velY: 0,
    dragging: false,
    lastX: 0, lastY: 0,
    lastTs: 0,
    hovered: null,
    nodes: [],
    edges: [],
    scale: 1,
    raf: null,
    filterTag: null,
    focusNode: null,
  });
  const [filterTag, setFilterTag] = useState(null);
  const [focusNode, setFocusNode] = useState(null);
  const [selectedTag, setSelectedTag] = useState(null); // tag zoomed into, in "tags" mode
  useEffect(() => { setSelectedTag(null); setFilterTag(null); setFocusNode(null); }, [mode]);
  const SPHERE_R = 200;
  const COLORS = ["#00f0ff","#f7c948","#6feab1","#a78bfa","#f97676","#fb923c","#38bdf8","#f472b6","#34d399","#e879f9"];
  const activeNotes = useMemo(() => notes.filter(n => !n.archived && !n.deleted), [notes]);
  const allTags = useMemo(() => [...new Set(activeNotes.flatMap(n => n.tags))], [activeNotes]);
  const nodes3d = useMemo(() => {
    const n = activeNotes.length;
    if (n === 0) return [];
    return activeNotes.map((note, i) => {
      // Fibonacci sphere distribution
      const golden = Math.PI * (3 - Math.sqrt(5));
      const y = 1 - (i / (n - 1 || 1)) * 2; // -1 to 1
      const r = Math.sqrt(Math.max(0, 1 - y * y));
      const theta = golden * i;
      const x = r * Math.cos(theta);
      const z = r * Math.sin(theta);
      const tagIdx = allTags.findIndex(t => note.tags.includes(t));
      const color = tagIdx >= 0 ? COLORS[tagIdx % COLORS.length] : "#4a6080";
      return {
        id: note.id, note,
        ox: x * SPHERE_R, oy: y * SPHERE_R, oz: z * SPHERE_R,
        color,
        tag: tagIdx >= 0 ? allTags[tagIdx] : null,
      };
    });
  }, [activeNotes, allTags]);

  // Tag-sphere nodes (mode="tags", no selectedTag) — one node per tag
  const tagNodes3d = useMemo(() => {
    const n = allTags.length;
    if (n === 0) return [];
    return allTags.map((tag, i) => {
      const golden = Math.PI * (3 - Math.sqrt(5));
      const y = 1 - (i / (n - 1 || 1)) * 2;
      const r = Math.sqrt(Math.max(0, 1 - y * y));
      const theta = golden * i;
      const x = r * Math.cos(theta);
      const z = r * Math.sin(theta);
      const count = activeNotes.filter(nt => nt.tags.includes(tag)).length;
      return {
        id: "tag:" + tag, tag, isTag: true, count,
        ox: x * SPHERE_R, oy: y * SPHERE_R, oz: z * SPHERE_R,
        color: COLORS[i % COLORS.length],
        note: { icon: "🏷", title: tag, tags: [tag], checklist: [] },
      };
    });
  }, [allTags, activeNotes]);

  // Co-tag edges — connect two tags that appear together on the same note
  const tagEdges = useMemo(() => {
    const list = []; const seen = new Set();
    activeNotes.forEach(n => {
      const tags = n.tags || [];
      for (let i = 0; i < tags.length; i++) for (let j = i + 1; j < tags.length; j++) {
        const key = [tags[i], tags[j]].sort().join("_");
        if (!seen.has(key)) { seen.add(key); list.push({ a: "tag:" + tags[i], b: "tag:" + tags[j], type: "tag" }); }
      }
    });
    return list;
  }, [activeNotes]);

  // Build edge list from linkedNoteIds + auto-backlinks
  const edges = useMemo(() => {
    const list = [];
    const seen = new Set();
    activeNotes.forEach(n => {
      // Manual links
      (n.linkedNoteIds||[]).forEach(lid => {
        const key = [n.id,lid].sort().join("_");
        if (!seen.has(key)) { seen.add(key); list.push({ a: n.id, b: lid, type:"manual" }); }
      });
      // Auto-backlinks: si el título de la nota aparece como [[Título]] en el contenido de otra
      if ((n.title||"").length > 2) {
        activeNotes.forEach(other => {
          if (other.id !== n.id && notesLinkTo(n.title, other.content)) {
            const key = [n.id, other.id].sort().join("_");
            if (!seen.has(key)) { seen.add(key); list.push({ a: n.id, b: other.id, type:"auto" }); }
          }
        });
      }
      // Same-tag links (soft)
      n.tags.forEach(tag => {
        activeNotes.filter(o => o.id !== n.id && o.tags.includes(tag)).forEach(o => {
          const key = [n.id, o.id].sort().join("_");
          if (!seen.has(key)) { seen.add(key); list.push({ a: n.id, b: o.id, type:"tag", tag }); }
        });
      });
    });
    return list;
  }, [activeNotes]);

  const showTagSphere = mode === "tags" && !selectedTag;
  const displayNodes3d = useMemo(() => {
    if (showTagSphere) return tagNodes3d;
    if (mode === "tags" && selectedTag) return nodes3d.filter(n => n.note.tags.includes(selectedTag));
    return nodes3d;
  }, [showTagSphere, mode, selectedTag, tagNodes3d, nodes3d]);
  const displayEdges = useMemo(() => {
    if (showTagSphere) return tagEdges;
    if (mode === "tags" && selectedTag) {
      const ids = new Set(displayNodes3d.map(n => n.id));
      return edges.filter(e => ids.has(e.a) && ids.has(e.b));
    }
    return edges;
  }, [showTagSphere, mode, selectedTag, tagEdges, edges, displayNodes3d]);

  // Project 3D → 2D with rotation matrices
  const project = (x, y, z, rotX, rotY, cx, cy, scale) => {
    // Rotate Y
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const x2 = x * cosY + z * sinY;
    const z2 = -x * sinY + z * cosY;
    // Rotate X
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    const y2 = y * cosX - z2 * sinX;
    const z3 = y * sinX + z2 * cosX;
    // Perspective
    const fov = 600;
    const pz = fov / (fov + z3 + SPHERE_R);
    return {
      sx: cx + x2 * pz * scale,
      sy: cy + y2 * pz * scale,
      pz, z3,
    };
  };

  // Canvas draw
  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const s = stateRef.current;
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;

    ctx.clearRect(0, 0, W, H);

    // Background
    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
    bg.addColorStop(0, "#060d1a");
    bg.addColorStop(1, "#020408");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Sphere wireframe hint — latitude + longitude lines,
    // so the spherical shape reads clearly regardless of how many nodes/edges exist.
    // Color follows the active tag (selected or filtered); default is a brighter cyan.
    const activeTagHex = (selectedTag && (tagNodes3d.find(t=>t.tag===selectedTag)||{}).color)
      || (filterTag && (tagNodes3d.find(t=>t.tag===filterTag)||{}).color)
      || null;
    const hexToRgba = (hex, a) => {
      const h = (hex||"#00f0ff").replace("#","");
      const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
      return `rgba(${r},${g},${b},${a})`;
    };
    const wireColor = activeTagHex ? hexToRgba(activeTagHex, 0.45) : hexToRgba("#00f0ff", 0.32);
    ctx.save();
    ctx.strokeStyle = wireColor;
    ctx.lineWidth = 0.8;
    for (let lat = -60; lat <= 60; lat += 30) {
      ctx.beginPath();
      const r = SPHERE_R * Math.cos(lat * Math.PI / 180);
      const yy = SPHERE_R * Math.sin(lat * Math.PI / 180);
      for (let lon = 0; lon <= 360; lon += 3) {
        const rad = lon * Math.PI / 180;
        const p = project(r * Math.cos(rad), yy, r * Math.sin(rad), s.rotX, s.rotY, cx, cy, s.scale);
        lon === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
      }
      ctx.stroke();
    }
    // Meridians (longitude lines) — makes the globe shape unmistakable from any angle
    for (let lon = 0; lon < 180; lon += 30) {
      ctx.beginPath();
      for (let lat = -90; lat <= 90; lat += 3) {
        const rr = SPHERE_R * Math.cos(lat * Math.PI / 180);
        const yy = SPHERE_R * Math.sin(lat * Math.PI / 180);
        const rad = lon * Math.PI / 180;
        const p = project(rr * Math.cos(rad), yy, rr * Math.sin(rad), s.rotX, s.rotY, cx, cy, s.scale);
        lat === -90 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
      }
      ctx.stroke();
    }
    ctx.restore();

    // Project all nodes
    const projected = displayNodes3d.map(n => ({
      ...n,
      ...project(n.ox, n.oy, n.oz, s.rotX, s.rotY, cx, cy, s.scale),
    }));
    projected.sort((a, b) => a.z3 - b.z3);

    // Determine active filter
    const ft = s.filterTag;
    const fn = s.focusNode;

    // Is a node "highlighted"? — checks tags AND note title AND checklist items
    const isHighlighted = (n) => {
      if (ft) {
        // Match by tag, OR by note title containing tag, OR checklist has item with tag text
        return n.note.tags.includes(ft) ||
          (n.note.title||"").toLowerCase().includes(ft.toLowerCase()) ||
          (n.note.checklist||[]).some(c => c.text.toLowerCase().includes(ft.toLowerCase()));
      }
      if (fn) {
        if (n.id === fn) return true;
        const focal = projected.find(p => p.id === fn);
        if (focal && n.tag && n.tag === focal.tag) return true;
        return displayEdges.some(e =>
          (e.a === fn && e.b === n.id) || (e.b === fn && e.a === n.id)
        );
      }
      return true;
    };

    const anyFilter = ft || fn;

    // Draw edges — WHITE lines always visible, brighter when filtered
    displayEdges.forEach(e => {
      const na = projected.find(p => p.id === e.a);
      const nb = projected.find(p => p.id === e.b);
      if (!na || !nb) return;

      const hlA = isHighlighted(na), hlB = isHighlighted(nb);
      const active = !anyFilter || (hlA && hlB);
      if (!active) return;

      const depth = Math.min(na.pz, nb.pz);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(na.sx, na.sy);
      ctx.lineTo(nb.sx, nb.sy);
      if (e.type === "manual") {
        ctx.strokeStyle = `rgba(255,255,255,${depth * 0.9})`;
        ctx.lineWidth = 2.5 * s.scale;
        ctx.setLineDash([]);
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 8;
      } else if (e.type === "auto") {
        ctx.strokeStyle = `rgba(255,255,255,${depth * 0.7})`;
        ctx.lineWidth = 1.8 * s.scale;
        ctx.setLineDash([6, 4]);
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 5;
      } else {
        // same-tag: white with tag color tint
        ctx.strokeStyle = `rgba(255,255,255,${depth * 0.5})`;
        ctx.lineWidth = 1.4 * s.scale;
        ctx.setLineDash([4, 5]);
        ctx.shadowColor = na.color || "#fff";
        ctx.shadowBlur = 3;
      }
      ctx.stroke();
      ctx.restore();
    });

    // Draw nodes
    s.nodes = projected;
    projected.forEach(n => {
      const isHov = s.hovered === n.id;
      const hl = isHighlighted(n);
      const dimmed = anyFilter && !hl;
      const weight = n.count ? Math.min(1.8, 1 + n.count * 0.12) : 1;
      const nodeR = (isHov ? 12 : 9) * n.pz * s.scale * weight;
      const alpha = dimmed ? 0.12 : (0.55 + n.pz * 0.45);

      // Glow for highlighted/hovered
      if ((hl || isHov) && !dimmed) {
        const glowR = nodeR * (isHov ? 4 : 3);
        const glow = ctx.createRadialGradient(n.sx, n.sy, 0, n.sx, n.sy, glowR);
        glow.addColorStop(0, n.color + "80");
        glow.addColorStop(1, "transparent");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(n.sx, n.sy, glowR, 0, Math.PI * 2);
        ctx.fill();
      }

      // Node circle
      ctx.beginPath();
      ctx.arc(n.sx, n.sy, nodeR, 0, Math.PI * 2);
      ctx.fillStyle = dimmed ? (n.color + "20") : (n.color + Math.round(alpha * 255).toString(16).padStart(2,"0"));
      ctx.fill();
      if (!dimmed) {
        ctx.strokeStyle = isHov ? "#fff" : n.color;
        ctx.lineWidth = isHov ? 2 : 1.5;
        if (isHov) { ctx.shadowColor = "#fff"; ctx.shadowBlur = 8; }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Icon + label — visible on front half, larger threshold
      if (!dimmed && n.pz > 0.45 && nodeR > 5) {
        const iconSize = Math.max(10, Math.min(16, nodeR * 1.5));
        ctx.font = `${iconSize}px Outfit, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = `rgba(255,255,255,${Math.min(1, (n.pz - 0.4) * 2.5)})`;
        ctx.fillText(n.note.icon, n.sx, n.sy);

        if (nodeR > 8 || isHov) {
          const labelSz = Math.max(8, Math.min(12, nodeR * 0.9));
          ctx.font = `600 ${labelSz}px Outfit, sans-serif`;
          ctx.fillStyle = `rgba(200,218,240,${Math.min(1, (n.pz - 0.4) * 2)})`;
          const title = (n.note.title || "Sin título").slice(0, 15);
          ctx.fillText(title, n.sx, n.sy + nodeR + labelSz + 2);
        }
      }
    });

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 5 * s.scale, 0, Math.PI * 2);
    ctx.fillStyle = ACCENT + "40";
    ctx.fill();
    ctx.strokeStyle = ACCENT + "90";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Inertia
    if (!s.dragging) {
      s.velX *= 0.97; s.velY *= 0.97;
      s.rotX += s.velX; s.rotY += s.velY;
    }

    s.raf = requestAnimationFrame(draw);
  }, [displayNodes3d, displayEdges, selectedTag, filterTag, tagNodes3d]);

  // Start/stop RAF
  useEffect(() => {
    const s = stateRef.current;
    s.raf = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(s.raf);
  }, [draw]);

  // Resize canvas
  useEffect(() => {
    const resize = () => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      stateRef.current.scale = Math.min(canvas.width, canvas.height) / 520;
    };
    resize();
    window.addEventListener("resize", resize);
    return () => window.removeEventListener("resize", resize);
  }, []);

  // Hit test
  const hitTest = (clientX, clientY) => {
    const canvas = canvasRef.current;
    if (!canvas) return null;
    const rect = canvas.getBoundingClientRect();
    const mx = clientX - rect.left;
    const my = clientY - rect.top;
    const s = stateRef.current;
    let best = null, bestD = 20;
    (s.nodes || []).forEach(n => {
      const r = 12 * n.pz * s.scale;
      const d = Math.sqrt((n.sx-mx)**2 + (n.sy-my)**2);
      if (d < Math.max(r*1.5, bestD)) { best = n; bestD = d; }
    });
    return best;
  };

  // Sync React state → stateRef so draw() can read without stale closure
  useEffect(() => { stateRef.current.filterTag = filterTag; }, [filterTag]);
  useEffect(() => { stateRef.current.focusNode = focusNode; }, [focusNode]);

  // Mouse events
  const onMouseDown = (e) => {
    const s = stateRef.current;
    s.dragging = true; s.lastX = e.clientX; s.lastY = e.clientY; s.lastTs = Date.now();
    s.velX = 0; s.velY = 0;
  };
  const onMouseMove = (e) => {
    const s = stateRef.current;
    const hit = hitTest(e.clientX, e.clientY);
    s.hovered = hit ? hit.id : null;
    if (!s.dragging) return;
    const dx = e.clientX - s.lastX, dy = e.clientY - s.lastY;
    const dt = Math.max(1, Date.now() - s.lastTs);
    s.rotY += dx * 0.007; s.rotX += dy * 0.007;
    s.velY = dx * 0.007 * (16/dt); s.velX = dy * 0.007 * (16/dt);
    s.lastX = e.clientX; s.lastY = e.clientY; s.lastTs = Date.now();
  };
  const onMouseUp = (e) => {
    const s = stateRef.current;
    if (!s.dragging) return;
    s.dragging = false;
    if (Math.abs(s.velX) < 0.008 && Math.abs(s.velY) < 0.008) {
      const hit = hitTest(e.clientX, e.clientY);
      if (hit) {
        if (showTagSphere && hit.isTag) { setSelectedTag(hit.tag); setFocusNode(null); }
        else if (focusNode === hit.id) { setFocusNode(null); }
        else { setFocusNode(hit.id); setFilterTag(null); }
      } else {
        if (selectedTag) setSelectedTag(null);
        else setFocusNode(null);
      }
    }
  };

  // Touch events
  const lastTouchRef = useRef(null);
  const lastDistRef = useRef(null);
  const touchDragRef = useRef(false);
  const onTouchStart = (e) => {
    e.preventDefault();
    touchDragRef.current = false;
    const s = stateRef.current;
    if (e.touches.length === 1) {
      s.dragging = true; s.velX = 0; s.velY = 0;
      s.lastX = e.touches[0].clientX; s.lastY = e.touches[0].clientY; s.lastTs = Date.now();
      lastTouchRef.current = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    } else if (e.touches.length === 2) {
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      lastDistRef.current = Math.sqrt(dx*dx+dy*dy);
    }
  };
  const onTouchMove = (e) => {
    e.preventDefault();
    const s = stateRef.current;
    if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - s.lastX, dy = e.touches[0].clientY - s.lastY;
      if (Math.abs(dx)+Math.abs(dy)>8) touchDragRef.current = true;
      const dt = Math.max(1, Date.now() - s.lastTs);
      s.rotY += dx * 0.007; s.rotX += dy * 0.007;
      s.velY = dx*0.007*(16/dt); s.velX = dy*0.007*(16/dt);
      s.lastX = e.touches[0].clientX; s.lastY = e.touches[0].clientY; s.lastTs = Date.now();
    } else if (e.touches.length === 2 && lastDistRef.current) {
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx+dy*dy);
      s.scale = Math.min(2.5, Math.max(0.4, s.scale * dist/lastDistRef.current));
      lastDistRef.current = dist;
      touchDragRef.current = true;
    }
  };
  const onTouchEnd = (e) => {
    e.preventDefault();
    const s = stateRef.current;
    s.dragging = false;
    if (!touchDragRef.current && e.changedTouches.length === 1) {
      const hit = hitTest(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      if (hit) {
        if (showTagSphere && hit.isTag) {
          // Tap a tag → zoom into the notes that share it
          setSelectedTag(hit.tag);
          setFocusNode(null);
        } else if (focusNode === hit.id) {
          // Second tap on same node → open it
          onEdit(hit.note);
          setFocusNode(null);
        } else {
          // First tap → focus/highlight
          setFocusNode(hit.id);
          setFilterTag(null);
        }
      } else {
        if (selectedTag) setSelectedTag(null); // tap empty space → back to tag sphere
        else setFocusNode(null);
      }
    }
    lastDistRef.current = null;
  };

  if (activeNotes.length === 0) return (
    <div style={{textAlign:"center",padding:"60px 20px",color:"#6A8CC0"}}>
      <div style={{fontSize:40,marginBottom:12}}>🌐</div>
      Crea notas para ver el mapa esférico 3D
    </div>
  );
  if (mode === "tags" && allTags.length === 0) return (
    <div style={{textAlign:"center",padding:"60px 20px",color:"#6A8CC0"}}>
      <div style={{fontSize:40,marginBottom:12}}>🏷</div>
      Agrega etiquetas a tus notas para ver el mapa por etiquetas
    </div>
  );

  return (
    <div ref={containerRef} style={{position:"relative",width:"100%",height:"calc(100vh - 180px)",overflow:"hidden",touchAction:"none"}}>
      <canvas ref={canvasRef} style={{width:"100%",height:"100%",display:"block",cursor:"grab"}}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      />

      {/* Hint — top center, readable size */}
      <div style={{position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",fontSize:12,color:"#8AACDC",whiteSpace:"nowrap",pointerEvents:"none",zIndex:10,background:"#0c182480",borderRadius:20,padding:"4px 12px"}}>
        {showTagSphere
          ? "🏷 Vista por etiquetas · toca una para ver sus notas"
          : selectedTag
            ? `🔍 Notas de #${selectedTag} · toca fuera para volver`
            : "👆 Arrastra · 🤏 Zoom · 1 toque = resaltar · 2 toques = abrir"}
      </div>

      {/* Focus/filter status */}
      {(filterTag || focusNode) && (
        <div style={{position:"absolute",top:46,left:"50%",transform:"translateX(-50%)",zIndex:10,background:"#0c1824cc",border:"1px solid #1a3060",borderRadius:20,padding:"4px 14px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:12,color:COLORS[allTags.indexOf(filterTag)%COLORS.length]||ACCENT}}>
            {filterTag ? `🔍 #${filterTag}` : `🎯 Nota seleccionada`}
          </span>
          <button onClick={()=>{setFilterTag(null);setFocusNode(null);}} style={{background:"none",border:"none",color:"#f97676",fontSize:14,cursor:"pointer",lineHeight:1,padding:0}}>✕</button>
        </div>
      )}

      {/* Tag legend — bottom left, interactive filter, bigger */}
      {allTags.length > 0 && !showTagSphere && (
        <div style={{position:"absolute",bottom:16,left:10,display:"flex",flexDirection:"column",gap:5,zIndex:10}}>
          {allTags.slice(0,8).map((t,i)=>(
            <button key={t} onClick={()=>{
              setFilterTag(filterTag===t?null:t);
              setFocusNode(null);
            }} style={{
              display:"flex",alignItems:"center",gap:8,
              background: filterTag===t ? `${COLORS[i%COLORS.length]}35` : "#0c182490",
              border: `1.5px solid ${COLORS[i%COLORS.length]}${filterTag===t?"":"60"}`,
              borderRadius:22, padding:"5px 12px",
              cursor:"pointer", fontFamily:"inherit",
            }}>
              <div style={{width:11,height:11,borderRadius:"50%",background:COLORS[i%COLORS.length],flexShrink:0}}/>
              <span style={{fontSize:14,color:COLORS[i%COLORS.length],fontWeight:filterTag===t?700:500}}>#{t}</span>
            </button>
          ))}
        </div>
      )}

      {/* Edge legend — bottom right, above FAB (FAB is at bottom:24, height 58 → clear 100px) */}
      <div style={{position:"absolute",bottom:16,right:10,display:"flex",flexDirection:"column",gap:5,zIndex:10,alignItems:"flex-end"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,background:"#0c182490",borderRadius:10,padding:"4px 10px"}}>
          <div style={{width:22,height:2.5,background:"#ffffff",borderRadius:2}}/>
          <span style={{fontSize:12,color:"#ffffff"}}>Vinculadas</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,background:"#0c182490",borderRadius:10,padding:"4px 10px"}}>
          <div style={{width:22,height:1.5,borderTop:"1.5px dashed #ffffff"}}/>
          <span style={{fontSize:12,color:"#cccccc"}}>Backlinks</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,background:"#0c182490",borderRadius:10,padding:"4px 10px"}}>
          <div style={{width:22,height:1,borderTop:"1px dotted #aaaaaa"}}/>
          <span style={{fontSize:12,color:"#aaaaaa"}}>Misma etiqueta</span>
        </div>
      </div>
    </div>
  );
}



// ── ANALYTICS SUMMARY (KPIs + tareas + racha) — usado en Inicio
function AnalyticsSummary({ notes }) {
  const now = new Date();
  const tagFreq=useMemo(()=>{
    const f={};
    notes.forEach(n=>n.tags.forEach(t=>{f[t]=(f[t]||0)+1;}));
    return Object.entries(f);
  },[notes]);
  const thisWeek=notes.filter(n=>{
    const d=new Date(n.createdAt); const wAgo=new Date(now); wAgo.setDate(wAgo.getDate()-7);
    return d>wAgo;
  }).length;
  const allChecks=notes.flatMap(n=>n.checklist);
  const doneChecks=allChecks.filter(c=>c.done).length;
  const pctDone=allChecks.length>0?Math.round(doneChecks/allChecks.length*100):0;
  const r=28, circ=2*Math.PI*r;

  return (
    <div style={{marginBottom:20}}>
      <div style={{fontSize:12,fontWeight:700,color:ACCENT,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>📊 Analytics</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
        {[
          {label:"Esta semana",value:thisWeek,emoji:"📈",color:ACCENT},
          {label:"Completadas",value:`${pctDone}%`,emoji:"✅",color:"#6feab1"},
          {label:"Etiquetas",value:tagFreq.length,emoji:"🏷",color:"#f7c948"},
        ].map((k,i)=>(
          <div key={i} style={{...G.glass,...G.card,padding:"12px 10px",textAlign:"center",animationDelay:`${i*80}ms`}} className="anim-card hover-lift">
            <div style={{fontSize:20,marginBottom:4}}>{k.emoji}</div>
            <div style={{fontSize:TYPE.display.fontSize,fontWeight:TYPE.display.fontWeight,color:k.color,letterSpacing:-1.5,lineHeight:1}}>{k.value}</div>
            <div style={{fontSize:TYPE.labelSm.fontSize,color:TEXT.muted,marginTop:4}}>{k.label}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{...G.glass,...G.card,padding:"14px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:8}} className="anim-card">
          <div style={{fontSize:12,color:"#8AACDC",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Tareas</div>
          <svg width={72} height={72} viewBox="0 0 72 72">
            <circle cx="36" cy="36" r={r} fill="none" stroke="#00f0ff15" strokeWidth="7" />
            <circle cx="36" cy="36" r={r} fill="none" stroke={ACCENT} strokeWidth="7"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pctDone/100)}
              strokeLinecap="round" transform="rotate(-90 36 36)"

// ── FOLDERS (carpetas personalizadas con imagen)
function useFolders() {
  const [folders, setFolders] = useState(() => loadFolders());
  const persist = (f) => { setFolders(f); saveFolders(f); };
  const createFolder = (data) => {
    const f = { id: "f" + Date.now(), name: data.name || "Nueva carpeta", emoji: data.emoji || FOLDER_EMOJIS[0], color: data.color || FOLDER_COLORS[0], image: data.image || null, createdAt: Date.now() };
    persist([...folders, f]);
    return f;
  };
  const updateFolder = (id, patch) => persist(folders.map(f => f.id === id ? { ...f, ...patch } : f));
  const deleteFolder = (id) => persist(folders.filter(f => f.id !== id));
  return { folders, createFolder, updateFolder, deleteFolder };
}

function FolderEditModal({ folder, onSave, onClose, onDelete }) {
  const [name, setName] = useState(folder?.name || "");
  const [emoji, setEmoji] = useState(folder?.emoji || FOLDER_EMOJIS[0]);
  const [color, setColor] = useState(folder?.color || FOLDER_COLORS[0]);
  const [image, setImage] = useState(folder?.image || null);
  const [isPrivate, setIsPrivate] = useState(folder?.isPrivate || false);
  const [bioStatus, setBioStatus] = useState(""); // feedback msg
  const fileRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setImage(reader.result);
    reader.readAsDataURL(file);
  };

  // Toggle private — registers a WebAuthn credential if enabling, verifies if disabling
  const togglePrivate = async () => {
    setBioStatus("");
    if (!isPrivate) {
      // Enable: register biometric credential
      try {
        if (!window.PublicKeyCredential) throw new Error("no_support");
        const supported = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (!supported) throw new Error("no_support");
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        await navigator.credentials.create({
          publicKey: {
            challenge,
            rp: { name: "notapp" },
            user: { id: new Uint8Array(16), name: "notapp_user", displayName: "notapp" },
            pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
            timeout: 30000,
          }
        });
        setIsPrivate(true);
        setBioStatus("✅ Huella registrada. Carpeta privada activada.");
      } catch (e) {
        if (e.message === "no_support") {
          setBioStatus("⚠️ Este dispositivo no soporta autenticación biométrica.");
        } else if (e.name === "NotAllowedError") {
          setBioStatus("❌ Autenticación cancelada.");
        } else {
          setBioStatus("❌ No se pudo activar la protección biométrica.");
        }
      }
    } else {
      // Disable: ask for biometric confirmation first
      try {
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        await navigator.credentials.get({
          publicKey: { challenge, userVerification: "required", timeout: 30000 }
        });
        setIsPrivate(false);
        setBioStatus("🔓 Protección eliminada.");
      } catch (e) {
        if (e.name === "NotAllowedError") {
          setBioStatus("❌ Autenticación cancelada. La carpeta sigue protegida.");
        } else {
          // Fallback: allow removal without biometric if no credential stored
          setIsPrivate(false);
          setBioStatus("🔓 Protección eliminada.");
        }
      }
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 600, background: "#000000a0", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div style={{ ...G.glass, width: "100%", maxWidth: 480, borderRadius: "20px 20px 0 0", padding: 18, paddingBottom: 28 }} onClick={e => e.stopPropagation()} className="anim-card">
        <div style={{ fontSize: 15, fontWeight: 700, color: TEXT.primary, marginBottom: 14 }}>{folder ? "Editar carpeta" : "Nueva carpeta"}</div>

        {/* Image preview / picker */}
        <div onClick={() => fileRef.current?.click()} style={{
          height: 90, borderRadius: 14, marginBottom: 14, cursor: "pointer", position: "relative", overflow: "hidden",
          background: image ? `url(${image}) center/cover` : `${color}18`,
          border: `1.5px dashed ${color}50`, display: "flex", alignItems: "center", justifyContent: "center"
        }}>
          {!image && <span style={{ fontSize: 13, color: TEXT.muted }}>📷 Toca para añadir imagen</span>}
          {image && <div style={{ position: "absolute", inset: 0, background: "#00000050", display: "flex", alignItems: "center", justifyContent: "center", opacity: 0, transition: "opacity .15s" }} className="folder-img-hint"><span style={{ fontSize: 12, color: "#fff" }}>Cambiar</span></div>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleFile} />
        {image && <button style={{ background: "none", border: "none", color: "#f97676", fontSize: 12, cursor: "pointer", marginTop: -8, marginBottom: 12, fontFamily: "inherit" }} onClick={() => setImage(null)}>Quitar imagen</button>}

        <input value={name} onChange={e => setName(e.target.value)} placeholder="Nombre de la carpeta" style={{ width: "100%", background: "#080818", border: `1px solid ${ACCENT}30`, borderRadius: 10, padding: "10px 12px", color: TEXT.primary, fontSize: 14, fontFamily: "inherit", marginBottom: 14, boxSizing: "border-box" }} />

        {!image && (<>
          <div style={{ fontSize: 11, color: TEXT.muted, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Ícono</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
            {FOLDER_EMOJIS.map(em => (
              <button key={em} onClick={() => setEmoji(em)} style={{ width: 34, height: 34, borderRadius: 9, fontSize: 17, background: emoji === em ? `${color}30` : "#080818", border: `1.5px solid ${emoji === em ? color : "transparent"}`, cursor: "pointer" }}>{em}</button>
            ))}
          </div>
          <div style={{ fontSize: 11, color: TEXT.muted, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Color</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
            {FOLDER_COLORS.map(c => (
              <button key={c} onClick={() => setColor(c)} style={{ width: 26, height: 26, borderRadius: "50%", background: c, border: color === c ? "2.5px solid #fff" : "2.5px solid transparent", cursor: "pointer", boxShadow: color === c ? `0 0 8px ${c}` : "none" }} />
            ))}
          </div>
        </>)}

        {/* Private folder toggle */}
        <div style={{ ...G.glass, borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: isPrivate ? "#a78bfa" : TEXT.primary }}>🔒 Carpeta privada</div>
              <div style={{ fontSize: 11, color: TEXT.muted, marginTop: 2 }}>Requiere huella digital para abrirla</div>
            </div>
            <button onClick={togglePrivate} style={{
              width: 46, height: 26, borderRadius: 13, border: "none", cursor: "pointer",
              background: isPrivate ? "#a78bfa" : "#1a2a5a",
              position: "relative", transition: "background .2s",
            }}>
              <div style={{
                width: 20, height: 20, borderRadius: "50%", background: "#fff",
                position: "absolute", top: 3, left: isPrivate ? 23 : 3,
                transition: "left .2s", boxShadow: "0 1px 4px #0004",
              }}/>
            </button>
          </div>
          {bioStatus && <div style={{ fontSize: 11, color: TEXT.muted, marginTop: 8 }}>{bioStatus}</div>}
        </div>

        <div style={{ display: "flex", gap: 8 }}>
          {folder && <button style={{ background: "#f9767618", border: "1px solid #f9767640", color: "#f97676", padding: "11px 16px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }} onClick={() => { if (window.confirm("¿Borrar esta carpeta? Las notas no se eliminarán.")) onDelete(folder.id); }}>🗑</button>}
          <button style={{ flex: 1, background: "none", border: `1px solid ${ACCENT}30`, color: TEXT.muted, padding: "11px 16px", borderRadius: 12, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }} onClick={onClose}>Cancelar</button>
          <button disabled={!name.trim()} style={{ flex: 1, background: name.trim() ? ACCENT : "#1a2a5a", border: "none", color: name.trim() ? "#001018" : TEXT.faint, padding: "11px 16px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: name.trim() ? "pointer" : "default", fontFamily: "inherit" }} onClick={() => name.trim() && onSave({ name: name.trim(), emoji, color, image, isPrivate })}>Guardar</button>
        </div>
      </div>
    </div>
  );
}
