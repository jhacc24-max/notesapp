const hilite = (text, q) => { if(!q)return text; const i=text.toLowerCase().indexOf(q.toLowerCase()); if(i<0)return text; return <>{text.slice(0,i)}<mark style={{background:"#f7c94855",color:"#f7c948",borderRadius:2}}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>; };

`;

// ── COMPONENTS

function ViewPill({ v, active, onChange }) {
  return (
    <button onClick={() => onChange(v.id)} style={{
      display:"flex", alignItems:"center", gap:7, padding:"7px 13px", borderRadius:22,
      cursor:"pointer", fontFamily:"inherit", fontSize:13, fontWeight:active?700:500,
      whiteSpace:"nowrap", transition:"all 0.2s cubic-bezier(.4,0,.2,1)",
      background:active?v.color:v.bg, color:active?"#000033":v.color,
      boxShadow:active?`0 2px 14px ${v.color}55`:"none", opacity:active?1:0.72,
      transform:active?"scale(1.04)":"scale(1)", border:active?"none":`1px solid ${v.color}33`,
    }}>
      <span style={{fontSize:16,lineHeight:1}}>{v.emoji}</span>{v.label}
    </button>
  );
}

function ViewSwitcher({ current, onChange, sortBy, setSortBy }) {
  return (
    <div style={{padding:"10px 12px 6px",borderBottom:"1px solid #1a2a5a44"}}>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,alignItems:"center"}}>
        {VIEWS_ROW1.map(v => <ViewPill key={v.id} v={v} active={current===v.id} onChange={onChange} />)}
        <div style={{flex:1}} />
        <select style={S.select} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="updated">Recientes</option>
          <option value="created">Creadas</option>
          <option value="alpha">A–Z</option>
        </select>
      </div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
        {VIEWS_ROW2.map(v => <ViewPill key={v.id} v={v} active={current===v.id} onChange={onChange} />)}
      </div>
    </div>
  );
}

function DashboardView({ stats, notes, onEdit, onCreate }) {
  const recent=[...notes].filter(n=>!n.archived).sort((a,b)=>b.updatedAt-a.updatedAt).slice(0,5);
  const reminders=notes.filter(n=>n.reminder&&new Date(n.reminder)>new Date()).slice(0,3);
  const statCards=[
    {label:"Notas",value:stats.total,emoji:"📝",color:"#7eb8f7"},
    {label:"Fijadas",value:stats.pinned,emoji:"⭐",color:"#f7c948"},
    {label:"Recordatorios",value:stats.withReminder,emoji:"🔔",color:"#f97676"},
    {label:"Etiquetas",value:stats.tags,emoji:"🏷",color:"#6feab1"},
    {label:"Archivadas",value:stats.archived,emoji:"📦",color:"#c084fc"},
  ];
  return (
    <div style={S.dashWrap}>
      <div style={S.dashGreet}>
        <span style={S.dashHello}>¡Hola! 👋</span>
        <span style={S.dashSub}>Tu espacio personal de notas</span>
      </div>
      <div style={S.statGrid}>
        {statCards.map((s,i)=>(
          <div key={i} style={{...S.statCard,borderColor:s.color+"22",animationDelay:`${i*60}ms`}} className="anim-card">
            <span style={S.statEmoji}>{s.emoji}</span>
            <span style={{...S.statValue,color:s.color}}>{s.value}</span>
            <span style={S.statLabel}>{s.label}</span>
          </div>
        ))}
      </div>
      {reminders.length>0&&(
        <div style={S.dashSection}>
          <span style={S.secTitle}>🔔 Próximos recordatorios</span>
          {reminders.map(n=>(
            <div key={n.id} style={S.reminderRow} onClick={()=>onEdit(n)} className="anim-card">
              <span style={{fontSize:22}}>{n.icon}</span>
              <div style={{flex:1}}>
                <div style={S.listTitle}>{n.title||"Sin título"}</div>
                <div style={{fontSize:11,color:"#f7c948",marginTop:2}}>{new Date(n.reminder).toLocaleString("es",{dateStyle:"medium",timeStyle:"short"})}</div>
              </div>
              <span>🔔</span>
            </div>
          ))}
        </div>
      )}
      <div style={S.dashSection}>
        <span style={S.secTitle}>🕐 Notas recientes</span>
        {recent.map((n,i)=>(
          <div key={n.id} style={{...S.recentRow,animationDelay:`${i*50}ms`}} onClick={()=>onEdit(n)} className="anim-card">
            <span style={{fontSize:20}}>{n.icon}</span>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={S.listTitle}>{n.title||"Sin título"}</div>
              <div style={S.listPreview}>{n.content.slice(0,60)||"Vacía"}</div>
            </div>
            <span style={{fontSize:11,color:"#3a5a8a",whiteSpace:"nowrap"}}>{timeSince(n.updatedAt)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function GridView({ notes, onEdit, onPin, onDelete }) {
  if(!notes.length) return <Empty />;
  return (
    <div style={S.grid}>
      {notes.map((n,i)=>(
        <div key={n.id} style={{...S.noteCard,background:n.color,animationDelay:`${i*40}ms`}} className="anim-card hover-card" onClick={()=>onEdit(n)}>
          <div style={S.cardTop}>
            <span style={{fontSize:22}}>{n.icon}</span>
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              {n.reminder&&<span title="Recordatorio" style={{fontSize:13}}>🔔</span>}
              <button style={S.miniBtn} onClick={e=>{e.stopPropagation();onPin(n.id);}}>{n.pinned?"⭐":"☆"}</button>
              <button style={S.miniBtn} onClick={e=>{e.stopPropagation();onDelete(n.id);}}>✕</button>
            </div>
          </div>
          <div style={S.cardTitle}>{n.title||"Sin título"}</div>
          {n.checklist.length>0?(
            <div style={{fontSize:12,color:"#8a9ab8"}}>
              {n.checklist.slice(0,3).map(c=><div key={c.id} style={{opacity:c.done?.4:1,marginBottom:2}}>{c.done?"✅":"⬜"} {c.text}</div>)}
              {n.checklist.length>3&&<span style={{color:"#7eb8f7",fontSize:11}}>+{n.checklist.length-3} más</span>}
            </div>
          ):(

function CalendarView({ notes, onEdit }) {
  const withDates=notes.filter(n=>n.reminder);
  const now=new Date();
  const days=Array.from({length:14},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()+i);return d;});
  const fmt=d=>d.toLocaleDateString("es",{weekday:"short",day:"numeric",month:"short"});
  const forDay=d=>withDates.filter(n=>new Date(n.reminder).toDateString()===d.toDateString());
  return (
    <div style={{padding:"12px 14px 80px"}}>
      <div style={S.secTitle}>📅 Próximos 14 días</div>
      {days.map((d,i)=>{
        const dn=forDay(d), today=d.toDateString()===now.toDateString();
        return (
          <div key={i} style={{...S.calRow,...(today?{background:"#1a2a5a22",borderRadius:10,padding:"8px 10px"}:{})}}>
            <div style={{minWidth:100,fontSize:12,color:today?"#7eb8f7":"#8a9ab8"}}>{fmt(d)}</div>
            <div style={{flex:1,display:"flex",flexWrap:"wrap",gap:6}}>
              {dn.length===0?<span style={{opacity:.3,fontSize:12}}>—</span>:dn.map(n=>(
                <div key={n.id} style={{background:"#1a2a5a",color:"#7eb8f7",fontSize:12,padding:"3px 10px",borderRadius:10,cursor:"pointer"}} onClick={()=>onEdit(n)}>{n.icon} {n.title||"Sin título"}</div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function EditorScreen({ note, setNote, onSave, onDelete, onBack, showToast }) {
  const [showEmoji,setShowEmoji]=useState(false);
  const [showColor,setShowColor]=useState(false);
  const [showReminder,setShowReminder]=useState(false);
  const [showTagInput,setShowTagInput]=useState(false);
  const [newTag,setNewTag]=useState("");
  const [section,setSection]=useState("write");
  const [checkInput,setCheckInput]=useState("");
  const taRef=useRef(null);

  const upd=(k,v)=>setNote(p=>({...p,[k]:v}));
  const insert=(before,after="")=>{
    const ta=taRef.current; if(!ta)return;
    const s=ta.selectionStart,e=ta.selectionEnd;
    const sel=note.content.substring(s,e)||"texto";
    upd("content",note.content.substring(0,s)+before+sel+after+note.content.substring(e));
    setTimeout(()=>{ta.focus();ta.setSelectionRange(s+before.length,s+before.length+sel.length);},10);
  };
  const insertLine=(prefix)=>{
    const ta=taRef.current; if(!ta)return;
    const pos=ta.selectionStart;
    const ls=note.content.lastIndexOf("\n",pos-1)+1;
    upd("content",note.content.substring(0,ls)+prefix+note.content.substring(ls));
    setTimeout(()=>{ta.focus();ta.setSelectionRange(pos+prefix.length,pos+prefix.length);},10);
  };
  const addCheck=()=>{ if(!checkInput.trim())return; upd("checklist",[...note.checklist,{id:String(Date.now()),text:checkInput.trim(),done:false}]); setCheckInput(""); };
  const toggleCheck=(id)=>upd("checklist",note.checklist.map(c=>c.id===id?{...c,done:!c.done}:c));
  const delCheck=(id)=>upd("checklist",note.checklist.filter(c=>c.id!==id));
  const addTag=()=>{ if(newTag.trim()&&!note.tags.includes(newTag.trim())){ upd("tags",[...note.tags,newTag.trim().toLowerCase()]); setNewTag(""); setShowTagInput(false); } };

  const FORMATS=[
    { sym:"B",   label:"Negrita",   color:"#7eb8f7", action:()=>insert("**","**") },
    { sym:"I",   label:"Cursiva",   color:"#a78bfa", action:()=>insert("_","_") },
    { sym:"H1",  label:"Título",    color:"#34d399", action:()=>insert("# ") },
    { sym:"H2",  label:"Subtítulo", color:"#6feab1", action:()=>insert("## ") },
    { sym:"•",   label:"Viñeta",    color:"#f7c948", action:()=>insertLine("• ") },
    { sym:"1.",  label:"Número",    color:"#fb923c", action:()=>insertLine("1. ") },
    { sym:"↳",   label:"Subnivel", color:"#c084fc", action:()=>insertLine("  • ") },
    { sym:"~~",  label:"Tachado",   color:"#f97676", action:()=>insert("~~","~~") },
    { sym:"</>", label:"Código",    color:"#4ade80", action:()=>insert("`","`") },
    { sym:"🔗",  label:"Enlace",    color:"#38bdf8", action:()=>insert("[[","]]") },
  ];

  return (
    <div style={{...S.editorWrap,background:note.color}}>
      <div style={S.editorHeader}>
        <button style={S.hBtn} onClick={onBack}><Ic d="M18 6 6 18 M6 6l12 12" /></button>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button style={S.toolIconBtn} onClick={()=>{setShowReminder(!showReminder);setShowEmoji(false);setShowColor(false);}} title="Recordatorio">
            <Ic d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9 M13.73 21a2 2 0 0 1-3.46 0" stroke={note.reminder?"#f7c948":"currentColor"} />
            {note.reminder&&<span style={{position:"absolute",top:2,right:2,fontSize:6,color:"#f7c948"}}>●</span>}
          </button>
          <button style={S.toolIconBtn} onClick={()=>{setShowColor(!showColor);setShowEmoji(false);setShowReminder(false);}} title="Color">
            <Ic d="M12 2C6.48 2 2 6.48 2 12c0 5.52 4.48 10 10 10 1.1 0 2-.9 2-2v-.5c0-.55-.22-1.05-.59-1.41-.36-.36-.86-.59-1.41-.59H10c-1.1 0-2-.9-2-2 0-5.52 4.48-10 10-10z" />
          </button>
          <button style={{...S.toolIconBtn,fontSize:18,padding:"4px 8px"}} onClick={()=>{setShowEmoji(!showEmoji);setShowColor(false);setShowReminder(false);}} title="Ícono">{note.icon}</button>
          <button style={S.toolIconBtn} onClick={()=>onDelete(note.id)} title="Eliminar"><Ic d="M3 6h18 M19 6l-1 14H6L5 6 M9 6V4h6v2" stroke="#f97676" /></button>
          <button style={S.saveBtn} onClick={()=>onSave(note)}>Guardar</button>
        </div>
      </div>

      {showEmoji&&(
        <div style={S.popover}>
          <div style={{fontSize:11,color:"#7eb8f7",marginBottom:8,fontWeight:700}}>Elige un ícono</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {EMOJI_ICONS.map(e=><button key={e} style={S.emojiBtn} onClick={()=>{upd("icon",e);setShowEmoji(false);}}>{e}</button>)}
          </div>
        </div>
      )}
      {showColor&&(
        <div style={S.popover}>
          <div style={{fontSize:11,color:"#7eb8f7",marginBottom:8,fontWeight:700}}>Color de fondo</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {NOTE_COLORS.map(c=><button key={c} style={{width:32,height:32,borderRadius:8,background:c,cursor:"pointer",border:note.color===c?"2px solid #7eb8f7":"2px solid transparent"}} onClick={()=>{upd("color",c);setShowColor(false);}} />)}
          </div>
        </div>
      )}
      {showReminder&&(
        <div style={S.popover}>
          <div style={{fontSize:11,color:"#7eb8f7",marginBottom:8,fontWeight:700}}>🔔 Recordatorio</div>
          <input type="datetime-local" style={S.dtInput} value={note.reminder?new Date(note.reminder).toISOString().slice(0,16):""} onChange={e=>upd("reminder",e.target.value?new Date(e.target.value).toISOString():null)} />
          {note.reminder&&<button style={{background:"none",border:"none",cursor:"pointer",color:"#f97676",fontSize:12,marginTop:8}} onClick={()=>{upd("reminder",null);setShowReminder(false);}}>Quitar recordatorio</button>}
        </div>
      )}

      <input style={S.editorTitle} placeholder="Título de la nota..." value={note.title} onChange={e=>upd("title",e.target.value)} />

      <div style={S.tagsRow}>
        {note.tags.map(t=>(
          <span key={t} style={S.tagBadge}>{t}<button style={{background:"none",border:"none",cursor:"pointer",color:"#f97676",marginLeft:3,fontSize:10}} onClick={()=>upd("tags",note.tags.filter(x=>x!==t))}>×</button></span>
        ))}
        {showTagInput?(
          <span style={{display:"flex",gap:4}}>
            <input style={S.tagInputSm} value={newTag} onChange={e=>setNewTag(e.target.value)} placeholder="etiqueta..." onKeyDown={e=>e.key==="Enter"&&addTag()} autoFocus />
            <button style={S.tagAddBtn} onClick={addTag}>+</button>
          </span>
        ):(
          <button style={S.addTagBtn} onClick={()=>setShowTagInput(true)}>+ Etiqueta</button>
        )}
      </div>

      <div style={{display:"flex",gap:8,padding:"8px 12px 4px",background:"#00001544"}}>
        {[
          {id:"write",emoji:"✏️",label:"Texto",color:"#7eb8f7",bg:"#0d2a4a"},
          {id:"checklist",emoji:"✅",label:"Lista",color:"#34d399",bg:"#0d3028"},
          {id:"voice",emoji:"🎙",label:"Voz",color:"#c084fc",bg:"#2a1040"},
        ].map(s=>{
          const act=section===s.id;
          return (
            <button key={s.id} onClick={()=>setSection(s.id)} style={{
              display:"flex",alignItems:"center",gap:6,padding:"7px 16px",borderRadius:22,
              cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:act?700:500,
              background:act?s.color:s.bg,color:act?"#000033":s.color,
              boxShadow:act?`0 2px 12px ${s.color}55`:"none",
              border:act?"none":`1px solid ${s.color}33`,
              transition:"all 0.2s cubic-bezier(.4,0,.2,1)",transform:act?"scale(1.04)":"scale(1)",
            }}><span style={{fontSize:16}}>{s.emoji}</span>{s.label}</button>
          );
        })}
      </div>

      {section==="write"&&(
        <div style={{display:"flex",gap:5,padding:"6px 12px 8px",overflowX:"auto",borderBottom:"1px solid #1a2a5a44"}}>
          {FORMATS.map((f,i)=>(
            <button key={i} onClick={f.action} title={f.label} style={{
              display:"flex",flexDirection:"column",alignItems:"center",gap:2,
              minWidth:44,padding:"6px 4px",borderRadius:10,border:"none",cursor:"pointer",
              background:f.color+"18",fontFamily:"inherit",transition:"all 0.15s",
            }}>
              <span style={{fontSize:f.sym.length>1?11:15,fontWeight:800,color:f.color,lineHeight:1.1,fontFamily:"monospace"}}>{f.sym}</span>
              <span style={{fontSize:9,color:f.color+"cc",fontWeight:600,whiteSpace:"nowrap"}}>{f.label}</span>
            </button>
          ))}
        </div>
      )}

      {section==="write"&&(
        <textarea ref={taRef} style={S.textarea} placeholder={"Escribe aquí...\n\n**negrita**  _cursiva_  # Título\n• viñetas    1. numeración    [[enlace]]"} value={note.content} onChange={e=>upd("content",e.target.value)} />
      )}

      {section==="checklist"&&(
        <div style={{padding:"0 14px",flex:1}}>
          {note.checklist.length===0&&<div style={{color:"#4a6a9a",textAlign:"center",padding:32,fontSize:14}}>Agrega tu primer ítem 👇</div>}
          {note.checklist.map(c=>(
            <div key={c.id} style={{...S.checkRow,opacity:c.done?.5:1}} className="anim-card">
              <button style={{background:"none",border:"none",cursor:"pointer",fontSize:18,padding:0}} onClick={()=>toggleCheck(c.id)}>{c.done?"✅":"⬜"}</button>
              <span style={{flex:1,fontSize:14,color:"#e0e6f0",textDecoration:c.done?"line-through":"none"}}>{c.text}</span>
              <button style={S.miniBtn} onClick={()=>delCheck(c.id)}>✕</button>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <input style={S.checkInput} value={checkInput} onChange={e=>setCheckInput(e.target.value)} placeholder="Nuevo ítem..." onKeyDown={e=>e.key==="Enter"&&addCheck()} />
            <button style={S.checkAddBtn} onClick={addCheck}>+</button>
          </div>
          <div style={{color:"#4a6a9a",fontSize:12,marginTop:10,textAlign:"center"}}>
            {note.checklist.filter(c=>c.done).length}/{note.checklist.length} completados
            {note.checklist.length>0&&note.checklist.every(c=>c.done)&&<span style={{color:"#6feab1",marginLeft:8}}>🎉 ¡Todo listo!</span>}
          </div>
        </div>
      )}

      {section==="voice"&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,gap:16}}>
          <div style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#1a3a6a,#7eb8f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,cursor:"pointer"}} className="anim-pulse">🎙</div>
          <div style={{color:"#e0e6f0",fontSize:15}}>Toca para dictar</div>
          <div style={{color:"#4a6a9a",fontSize:12}}>Reconocimiento inteligente de puntuación</div>
          <button style={{background:"#1a3a6a",border:"1px solid #3a5a9a",cursor:"pointer",color:"#7eb8f7",padding:"12px 30px",borderRadius:20,fontSize:14,fontFamily:"inherit"}} onClick={()=>showToast("🎙 Disponible en dispositivo móvil")}>Iniciar dictado</button>
        </div>
      )}

      <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:4,padding:"12px 14px 0"}}>
        <span style={{color:"#7eb8f7",fontSize:12,marginRight:4}}>Tablero:</span>
        {KANBAN_COLS.map(col=>(
          <button key={col} style={{background:"none",border:`1px solid ${note.kanbanCol===col?"#7eb8f7":"#1a2a5a"}`,cursor:"pointer",color:note.kanbanCol===col?"#7eb8f7":"#4a6a9a",padding:"4px 10px",borderRadius:12,fontSize:11,marginRight:4,fontFamily:"inherit",transition:"all 0.15s"}} onClick={()=>upd("kanbanCol",col)}>{col}</button>
        ))}
      </div>
      <div style={{padding:"8px 14px"}}>
        <button style={{background:"none",border:"1px solid #2a4a8a",cursor:"pointer",color:"#a0b8d8",padding:"6px 16px",borderRadius:20,fontSize:12,fontFamily:"inherit"}} onClick={()=>upd("locked",!note.locked)}>
          {note.locked?"🔒 Nota protegida":"🔓 Hacer privada"}
        </button>
      </div>
    </div>
  );
}

      {allTags.length>0&&(
        <div style={{padding:"16px 14px"}}>
          <div style={S.secTitle}>🏷 Etiquetas</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
            {allTags.map(t=><span key={t} style={S.tagBadge}>#{t}</span>)}
          </div>
        </div>
      )}
    </div>
  );
}

function Empty() {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:60,gap:8}}>
      <span style={{fontSize:48}}>📝</span>
      <span style={{fontSize:16,fontWeight:600,color:"#4a6a9a"}}>No hay notas aquí</span>
      <span style={{fontSize:13,color:"#2a4a6a"}}>Toca + para crear una</span>
    </div>
  );
}

function HomeScreen({ notes, allNotes, stats, view, setView, activeTab, setActiveTab, allTags, filterTag, setFilterTag, sortBy, setSortBy, onEdit, onPin, onArchive, onDelete, onCreate }) {
  const tabs=[
    {id:"all",label:"Todas"},
    {id:"pinned",label:"⭐ Fijadas"},
    {id:"archived",label:"📦 Archivo"},
    {id:"locked",label:"🔒 Privadas"},
  ];
  return (
    <div style={S.homeWrap}>
      <ViewSwitcher current={view} onChange={setView} sortBy={sortBy} setSortBy={setSortBy} />
      {view!=="dashboard"&&(
        <div style={S.tabBar}>
          {tabs.map(t=><button key={t.id} style={{...S.tab,...(activeTab===t.id?S.tabActive:{})}} onClick={()=>setActiveTab(t.id)}>{t.label}</button>)}
        </div>
      )}
      {view!=="dashboard"&&allTags.length>0&&(
        <div style={S.tagRow}>
          <button style={{...S.tagChip,...(filterTag===null?S.tagChipActive:{})}} onClick={()=>setFilterTag(null)}>Todos</button>
          {allTags.map(t=><button key={t} style={{...S.tagChip,...(filterTag===t?S.tagChipActive:{})}} onClick={()=>setFilterTag(t)}>#{t}</button>)}
        </div>
      )}
      {view==="dashboard"&&<DashboardView stats={stats} notes={allNotes} onEdit={onEdit} onCreate={onCreate} />}
      {view==="grid"&&<GridView notes={notes} onEdit={onEdit} onPin={onPin} onDelete={onDelete} />}
      {view==="list"&&<ListView notes={notes} onEdit={onEdit} onPin={onPin} onArchive={onArchive} onDelete={onDelete} />}
      {view==="kanban"&&<KanbanView notes={notes} onEdit={onEdit} onCreate={onCreate} />}
      {view==="pinned"&&<GridView notes={notes.filter(n=>n.pinned)} onEdit={onEdit} onPin={onPin} onDelete={onDelete} />}
      {view==="calendar"&&<CalendarView notes={allNotes} onEdit={onEdit} />}
      {view==="map"&&<MindMapView notes={notes} onEdit={onEdit} />}
    </div>
  );
}

// ── MAIN APP
function MyoNotes() {
  const [notes,setNotes]=useState(()=>{const s=loadNotes();return s.length?s:SAMPLES;});
  const [view,setView]=useState("dashboard");
  const [screen,setScreen]=useState("home");
  const [editingNote,setEditingNote]=useState(null);
  const [searchQuery,setSearchQuery]=useState("");
  const [activeTab,setActiveTab]=useState("all");
  const [sortBy,setSortBy]=useState("updated");
  const [filterTag,setFilterTag]=useState(null);
  const [toast,setToast]=useState(null);
  const [animIn,setAnimIn]=useState(true);
  const [showNewNote,setShowNewNote]=useState(false);

  const persistNotes=(n)=>{setNotes(n);saveNotes(n);};
  const showToast=(msg,type="info")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500);};
  const navigate=(s,v)=>{
    setAnimIn(false);
    setTimeout(()=>{if(s)setScreen(s);if(v)setView(v);setAnimIn(true);},180);
  };
  const createNote=(prefill={})=>{
    const now=Date.now();
    if(prefill.title){const exist=notes.find(n=>n.title===prefill.title);if(exist){setEditingNote({...exist});navigate("editor");showToast("📂 Nota existente cargada");return;}}
    setEditingNote({id:String(now),title:"",content:"",icon:"📝",color:"#293241",tags:[],pinned:false,archived:false,locked:false,checklist:[],reminder:null,kanbanCol:"Ideas",createdAt:now,updatedAt:now,...prefill});
    setShowNewNote(false);navigate("editor");
  };
  const saveNote=(n)=>{
    const u={...n,updatedAt:Date.now()};
    const idx=notes.findIndex(x=>x.id===n.id);
    const arr=idx>=0?notes.map((x,i)=>i===idx?u:x):[u,...notes];
    persistNotes(arr);showToast("✅ Nota guardada");navigate("home");
  };
  const deleteNote=(id)=>{persistNotes(notes.filter(n=>n.id!==id));showToast("🗑 Eliminada","warn");if(screen==="editor")navigate("home");};
  const togglePin=(id)=>persistNotes(notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));
  const toggleArchive=(id)=>persistNotes(notes.map(n=>n.id===id?{...n,archived:!n.archived}:n));

  const allTags=[...new Set(notes.flatMap(n=>n.tags))];
  const filtered=notes.filter(n=>{
    if(activeTab==="pinned"&&!n.pinned)return false;
    if(activeTab==="archived"&&!n.archived)return false;
    if(activeTab==="locked"&&!n.locked)return false;
    if(activeTab==="all"&&n.archived)return false;
    if(filterTag&&!n.tags.includes(filterTag))return false;
    if(searchQuery){const q=searchQuery.toLowerCase();return n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)||n.tags.some(t=>t.includes(q));}
    return true;
  }).sort((a,b)=>{if(sortBy==="alpha")return a.title.localeCompare(b.title);if(sortBy==="created")return b.createdAt-a.createdAt;return b.updatedAt-a.updatedAt;});

  const stats={total:notes.filter(n=>!n.archived).length,pinned:notes.filter(n=>n.pinned).length,withReminder:notes.filter(n=>n.reminder).length,archived:notes.filter(n=>n.archived).length,tags:allTags.length};

  return (
    <div style={S.app}>
      <style>{CSS}</style>
      {toast&&<div style={{...S.toast,...(toast.type==="warn"?S.toastWarn:{})}} className="anim-toast">{toast.msg}</div>}
      <header style={S.header}>
        <div style={S.headerLeft}>
          <span style={S.logo}>MYO</span>
          <span style={S.logoSub}>Notes</span>
        </div>
        <div style={S.headerRight}>
          <button style={S.hBtn} onClick={()=>navigate("search")} title="Buscar"><Ic d="m21 21-4.35-4.35 M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" /></button>
          <button style={S.hBtn} onClick={()=>navigate("settings")} title="Ajustes"><Ic d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></button>
        </div>
      </header>
      <div style={{...S.main,opacity:animIn?1:0,transform:animIn?"translateY(0)":"translateY(14px)",transition:"all 0.2s cubic-bezier(.4,0,.2,1)"}}>
        {screen==="home"&&<HomeScreen notes={filtered} allNotes={notes} stats={stats} view={view} setView={v=>navigate(null,v)} activeTab={activeTab} setActiveTab={setActiveTab} allTags={allTags} filterTag={filterTag} setFilterTag={setFilterTag} sortBy={sortBy} setSortBy={setSortBy} onEdit={n=>{setEditingNote({...n});navigate("editor");}} onPin={togglePin} onArchive={toggleArchive} onDelete={deleteNote} onCreate={createNote} />}
        {screen==="editor"&&editingNote&&<EditorScreen note={editingNote} setNote={setEditingNote} onSave={saveNote} onDelete={deleteNote} onBack={()=>navigate("home")} showToast={showToast} />}
        {screen==="search"&&<SearchScreen notes={notes} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onEdit={n=>{setEditingNote({...n});navigate("editor");}} onBack={()=>navigate("home")} />}
        {screen==="settings"&&<SettingsScreen stats={stats} allTags={allTags} onBack={()=>navigate("home")} />}
      </div>
      {showNewNote&&(
        <div style={S.modalOverlay} onClick={()=>setShowNewNote(false)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()} className="anim-modal">
            <div style={S.modalHeader}>
              <span style={S.modalTitle}>✨ Nueva Nota</span>
              <button style={S.modalClose} onClick={()=>setShowNewNote(false)}>✕</button>
            </div>
            <p style={S.modalSub}>Elige cómo quieres comenzar</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {QUICK_TYPES.map((t,i)=>(
                <button key={i} style={{background:t.bg,border:`1.5px solid ${t.color}44`,borderRadius:16,padding:"14px 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"flex-start",gap:6,transition:"all 0.18s",fontFamily:"inherit",animationDelay:`${i*45}ms`}} className="anim-card" onClick={()=>createNote(t.prefill)}>
                  <div style={{width:40,height:40,borderRadius:12,background:t.color+"22",border:`1.5px solid ${t.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{t.emoji}</div>
                  <span style={{fontSize:13,fontWeight:700,color:t.color,lineHeight:1.2}}>{t.label}</span>
                  <span style={{fontSize:11,color:"#6a8ab8",lineHeight:1.45,textAlign:"left"}}>{t.shortDesc}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
      {screen==="home"&&(
        <button style={S.fab} onClick={()=>setShowNewNote(true)} className="anim-fab" title="Nueva nota">
          <span style={{fontSize:28,lineHeight:1}}>+</span>
        </button>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MyoNotes />);
  </script>
</body>
</html>
