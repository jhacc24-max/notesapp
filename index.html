// Full screen for Carpetas tab — manage folders + browse/move notes
function FoldersScreen({ notes, onEdit, onMoveNote, onCopyNote, onPin, onArchive, onDelete, onCreate, openFolder, setOpenFolder }) {
  const { folders, createFolder, updateFolder, deleteFolder } = useFolders();
  const [editing, setEditing] = useState(null);
  const [moving, setMoving] = useState(null);        // note being moved/copied
  const [noteAction, setNoteAction] = useState(null); // note with action menu open
  const [unlockedFolders, setUnlockedFolders] = useState(new Set()); // private folders unlocked this session
  const [bioError, setBioError] = useState("");

  const activeNotes = notes.filter(n => !n.archived && !n.deleted);
  const noFolderCount = activeNotes.filter(n => !n.folderId).length;

  const moveNote = (note, folderId) => { onMoveNote(note.id, folderId); setMoving(null); };
  const copyNote = (note, folderId) => { onCopyNote(note, folderId); setMoving(null); };

  // Attempt biometric unlock for a private folder
  const unlockFolder = async (folderId) => {
    setBioError("");
    try {
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      await navigator.credentials.get({
        publicKey: { challenge, userVerification: "required", timeout: 30000 }
      });
      setUnlockedFolders(prev => new Set([...prev, folderId]));
      setOpenFolder(folderId);
    } catch (e) {
      if (e.name === "NotAllowedError") setBioError("❌ Autenticación cancelada.");
      else setBioError("❌ No se pudo verificar la identidad. Intenta de nuevo.");
    }
  };

  const handleOpenFolder = (f) => {
    if (f.isPrivate && !unlockedFolders.has(f.id)) {
      unlockFolder(f.id);
    } else {
      setOpenFolder(f.id);
    }
  };

  if (openFolder !== null) {
    const folder = openFolder === "none" ? null : folders.find(f => f.id === openFolder);
    const list = activeNotes.filter(n => openFolder === "none" ? !n.folderId : n.folderId === openFolder);
    return (
      <div style={{ padding: "14px 14px 90px", overflowY: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <button onClick={() => setOpenFolder(null)} style={{ background: "none", border: "none", color: TEXT.muted, fontSize: 18, cursor: "pointer" }}>←</button>
          <span style={{ fontSize: 20 }}>{folder ? (folder.image ? "🖼" : folder.emoji) : "🚫"}</span>
          <div style={{ fontSize: 16, fontWeight: 700, color: TEXT.primary, flex: 1 }}>{folder ? folder.name : "Sin carpeta"}{folder?.isPrivate && <span style={{ fontSize: 12, color: "#a78bfa", marginLeft: 6 }}>🔒</span>}</div>
          {openFolder !== "none" && (
            <button onClick={() => onCreate({ folderId: openFolder })} style={{ background: `${ACCENT}18`, border: `1px solid ${ACCENT}40`, color: ACCENT, padding: "6px 12px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>+ Nota</button>
          )}
        </div>
        {list.length === 0 && <Empty />}
        <div className="notes-grid">
          {list.map((n, i) => (
            <NoteCard key={n.id} n={n} idx={i} onEdit={onEdit} onPin={onPin} onArchive={onArchive} onDelete={onDelete}
              onMoveNote={onMoveNote} onCopyNote={onCopyNote} folders={folders} />
          ))}
        </div>
        {moving && (
          <FolderMoveModal
            folders={folders} note={moving}
            onMove={(fid) => moveNote(moving, fid)}
            onCopy={(fid) => copyNote(moving, fid)}
            onClose={() => setMoving(null)}
            onCreateNew={() => { setMoving(null); setEditing({}); }}
          />
        )}
        {noteAction && (
          <NoteActionMenu
            note={noteAction} folders={folders}
            onMove={(fid) => { moveNote(noteAction, fid); setNoteAction(null); }}
            onCopy={(fid) => { copyNote(noteAction, fid); setNoteAction(null); }}
            onDelete={(id) => { onDelete(id); setNoteAction(null); }}
            onClose={() => setNoteAction(null)}
          />
        )}
      </div>
    );
  }

  return (
    <div style={{ padding: "14px 14px 90px", overflowY: "auto" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: TEXT.primary }}>📁 Mis Carpetas</div>
        <button onClick={() => setEditing({})} style={{ background: `${ACCENT}18`, border: `1px solid ${ACCENT}40`, color: ACCENT, padding: "6px 12px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>+ Nueva carpeta</button>
      </div>

      {bioError && (
        <div style={{ ...G.glass, borderRadius: 10, padding: "10px 14px", marginBottom: 12, color: "#f97676", fontSize: 13 }}>{bioError}</div>

// ── Cada plantilla dinámica también queda disponible como comando slash:
// escribir "/minuta", "/sprint", etc. la inserta con fecha/hora ya rellenadas.
const SLASH_TEMPLATE_COMMANDS = SNIPPETS.map(s => ({
  cmd: s.name,
  emoji: s.emoji,
  label: s.name.charAt(0).toUpperCase() + s.name.slice(1),
  desc: "/" + s.name + " · plantilla",
  insert: () => "\n\n" + fillTemplate(s.text),
  isTemplate: true,
}));

function SlashMenu({ query, pos, onSelect, onClose }) {
  const [idx, setIdx] = useState(0);
  // Sin texto tras la "/": solo comandos rápidos. Escribiendo, también busca entre las plantillas.
  const pool = query ? [...SLASH_COMMANDS, ...SLASH_TEMPLATE_COMMANDS] : SLASH_COMMANDS;
  const filtered = pool.filter(c=>c.cmd.startsWith(query.toLowerCase())||c.label.toLowerCase().includes(query.toLowerCase())).slice(0,8);

  useEffect(()=>{
    const handler=(e)=>{
      if(e.key==="ArrowDown"){e.preventDefault();setIdx(i=>Math.min(i+1,filtered.length-1));}
      else if(e.key==="ArrowUp"){e.preventDefault();setIdx(i=>Math.max(i-1,0));}
      else if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();if(filtered[idx])onSelect(filtered[idx]);}
      else if(e.key==="Escape")onClose();
    };
    window.addEventListener("keydown",handler,true);
    return()=>window.removeEventListener("keydown",handler,true);
  },[idx,filtered,onClose,onSelect]);

  if(!filtered.length)return null;

  const MENU_HEIGHT = Math.min(filtered.length, 8) * 56 + 32; // approx height
  const clampedLeft = Math.min(pos.x, window.innerWidth - 240);
  const flipUp = pos.y > window.innerHeight * 0.70;
  const style = flipUp
    ? { bottom: window.innerHeight - pos.y + 4, top: "auto", left: clampedLeft }
    : { top: pos.y + 4, left: clampedLeft };

  return(
    <>
      <div style={{position:"fixed",inset:0,zIndex:499}} onClick={onClose} />
      <div className="slash-menu" style={style}>
        <div style={{fontSize:12,color:TEXT.muted,padding:"2px 8px 6px",fontWeight:600,letterSpacing:0.5}}>
          {query?"Filtrando: /"+query:`Comandos rápidos · escribe para buscar entre ${SNIPPETS.length} plantillas`}
        </div>
        {filtered.map((c,i)=>(
          <div key={c.cmd} className={`slash-item${i===idx?" active":""}`} onMouseEnter={()=>setIdx(i)} onClick={()=>onSelect(c)}>
            <div className="slash-icon">{c.emoji}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:TEXT.primary}}>{c.label}</div>
              <div style={{fontSize:12,color:TEXT.muted,fontFamily:"JetBrains Mono,monospace"}}>{c.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

// ── Autocompletado de enlaces bi-direccionales: aparece al escribir "[["
function LinkMenu({ query, pos, notes, currentNoteId, onSelect, onClose }) {
  const [idx, setIdx] = useState(0);
  const q = query.toLowerCase();
  const filtered = notes
    .filter(n => n.id !== currentNoteId && !n.deleted && (n.title||"Sin título").toLowerCase().includes(q))
    .slice(0, 8);

  useEffect(()=>{
    const handler=(e)=>{
      if(e.key==="ArrowDown"){e.preventDefault();setIdx(i=>Math.min(i+1,filtered.length-1));}
      else if(e.key==="ArrowUp"){e.preventDefault();setIdx(i=>Math.max(i-1,0));}
      else if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();if(filtered[idx])onSelect(filtered[idx].title||"Sin título");}
      else if(e.key==="Escape")onClose();
    };
    window.addEventListener("keydown",handler,true);
    return()=>window.removeEventListener("keydown",handler,true);
  },[idx,filtered,onClose,onSelect]);

  if(!filtered.length && !query) return null;

  const clampedLeft = Math.min(pos.x, window.innerWidth - 240);
  const flipUp = pos.y > window.innerHeight * 0.70;
  const style = flipUp
    ? { bottom: window.innerHeight - pos.y + 4, top: "auto", left: clampedLeft }
    : { top: pos.y + 4, left: clampedLeft };

  return(
    <>
      <div style={{position:"fixed",inset:0,zIndex:499}} onClick={onClose} />
      <div className="slash-menu" style={style}>
        <div style={{fontSize:12,color:TEXT.muted,padding:"2px 8px 6px",fontWeight:600,letterSpacing:0.5}}>
          🔗 Enlazar nota{query?": "+query:""}
        </div>
        {filtered.map((n,i)=>(
          <div key={n.id} className={`slash-item${i===idx?" active":""}`} onMouseEnter={()=>setIdx(i)} onClick={()=>onSelect(n.title||"Sin título")}>
            <div className="slash-icon">{n.icon||"📝"}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:TEXT.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title||"Sin título"}</div>
            </div>
          </div>
        ))}
        {!filtered.length && (
          <div style={{fontSize:12,color:TEXT.faint,padding:"6px 8px"}}>Sin coincidencias — seguí escribiendo y cerrá con ]]</div>
        )}
      </div>
    </>
  );
}

// ── CONTEXTUAL SIDEBAR
// ── Linked notes selector — explicit bidirectional links stored in note.linkedNoteIds
function LinkedNotesSelector({ note, allNotes, onUpdate }) {
  const [search, setSearch] = useState("");
  const linked = note.linkedNoteIds || [];
  const candidates = allNotes.filter(n =>
    n.id !== note.id && !n.archived && !n.deleted &&
    (search.length < 2 || (n.title||"Sin título").toLowerCase().includes(search.toLowerCase()))
  );
  const toggle = (id) => {
    const next = linked.includes(id) ? linked.filter(x=>x!==id) : [...linked, id];
    onUpdate("linkedNoteIds", next);
  };
  const linkedNotes = allNotes.filter(n => linked.includes(n.id));
  return (
    <div>
      {linkedNotes.length > 0 && (
        <div style={{marginBottom:8}}>
          {linkedNotes.map(n=>(
            <div key={n.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:8,background:`${ACCENT}10`,border:`1px solid ${ACCENT}25`,marginBottom:4}}>
              <span style={{fontSize:16}}>{n.icon}</span>
              <span style={{fontSize:12,color:TEXT.primary,flex:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{n.title||"Sin título"}</span>
              <button onClick={()=>toggle(n.id)} style={{background:"none",border:"none",color:"#f97676",fontSize:14,cursor:"pointer",padding:0,lineHeight:1}}>✕</button>
            </div>
          ))}
        </div>
      )}
      <input
        value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="Buscar nota para vincular..."
        style={{width:"100%",background:"#0f1e30",border:"1px solid #1a3060",borderRadius:8,padding:"7px 10px",color:TEXT.primary,fontSize:12,fontFamily:"inherit",boxSizing:"border-box",marginBottom:6,outline:"none"}}
      />
      {search.length >= 1 && (
        <div style={{maxHeight:140,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
          {candidates.slice(0,8).map(n=>(
            <button key={n.id} onClick={()=>toggle(n.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:8,background:linked.includes(n.id)?`${ACCENT}18`:"#0f1e30",border:`1px solid ${linked.includes(n.id)?ACCENT+"40":"#1a3060"}`,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
              <span style={{fontSize:16}}>{n.icon}</span>
              <span style={{fontSize:12,color:linked.includes(n.id)?ACCENT:TEXT.secondary,flex:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{n.title||"Sin título"}</span>
              <span style={{fontSize:12,color:linked.includes(n.id)?"#f97676":ACCENT}}>{linked.includes(n.id)?"✓ Vinculada":"+ Vincular"}</span>
            </button>
          ))}
          {candidates.length===0&&<div style={{fontSize:12,color:TEXT.faint,padding:"6px 8px"}}>No se encontraron notas.</div>}
        </div>
      )}
      {search.length < 1 && linked.length === 0 && (
        <div style={{fontSize:12,color:TEXT.faint,fontStyle:"italic"}}>Escribe para buscar y vincular notas.</div>
      )}
    </div>
  );
}

// ── Checklist item with inline editing — tap text to edit
function CheckItem({ c, ci, bodyFontSize, onToggle, onDelete, onEdit, ACCENT, G, TEXT }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(c.text);
  const inputRef = useRef(null);
  useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);
  const commit = () => { setEditing(false); if (val.trim() && val.trim() !== c.text) onEdit(val.trim()); else setVal(c.text); };
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,...G.glass,borderRadius:10,padding:"10px 12px",marginBottom:6,border:`1px solid ${editing?"#00f0ff40":ACCENT+"15"}`,transition:"all .2s",animationDelay:`${ci*30}ms`}} className="anim-card">
      <button style={{background:"none",border:"none",cursor:"pointer",fontSize:20,padding:0,flexShrink:0}} onClick={onToggle}>⬜</button>
      {editing ? (
        <input
          ref={inputRef}
          value={val}
          onChange={e=>setVal(e.target.value)}
          onBlur={commit}
          onKeyDown={e=>{ if(e.key==="Enter") commit(); if(e.key==="Escape"){setEditing(false);setVal(c.text);} }}
          style={{flex:1,background:"none",border:"none",outline:"none",fontSize:bodyFontSize,color:"#e0f4ff",fontFamily:"inherit",lineHeight:1.5,padding:0}}
        />
      ) : (
        <span style={{flex:1,fontSize:bodyFontSize,color:TEXT.primary,lineHeight:1.5,cursor:"text"}} onClick={()=>setEditing(true)}>{c.text}</span>
      )}
      {editing
        ? <button style={{background:"none",border:"none",cursor:"pointer",color:"#6feab1",fontSize:14,padding:2,fontWeight:700}} onClick={commit}>✓</button>
        : <button style={{background:"none",border:"none",cursor:"pointer",color:TEXT.faint,fontSize:14,padding:2}} onClick={onDelete}>✕</button>
      }
    </div>
  );
}

const RECURRENCE_OPTS = [
  {id:"once",   label:"Una vez",  emoji:"🔔"},
  {id:"daily",  label:"Diario",   emoji:"📅"},
  {id:"weekly", label:"Semanal",  emoji:"📆"},
  {id:"monthly",label:"Mensual",  emoji:"🗓"},
];

function ScrollPicker({ items, value, onChange, width=64, labelFn }) {
  const ref = useRef(null);
  const ITEM_H = 48;
  const isScrolling = useRef(false);
  const snapTimer = useRef(null);

  // Sync scroll position whenever value or items change
  useEffect(() => {
    if (!ref.current) return;
    const idx = items.indexOf(value);
    if (idx >= 0) {
      ref.current.scrollTo({ top: idx * ITEM_H, behavior: "smooth" });
    }
  }, [value, items]);

  const onScroll = () => {
    if (!ref.current) return;
    clearTimeout(snapTimer.current);
    snapTimer.current = setTimeout(() => {
      const i = Math.round(ref.current.scrollTop / ITEM_H);
      const clamped = Math.max(0, Math.min(i, items.length - 1));
      ref.current.scrollTo({ top: clamped * ITEM_H, behavior: "smooth" });
      if (items[clamped] !== value) onChange(items[clamped]);
    }, 80);
  };

  return (
    <div style={{position:"relative", width, overflow:"hidden", height: ITEM_H*3, borderRadius:10, background:"#080c18"}}>
      {/* Fade top */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:ITEM_H,background:"linear-gradient(to bottom, #080c18ee, transparent)",pointerEvents:"none",zIndex:2}}/>
      {/* Highlight bar */}
      <div style={{position:"absolute",top:ITEM_H,left:0,right:0,height:ITEM_H,background:"#00f0ff18",borderTop:"1px solid #00f0ff50",borderBottom:"1px solid #00f0ff50",pointerEvents:"none",zIndex:1,borderRadius:6}}/>
      {/* Fade bottom */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:ITEM_H,background:"linear-gradient(to top, #080c18ee, transparent)",pointerEvents:"none",zIndex:2}}/>
      <div ref={ref} onScroll={onScroll}
        style={{height:"100%",overflowY:"scroll",scrollSnapType:"y mandatory",scrollbarWidth:"none",WebkitOverflowScrolling:"touch",paddingTop:ITEM_H,paddingBottom:ITEM_H,boxSizing:"border-box"}}>
        {items.map((it, i) => {
          const isActive = it === value;
          return (
            <div key={i}
              onClick={() => { onChange(it); ref.current?.scrollTo({top: i*ITEM_H, behavior:"smooth"}); }}
              style={{height:ITEM_H,display:"flex",alignItems:"center",justifyContent:"center",
                scrollSnapAlign:"start",cursor:"pointer",userSelect:"none",
                fontSize: isActive ? 20 : 16,
                fontWeight: isActive ? 700 : 400,
                color: isActive ? "#e0f4ff" : "#3a5a7a",
                transition:"all .15s",
              }}>
              {labelFn ? labelFn(it) : String(it).padStart(2,"0")}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ReminderModal({ note, onSave, onClose }) {
  const now = new Date();
  const initial = (note.reminder && new Date(note.reminder) > now)
    ? new Date(note.reminder)
    : (() => {
        const d = new Date(); d.setMinutes(d.getMinutes()+30,0,0); return d;
      })();
  const rec = note.recurrence || {type:"once", times:["08:00"]};

  const [day,   setDay]   = useState(initial.getDate());
  const [month, setMonth] = useState(initial.getMonth()+1);
  const [year,  setYear]  = useState(initial.getFullYear());
  const [hour,  setHour]  = useState(initial.getHours());
  const [min,   setMin]   = useState(initial.getMinutes());
  const [recType, setRecType] = useState(rec.type||"once");
  const [times, setTimes] = useState(rec.times||[`${String(initial.getHours()).padStart(2,"0")}:${String(initial.getMinutes()).padStart(2,"0")}`]);
  const [addH, setAddH] = useState(8);
  const [addM, setAddM] = useState(0);
  const [err, setErr] = useState("");
  const [tgConnected, setTgConnected] = useState(()=>!!localStorage.getItem("telegram_chat_id"));
  const [tgChatIdInput, setTgChatIdInput] = useState("");

  const handleConnectTelegram = () => {
    const ok = window.__telegramConnect?.(tgChatIdInput);
    if(ok){ setTgConnected(true); setTgChatIdInput(""); }
    else setErr("Ese chat_id no parece válido — tiene que ser solo números (ver PASOS-TELEGRAM.md, paso 2).");
  };
  const handleDisconnectTelegram = () => {
    window.__telegramDisconnect?.();
    setTgConnected(false);
  };

  const MONTHS=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const daysInMonth = (m,y) => new Date(y,m,0).getDate();
  const days   = useMemo(()=>Array.from({length:daysInMonth(month,year)},(_,i)=>i+1), [month,year]);
  const months = useMemo(()=>Array.from({length:12},(_,i)=>i+1), []);
  const years  = useMemo(()=>Array.from({length:10},(_,i)=>now.getFullYear()+i-1), []); // from last year + 9 more
  const hours  = useMemo(()=>Array.from({length:24},(_,i)=>i), []);
  const mins   = useMemo(()=>Array.from({length:60},(_,i)=>i), []);

  // Extra times management for multi-daily
  const addTime = () => {
    const t = `${String(addH).padStart(2,"0")}:${String(addM).padStart(2,"0")}`;
    if(!times.includes(t)) setTimes(prev=>[...prev,t].sort());
  };
  const removeTime = (t) => setTimes(prev=>prev.filter(x=>x!==t));

  const handleSave = () => {
    const chosen = new Date(year, month-1, day, hour, min, 0, 0);
    const nowFresh = new Date();
    if(recType==="once" && chosen <= nowFresh) {
      setErr("⚠️ La fecha y hora deben ser futuras."); return;
    }
    const reminder = chosen.toISOString();
    const recurrence = recType==="once" ? null : { type:recType, times };
    onSave(reminder, recurrence);
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:600,background:"#000000b0",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={onClose}>
      <div style={{...G.glass,width:"100%",maxWidth:480,borderRadius:20,padding:"20px 18px 24px",maxHeight:"82vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:700,color:"#e0e8ff",marginBottom:16}}>🔔 Recordatorio</div>

        {/* Estado de conexión con Google Calendar */}
        {tgConnected ? (
          <div style={{display:"flex",alignItems:"center",gap:8,background:"#4ade8014",border:"1px solid #4ade8030",borderRadius:10,padding:"8px 12px",marginBottom:16,fontSize:12,color:"#6feab1"}}>
            <span>✅ Conectado a Telegram</span>
            <button onClick={handleDisconnectTelegram} style={{marginLeft:"auto",background:"none",border:"none",color:"#8AACDC",fontSize:11,cursor:"pointer",textDecoration:"underline"}}>Desconectar</button>
          </div>
        ) : (
          <div style={{background:`${ACCENT}0a`,border:`1px solid ${ACCENT}30`,borderRadius:10,padding:"10px 12px",marginBottom:16}}>
            <div style={{fontSize:12,color:ACCENT,fontWeight:700,marginBottom:8}}>✈️ Conectar Telegram para recibir el aviso aunque la app esté cerrada</div>
            <div style={{display:"flex",gap:6}}>
              <input
                value={tgChatIdInput}
                onChange={e=>setTgChatIdInput(e.target.value)}
                placeholder="Tu chat_id (ver PASOS-TELEGRAM.md)"
                style={{flex:1,background:"#00003a",border:`1px solid ${ACCENT}30`,color:"#e0e8ff",padding:"7px 10px",borderRadius:8,fontSize:12,fontFamily:"inherit",outline:"none"}}
              />
              <button onClick={handleConnectTelegram} style={{background:`${ACCENT}20`,border:`1px solid ${ACCENT}50`,color:ACCENT,padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Conectar</button>
            </div>
          </div>
        )}

        {/* Date picker row */}
        <div style={{fontSize:11,color:"#8AACDC",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Fecha</div>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:18,alignItems:"center"}}>
          <ScrollPicker items={days}   value={day}   onChange={v=>{setDay(v);setErr("");}}   width={56} />
          <ScrollPicker items={months} value={month} onChange={v=>{setMonth(v);const mx=daysInMonth(v,year);if(day>mx)setDay(mx);setErr("");}} width={72} labelFn={m=>MONTHS[m-1].toUpperCase()} />
          <ScrollPicker items={years}  value={year}  onChange={v=>{setYear(v);setErr("");}}  width={76} labelFn={y=>String(y)} />
        </div>

        {/* Time picker — always shown (for "once" = the one time; for recurrence = start reference) */}
        {recType==="once" && (<>
          <div style={{fontSize:11,color:"#8AACDC",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Hora</div>
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:12,marginBottom:18}}>
            <ScrollPicker items={hours} value={hour} onChange={v=>{setHour(v);setErr("");}} width={64} />
            <span style={{fontSize:24,color:ACCENT,fontWeight:700}}>:</span>
            <ScrollPicker items={mins}  value={min}  onChange={v=>{setMin(v);setErr("");}}  width={64} />
          </div>
        </>)}

        {/* Recurrence */}
        <div style={{fontSize:11,color:"#8AACDC",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Repetición</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          {RECURRENCE_OPTS.map(r=>(
            <button key={r.id} onClick={()=>setRecType(r.id)} style={{
              padding:"7px 13px",borderRadius:20,border:`1.5px solid ${recType===r.id?ACCENT:"#1a2a5a"}`,
              background:recType===r.id?`${ACCENT}18`:"none",color:recType===r.id?ACCENT:TEXT.muted,
              fontSize:12,fontWeight:recType===r.id?700:400,cursor:"pointer",fontFamily:"inherit",
              display:"flex",alignItems:"center",gap:5
            }}>{r.emoji} {r.label}</button>
          ))}
        </div>

        {/* Multi-time for recurrence */}
        {recType!=="once" && (
          <div style={{...G.glass,borderRadius:12,padding:12,marginBottom:14}}>
            <div style={{fontSize:11,color:"#8AACDC",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>
              Horarios ({recType==="daily"?"se repite cada día":recType==="weekly"?"cada semana":recType==="monthly"?"cada mes":""})
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {times.map(t=>(
                <div key={t} style={{background:`${ACCENT}15`,border:`1px solid ${ACCENT}35`,color:ACCENT,borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                  {t}
                  <button onClick={()=>removeTime(t)} style={{background:"none",border:"none",color:"#f97676",cursor:"pointer",fontSize:14,lineHeight:1,padding:0}}>×</button>
                </div>
              ))}
              {times.length===0&&<span style={{color:"#6A8CC0",fontSize:12}}>Sin horarios — agrega al menos uno</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <ScrollPicker items={hours} value={addH} onChange={setAddH} width={54} />
              <span style={{color:ACCENT,fontWeight:700,fontSize:18}}>:</span>
              <ScrollPicker items={mins}  value={addM} onChange={setAddM} width={54} />
              <button onClick={addTime} style={{flex:1,background:`${ACCENT}20`,border:`1px solid ${ACCENT}50`,color:ACCENT,padding:"8px 10px",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Agregar hora</button>
            </div>
          </div>
        )}

        {err&&<div style={{color:"#f97676",fontSize:12,marginBottom:10,textAlign:"center"}}>{err}</div>}

        <div style={{display:"flex",gap:8,marginTop:4}}>
          {note.reminder&&(
            <button onClick={()=>onSave(null,null)} style={{background:"#f9767612",border:"1px solid #f9767640",color:"#f97676",padding:"11px 14px",borderRadius:12,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Borrar</button>
          )}
          <button onClick={onClose} style={{flex:1,background:"none",border:`1px solid ${ACCENT}25`,color:TEXT.muted,padding:"11px 14px",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
          <button onClick={handleSave} disabled={recType!=="once"&&times.length===0} style={{flex:2,background:ACCENT,border:"none",color:"#001018",padding:"11px 14px",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:recType!=="once"&&times.length===0?0.4:1}}>Establecer</button>
        </div>
      </div>
    </div>
  );
}

  // ── view-only vs edit mode: las notas existentes abren primero para visualizar

  // ── base state
  const [showEmoji,setShowEmoji]=useState(false);
  const [showColor,setShowColor]=useState(false);
  const [showReminder,setShowReminder]=useState(false);
  const [showReminderModal,setShowReminderModal]=useState(false);
  const [showTagInput,setShowTagInput]=useState(false);
  const [newTag,setNewTag]=useState("");
  const [section,setSection]=useState(()=>note.checklist&&note.checklist.length>0?"checklist":"write");
  const [checkInput,setCheckInput]=useState("");
  const [showSnippets,setShowSnippets]=useState(false);
  const [confetti,setConfetti]=useState(false);
  const [showMoreHeader,setShowMoreHeader]=useState(false);
  const [toolGroup,setToolGroup]=useState("vista");
  const [typewriterMode,setTypewriterMode]=useState(false);
  const taRef=useRef(null);

  // ── view modes: write | zen
  const [viewMode,setViewMode]=useState("write");

  // ── sidebar
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const sidebarSwipe=useRef({tracking:false,startX:0});

  // ── slash command state
  const [slash,setSlash]=useState({open:false,query:"",triggerPos:-1,screenY:0,screenX:0});
  const [linkMenu,setLinkMenu]=useState({open:false,query:"",triggerPos:-1,screenY:0,screenX:0});
  const [predict,setPredict]=useState({suggestion:"",wordStart:-1});
  const slashRef=useRef(slash);
  slashRef.current=slash;

  // ── drawing / audio modal state
  const [showDrawing,setShowDrawing]=useState(false);
  const [showAudioRec,setShowAudioRec]=useState(false);

  // ── drag-and-drop blocks (paragraphs)
  const [dragIdx,setDragIdx]=useState(null);
  const [dropIdx,setDropIdx]=useState(null);
  const [dropSide,setDropSide]=useState("bot"); // "top"|"bot"

  // ── pinch-to-zoom font size
  const FONT_KEY="myo_font_size";
  const [bodyFontSize,setBodyFontSize]=useState(()=>{ try{return parseInt(localStorage.getItem(FONT_KEY)||"17");}catch{return 17;} });

  // ── auto snapshot every 60 s
  const snapTimerRef=useRef(null);
  useEffect(()=>{
    snapTimerRef.current=setInterval(()=>{
      if(note.content.trim().length>10){
        const snap={ts:Date.now(),content:note.content};
        setNote(p=>{
          const hist=(p.contentHistory||[]).slice(-14);
          const last=hist[hist.length-1];
          if(last&&last.content===note.content) return p;
          return {...p,contentHistory:[...hist,snap]};
        });
      }
    },60000);
    return()=>clearInterval(snapTimerRef.current);
  },[]);

  // ── duplicate title warning
  const hasDuplicate=allNotes&&allNotes.some(n=>n.id!==note.id&&n.title.trim()&&n.title.trim()===note.title.trim());

  // ── helpers
  const upd=(k,v)=>setNote(p=>({...p,[k]:v}));

  // ── Texto predictivo: frecuencia de palabras (4+ letras) de TODAS tus notas
  const wordFreq = React.useMemo(()=>{
    const freq={};
    (allNotes||[]).forEach(n=>{
      const words=(n.content||"").toLowerCase().match(/[a-záéíóúñü]{4,}/g)||[];
      words.forEach(w=>{freq[w]=(freq[w]||0)+1;});
    });
    return freq;
  },[allNotes]);

  // ── Devuelve la mejor sugerencia para completar la palabra que se está escribiendo
  const getPredictSuggestion=(word)=>{
    const w=word.toLowerCase();
    if(w.length<2) return "";
    let best="",bestFreq=0;
    for(const cand in wordFreq){
      if(cand!==w && cand.startsWith(w) && wordFreq[cand]>bestFreq){
        best=cand; bestFreq=wordFreq[cand];
      }
    }
    return best ? best.slice(w.length) : "";
  };

  // ── Acepta la sugerencia activa (Tab o clic) completando la palabra
  const acceptPredict=()=>{
    if(!predict.suggestion) return;
    const ta=taRef.current;if(!ta)return;
    const pos=ta.selectionStart;
    const newContent=note.content.substring(0,pos)+predict.suggestion+note.content.substring(pos);
    upd("content",newContent);
    setPredict({suggestion:"",wordStart:-1});
    setTimeout(()=>{const np=pos+predict.suggestion.length;ta.focus();ta.setSelectionRange(np,np);},10);
  };

  const insert=(b,a="")=>{
    const ta=taRef.current;if(!ta)return;
    const s=ta.selectionStart,e=ta.selectionEnd;
    const sel=note.content.substring(s,e)||"texto";
    upd("content",note.content.substring(0,s)+b+sel+a+note.content.substring(e));
    setTimeout(()=>{ta.focus();ta.setSelectionRange(s+b.length,s+b.length+sel.length);},10);
  };

  const insertLine=(prefix)=>{
    const ta=taRef.current;if(!ta)return;
    const pos=ta.selectionStart;
    const ls=note.content.lastIndexOf("\n",pos-1)+1;
    upd("content",note.content.substring(0,ls)+prefix+note.content.substring(ls));
    setTimeout(()=>{ta.focus();ta.setSelectionRange(pos+prefix.length,pos+prefix.length);},10);
  };

  // ── Negrita/Cursiva/Tachado: transforma la selección a caracteres Unicode
  // con el estilo ya aplicado (sin **, _ ni ~~ envolviendo el texto).
  const applyUnicodeStyle=(style)=>{
    const ta=taRef.current;if(!ta)return;
    const s=ta.selectionStart,e=ta.selectionEnd;
    const sel=note.content.substring(s,e);
    if(!sel){ showToast?.("Seleccioná el texto primero","warn"); return; }
    const styled=toUnicodeStyle(sel,style);
    upd("content",note.content.substring(0,s)+styled+note.content.substring(e));
    setTimeout(()=>{ta.focus();ta.setSelectionRange(s,s+styled.length);},10);
  };

  // ── checklist handlers
  const [acSuggestions, setAcSuggestions] = useState([]); // autocomplete suggestions

  const addCheck=()=>{
    if(!checkInput.trim())return;
    const text=checkInput.trim().toLowerCase();
    // Check if this text matches a completed item → re-activate it
    const existingDone = note.checklist.find(c => c.done && c.text.toLowerCase()===text);
    if(existingDone){
      // Re-activate: unmark as done
      upd("checklist", note.checklist.map(c=>c.id===existingDone.id?{...c,done:false}:c));
      showToast("♻️ Tarea reactivada");
    } else {
      const exactExists = note.checklist.find(c => !c.done && c.text.toLowerCase()===text);
      if(!exactExists){
        setNote(p=>({...p,checklist:[...p.checklist,{id:String(Date.now()),text:checkInput.trim(),done:false}]}));
      }
    }
    setCheckInput("");
    setAcSuggestions([]);
  };

  const handleCheckInputChange = (val) => {
    setCheckInput(val);
    if(val.trim().length < 1){ setAcSuggestions([]); return; }
    const q = val.trim().toLowerCase();
    // Build word pool from ALL notes' checklists
    const allWords = new Set();
    // Current note items (done + pending)
    note.checklist.forEach(c => c.text.split(/\s+/).forEach(w=>w.length>2&&allWords.add(c.text)));
    // Other notes
    if(allNotes) allNotes.forEach(n => (n.checklist||[]).forEach(c => allWords.add(c.text)));
    const matches = [...allWords].filter(w => w.toLowerCase().startsWith(q) && w.toLowerCase()!==q).slice(0,5);
    // Also surface completed items that match (for re-activation hint)
    const doneMatches = note.checklist.filter(c=>c.done && c.text.toLowerCase().includes(q) && !matches.includes(c.text)).map(c=>({text:c.text,isDone:true}));
    setAcSuggestions([...matches.map(t=>({text:t,isDone:note.checklist.some(c=>c.done&&c.text===t)})), ...doneMatches].slice(0,6));
  };

  const toggleCheck=(id)=>{
    const updated=note.checklist.map(c=>c.id===id?{...c,done:!c.done}:c);
    upd("checklist",updated);
    // ── AUTOMATION: all tasks done → change icon & confetti
    const allDone=updated.length>0&&updated.every(c=>c.done);
    if(allDone){
      setConfetti(true);
      upd("icon","✅");
      showToast("🎉 ¡Lista completada! Ícono actualizado automáticamente.");
    }
  };

  const delCheck=(id)=>upd("checklist",note.checklist.filter(c=>c.id!==id));

  const addTag=(value)=>{
    const t=(value??newTag).trim().toLowerCase();
    if(t&&!note.tags.includes(t)){
      upd("tags",[...note.tags,t]);
      setNewTag(""); setShowTagInput(false);
    }
  };

  // ── etiquetas ya usadas en cualquier otra nota, para sugerir mientras se escribe
  const allExistingTags = React.useMemo(()=>{
    if(!allNotes) return [];
    return [...new Set(allNotes.flatMap(n=>n.tags||[]))].sort();
  },[allNotes]);
  const tagSuggestions = React.useMemo(()=>{
    const q=newTag.trim().toLowerCase();
    if(!q) return [];
    return allExistingTags.filter(t=>t.includes(q)&&!note.tags.includes(t)).slice(0,6);
  },[newTag, allExistingTags, note.tags]);

  // ── NLP title change
  const handleTitleChange=(v)=>{
    upd("title",v);
    const {tags,reminder}=autoDetectInfo(v);
    if(tags.length>0) upd("tags",[...new Set([...note.tags,...tags])]);
    if(reminder&&!note.reminder) upd("reminder",reminder);
  };

  // ── Modo Typewriter: mantiene la línea activa centrada verticalmente
  React.useEffect(() => {
    if (!typewriterMode || section !== "write") return;
    const ta = taRef.current;
    if (!ta) return;

    const updatePadding = () => {
      const pad = Math.max(0, ta.clientHeight / 2);
      ta.style.paddingTop = pad + "px";
      ta.style.paddingBottom = pad + "px";
    };
    const centerCaretLine = () => {
      const lineHeightPx = bodyFontSize * 1.8;
      const before = ta.value.substring(0, ta.selectionStart);
      const lineIndex = before.split("\n").length - 1;
      ta.scrollTop = lineIndex * lineHeightPx;
    };

    updatePadding();
    centerCaretLine();
    const handler = () => requestAnimationFrame(centerCaretLine);
    ta.addEventListener("keyup", handler);
    ta.addEventListener("click", handler);
    ta.addEventListener("input", handler);
    window.addEventListener("resize", updatePadding);

    return () => {
      ta.style.paddingTop = "";
      ta.style.paddingBottom = "";
      ta.removeEventListener("keyup", handler);
      ta.removeEventListener("click", handler);
      ta.removeEventListener("input", handler);
      window.removeEventListener("resize", updatePadding);
    };
  }, [typewriterMode, section, bodyFontSize]);

  // ── slash command detection + título automático
  const handleContentChange=(v)=>{
    const evaluated=evalMath(v);
    upd("content",evaluated);
    // Si no hay título, lo derivamos de la primera línea con texto del contenido
    if(!note.title.trim()){
      const firstLine=evaluated.split("\n").find(l=>l.trim().length>0)||"";
      const clean=firstLine
        .replace(/^#{1,6}\s*/,"")
        .replace(/^[-*•]\s*(\[[ xX]\]\s*)?/,"")
        .replace(/[*_`~]/g,"")
        .trim();
      if(clean) upd("title", clean.length>60 ? clean.slice(0,60)+"…" : clean);
    }
    const ta=taRef.current;if(!ta)return;
    setTimeout(()=>{
      const cur=ta.selectionStart;
      const textBefore=v.substring(0,cur);
      const lastNL=textBefore.lastIndexOf("\n");
      const lineStart=textBefore.substring(lastNL+1);
      const slashInLine=lineStart.lastIndexOf("/");
      if(slashInLine>=0){
        const charBefore=slashInLine>0?lineStart[slashInLine-1]:"";
        const between=lineStart.substring(slashInLine+1);
        // Solo cuenta como comando si la "/" está al inicio de la línea o
        // después de un espacio — así "18/07" o "1/2" no la disparan.
        if((slashInLine===0||charBefore===" ")&&!between.includes(" ")&&between.length<22){
          const rect=ta.getBoundingClientRect();
          setSlash({open:true,query:between,triggerPos:cur-between.length-1,
            screenY:rect.top+16, screenX:rect.left+12});
          return;
        }
      }
      setSlash(s=>({...s,open:false}));

      // ── Detecta "[[" para abrir el buscador de notas (enlaces bi-direccionales)
      const linkOpenIdx=textBefore.lastIndexOf("[[");
      const linkCloseIdx=textBefore.lastIndexOf("]]");
      if(linkOpenIdx>linkCloseIdx){
        const between=textBefore.substring(linkOpenIdx+2);
        if(!between.includes("\n")&&between.length<40){
          const rect=ta.getBoundingClientRect();
          setLinkMenu({open:true,query:between,triggerPos:linkOpenIdx,
            screenY:rect.top+16, screenX:rect.left+12});
          return;
        }
      }
      setLinkMenu(s=>({...s,open:false}));

      // ── Texto predictivo: sugiere completar la palabra que se está escribiendo
      const wordMatch=textBefore.match(/[a-záéíóúñü]+$/i);
      if(wordMatch&&wordMatch[0].length>=2){
        const wordStart=cur-wordMatch[0].length;
        const suggestion=getPredictSuggestion(wordMatch[0]);
        setPredict(suggestion?{suggestion,wordStart}:{suggestion:"",wordStart:-1});
      } else {
        setPredict({suggestion:"",wordStart:-1});
      }
    },0);
  };

  // ── inserta el título elegido y cierra el enlace con ]]
  const handleLinkSelect=(title)=>{
    const ta=taRef.current;
    const pos=ta?ta.selectionStart:note.content.length;
    const before=note.content.substring(0,linkMenu.triggerPos);
    // Si ya había "]" tipeados a mano justo después del cursor (o quedaron de
    // un intento anterior), los descartamos para no duplicar el cierre.
    const after=note.content.substring(pos).replace(/^\]+/, "");
    const insertText=`[[${title}]]`;
    upd("content",before+insertText+after);
    setLinkMenu(s=>({...s,open:false}));
    setTimeout(()=>{
      if(ta){const np=linkMenu.triggerPos+insertText.length;ta.focus();ta.setSelectionRange(np,np);}
    },20);
  };

  // ── notas que enlazan a esta (backlinks) — usa la misma detección precisa que el panel y el mapa
  const backlinks = React.useMemo(()=>{
    if(!allNotes) return [];
    return allNotes.filter(n=>n.id!==note.id && !n.deleted && notesLinkTo(note.title, n.content));
  },[allNotes, note.title, note.id]);

  // ── slash select handler
  const handleSlashSelect=(cmd)=>{
    setSlash(s=>({...s,open:false}));
    if(cmd.modal==="drawing"){ setShowDrawing(true); return; }
    if(cmd.modal==="audio"){ setShowAudioRec(true); return; }
    const ta=taRef.current;
    const insertText=typeof cmd.insert==="function"?cmd.insert():cmd.insert;
    const pos=ta?ta.selectionStart:note.content.length;
    const before=note.content.substring(0,slash.triggerPos);
    const after=note.content.substring(pos);
    upd("content",before+insertText+after);
    setTimeout(()=>{
      if(ta){const np=slash.triggerPos+insertText.length;ta.focus();ta.setSelectionRange(np,np);}
    },20);
    showToast(`✅ /${cmd.cmd} insertado`);
  };

  // ── snippet insertion
  const insertSnippet=(s)=>{
    upd("content",(note.content?note.content+"\n\n":"")+fillTemplate(s.text));
    setShowSnippets(false);
    showToast("📋 Plantilla insertada");
  };

  // ── sidebar edge-swipe (single finger from right edge → opens sidebar)
  const handleEdgeSwipeStart=useCallback((e)=>{
    if(e.touches.length===1 && e.touches[0].clientX > window.innerWidth-36)
      sidebarSwipe.current={tracking:true,startX:e.touches[0].clientX};
    else
      sidebarSwipe.current={tracking:false,startX:0};
  },[]);

  const handleEdgeSwipeMove=useCallback((e)=>{
    if(sidebarSwipe.current.tracking && e.touches.length===1){
      if(sidebarSwipe.current.startX - e.touches[0].clientX > 52) setSidebarOpen(true);
    }
  },[]);

  const handleEdgeSwipeEnd=useCallback(()=>{
    sidebarSwipe.current.tracking=false;
  },[]);

  // ── drag-and-drop blocks (paragraphs)
  const blocks=note.content.split(/\n{2,}/);
  const saveBlocks=(arr)=>upd("content",arr.join("\n\n"));

  const handleDragStart=(i)=>setDragIdx(i);
  const handleDragOver=(e,i)=>{
    e.preventDefault();
    const rect=e.currentTarget.getBoundingClientRect();
    setDropIdx(i);
    setDropSide(e.clientY<rect.top+rect.height/2?"top":"bot");
  };
  const handleDrop=()=>{
    if(dragIdx===null||dropIdx===null||dragIdx===dropIdx){setDragIdx(null);setDropIdx(null);return;}
    const arr=[...blocks];
    const [moved]=arr.splice(dragIdx,1);
    const insertAt=dropSide==="top"?(dropIdx>dragIdx?dropIdx-1:dropIdx):( dropIdx<dragIdx?dropIdx+1:dropIdx);
    arr.splice(insertAt,0,moved);
    saveBlocks(arr);
    setDragIdx(null);setDropIdx(null);
    showToast("↕️ Bloque movido");
  };

  const FORMATS=[
    {sym:"B",  icon:"🖍️", label:"Negrita",  color:"#7eb8f7", action:()=>applyUnicodeStyle("bold")},
    {sym:"I",  icon:"🖋️", label:"Cursiva",  color:"#a78bfa", action:()=>applyUnicodeStyle("italic")},
    {sym:"H1", icon:"📰", label:"Título",   color:"#6feab1", action:()=>insert("## ")},
    {sym:"•",  icon:"🎯", label:"Viñeta",   color:"#f7c948", action:()=>insertLine("• ")},
    {sym:"~~", icon:"✂️", label:"Tachado",  color:"#f97676", action:()=>applyUnicodeStyle("strike")},
    {sym:"</>",icon:"💻", label:"Código",   color:"#4ade80", action:()=>insert("`","`")},
    {sym:"/",  icon:"⚡", label:"Comando",  color:ACCENT,    action:()=>{
      const ta=taRef.current;if(!ta)return;
      const pos=ta.selectionStart;
      upd("content",note.content.substring(0,pos)+"/"+note.content.substring(pos));
      setTimeout(()=>{ta.focus();ta.setSelectionRange(pos+1,pos+1);},10);
    }},
  ];

  // ── Zen mode guard
  if(viewMode==="zen") return <ZenMode note={note} onClose={()=>setViewMode("write")} bodyFontSize={bodyFontSize} allNotes={allNotes} onOpenNote={onOpenNote} />;

  // ── VIEW-ONLY MODE: al abrir una nota existente se muestra primero para leer,
  // no para editar. Solo el botón "Editar" habilita la edición.
  if(!editing){
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:note.color||BASE}}>
        {/* ── STICKY HEADER (solo lectura) */}
        <div style={{...G.glass,position:"sticky",top:0,zIndex:50,borderBottom:`1px solid ${ACCENT}15`}}>
          <div style={{display:"flex",alignItems:"center",gap:4,padding:"8px 10px",flexWrap:"wrap"}}>
            <button title="Cerrar" className="nb-icon" style={{color:"#f97676"}} onClick={onBack}>❌</button>

            <span style={{fontSize:11,color:TEXT.muted,fontWeight:700,letterSpacing:1,background:`${ACCENT}10`,border:`1px solid ${ACCENT}20`,padding:"4px 9px",borderRadius:8,flexShrink:0}}>👁 VISTA</span>

            {/* Archivar */}
            <button title={note.archived?"Restaurar nota":"Archivar nota"} style={{background:note.archived?"#a78bfa20":"#7c3aed18",border:`1px solid ${note.archived?"#a78bfa50":"#7c3aed40"}`,cursor:"pointer",color:note.archived?"#a78bfa":"#9d6bfa",padding:"4px 8px",borderRadius:8,display:"flex",alignItems:"center",gap:2,fontSize:14,flexShrink:0}} onClick={()=>{onArchive(note.id);showToast(note.archived?"📤 Nota restaurada":"📦 Nota archivada");onBack();}}>
              <span>{note.archived?"📤":"📦"}</span>
            </button>

            {/* Eliminar */}
            <button title="Eliminar nota" style={{background:"#f9767618",border:"1px solid #f9767638",cursor:"pointer",color:"#f97676",padding:"4px 8px",borderRadius:8,display:"flex",alignItems:"center",flexShrink:0}} onClick={()=>onDelete(note.id)}>
              <span style={{fontSize:15}}>🗑️</span>
            </button>

            {/* Editar */}
            <button title="Editar nota" style={{background:`${ACCENT}28`,border:`1px solid ${ACCENT}60`,cursor:"pointer",padding:"7px 16px",borderRadius:20,fontSize:14,fontWeight:700,color:ACCENT,flexShrink:0,marginLeft:"auto",display:"flex",alignItems:"center",gap:6,lineHeight:1,fontFamily:"inherit"}} onClick={()=>setEditing(true)}>
              ✏️ Editar
            </button>
          </div>
        </div>

        {/* ── CONTENIDO (solo lectura) — doble clic en cualquier parte para editar */}
        <div style={{flex:1,overflowY:"auto",padding:"18px 18px 100px",cursor:"text"}} onDoubleClick={()=>setEditing(true)} title="Doble clic para editar">
          <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
            <span style={{fontSize:30,lineHeight:1}}>{note.icon}</span>
            <div style={{fontSize:TYPE.headline.fontSize,fontWeight:TYPE.headline.fontWeight,color:TEXT.primary,letterSpacing:TYPE.headline.letterSpacing,wordBreak:"break-word",paddingTop:2}}>
              {note.title || <span style={{color:TEXT.faint,fontStyle:"italic"}}>Sin título</span>}
            </div>
          </div>

          {(note.pinned||note.locked||note.archived||note.reminder)&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {note.pinned&&<span style={{fontSize:12,color:"#f7c948",background:"#f7c94815",border:"1px solid #f7c94830",padding:"2px 9px",borderRadius:20}}>⭐ Fijada</span>}
              {note.locked&&<span style={{fontSize:12,color:"#a78bfa",background:"#a78bfa15",border:"1px solid #a78bfa30",padding:"2px 9px",borderRadius:20}}>🔒 Privada</span>}
              {note.archived&&<span style={{fontSize:12,color:"#9d6bfa",background:"#7c3aed15",border:"1px solid #7c3aed30",padding:"2px 9px",borderRadius:20}}>📦 Archivada</span>}
              {note.reminder&&<span style={{fontSize:12,color:TEXT.warn,background:"#f7c94815",border:"1px solid #f7c94830",padding:"2px 9px",borderRadius:20}}>🔔 Recordatorio</span>}
            </div>
          )}

          {note.tags&&note.tags.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
              {note.tags.map(t=><span key={t} className="tag-chip" style={{cursor:"default"}}>#{t}</span>)}
            </div>
          )}

          {note.checklist&&note.checklist.length>0&&(
            <div style={{marginBottom:18}}>
              <div style={{height:3,borderRadius:2,background:"#080818",overflow:"hidden",marginBottom:4}}>
                <div style={{height:"100%",borderRadius:2,background:`linear-gradient(90deg,${ACCENT},${ACCENT2})`,width:`${Math.round(note.checklist.filter(c=>c.done).length/note.checklist.length*100)}%`}} />
              </div>
              <div style={{fontSize:12,color:TEXT.muted,marginBottom:8,textAlign:"right"}}>{note.checklist.filter(c=>c.done).length}/{note.checklist.length} completados</div>
              {note.checklist.filter(c=>!c.done).map(c=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,...G.glass,borderRadius:10,padding:"9px 12px",marginBottom:6,border:`1px solid ${ACCENT}15`}}>
                  <span style={{fontSize:18,flexShrink:0}}>⬜</span>
                  <span style={{flex:1,fontSize:bodyFontSize-1,color:TEXT.primary,lineHeight:1.5}}>{c.text}</span>
                </div>
              ))}
              {note.checklist.filter(c=>c.done).length>0&&(
                <CompletedSection checklist={note.checklist} bodyFontSize={bodyFontSize-1} onToggle={()=>{}} onDelete={()=>{}} ACCENT={ACCENT} ACCENT2={ACCENT2} G={G} TEXT={TEXT} />
              )}
            </div>
          )}

          <div className="note-content" style={{fontSize:bodyFontSize,lineHeight:1.8,color:TEXT.primary,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
            {note.content ? renderLinkedText(note.content, allNotes, onOpenNote) : <span style={{color:TEXT.faint,fontStyle:"italic"}}>Esta nota está vacía. Toca «Editar» para empezar a escribir.</span>}
          </div>

          {((note.drawings&&note.drawings.length>0)||(note.audioClips&&note.audioClips.length>0))&&(
            <div style={{marginTop:18,display:"flex",flexWrap:"wrap",gap:8}}>
              {(note.drawings||[]).map(d=>(
                <div key={d.id} style={{cursor:"pointer"}} onClick={()=>{
                  const w=window.open("","_blank","width=720,height=540");
                  w.document.write(`<body style="margin:0;background:#05050f"><img src="${d.dataURL}" style="max-width:100%;max-height:100vh;display:block;margin:auto"/></body>`);
                }}>
                  <img src={d.dataURL} style={{width:84,height:56,objectFit:"cover",borderRadius:8,border:`1px solid ${ACCENT}40`}} title="Ver dibujo" />
                </div>
              ))}
              {(note.audioClips||[]).map(clip=>(
                <div key={clip.createdAt} style={{display:"flex",flexDirection:"column",gap:5,background:`${ACCENT}10`,border:`1px solid ${ACCENT}30`,borderRadius:12,padding:"8px 10px",width:"100%"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:14}}>🎙</span>
                    <span style={{fontSize:11,color:TEXT.muted,flex:1}}>
                      {new Date(clip.createdAt).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})}
                      {clip.duration ? " · "+Math.floor(clip.duration/1000)+"s" : ""}
                    </span>
                  </div>
                  {clip.b64&&<audio src={clip.b64} controls style={{width:"100%",height:28,borderRadius:6}} />}
                  {clip.transcript&&(
                    <div style={{fontSize:12,color:TEXT.secondary,lineHeight:1.55,borderTop:`1px solid ${ACCENT}15`,paddingTop:5,marginTop:2}}>
                      <span style={{fontSize:10,color:ACCENT,fontWeight:700,letterSpacing:1,marginRight:5}}>📝</span>
                      {clip.transcript}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          <div style={{marginTop:22,paddingTop:14,borderTop:`1px solid ${ACCENT}12`,display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
            <span style={{fontSize:12,color:TEXT.muted}}>📋 {note.kanbanCol}</span>
            <span style={{fontSize:12,color:TEXT.faint}}>· Actualizada {timeSince(note.updatedAt)}</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:note.color||BASE}}
      onTouchStart={handleEdgeSwipeStart}
      onTouchMove={handleEdgeSwipeMove}
      onTouchEnd={handleEdgeSwipeEnd}
    >
      {confetti&&<Confetti onDone={()=>setConfetti(false)} />}

      {/* Contextual Sidebar */}
      {sidebarOpen&&(
        <ContextualSidebar
          note={note}
          allNotes={allNotes||[]}
          onClose={()=>setSidebarOpen(false)}
          onUpdate={upd}
          showToast={showToast}
          bodyFontSize={bodyFontSize}
          setBodyFontSize={setBodyFontSize}
          onOpenReminder={()=>{setSidebarOpen(false);setShowReminderModal(true);}}
        />
      )}

      {/* ── STICKY HEADER */}
      <div style={{...G.glass,position:"sticky",top:0,zIndex:50,borderBottom:`1px solid ${ACCENT}15`}}>
        {/* Row 1: back + view tabs + actions */}
        <div style={{display:"flex",alignItems:"center",gap:2,padding:"8px 10px",flexWrap:"wrap"}}>
          <button title="Cerrar" className="nb-icon" style={{color:"#f97676"}} onClick={onBack}>❌</button>

          {/* View mode tabs + Recordatorio al costado de Zen */}
          <div style={{display:"flex",gap:1,flexShrink:0}}>
            {[{id:"write",icon:"📝",tip:"Editar"},{id:"zen",icon:"🌌",tip:"Zen"}].map(m=>(
              <button key={m.id} className={`view-tab${viewMode===m.id?" active":""}`} onClick={()=>setViewMode(m.id)} title={m.tip}>
                {m.icon}
              </button>
            ))}
            <button className="view-tab" title="Recordatorio" onClick={()=>{setShowReminderModal(true);setShowEmoji(false);setShowColor(false);setShowReminder(false);}} style={{position:"relative"}}>
              🔔
              {note.reminder&&<span style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:"#f7c948"}} />}
            </button>
            <button className={`view-tab${typewriterMode?" active":""}`} onClick={()=>setTypewriterMode(v=>!v)} title="Modo máquina de escribir">⌨️</button>
          </div>

          {/* Más: agrupa Info / Ícono / Archivar / Eliminar */}
          <button className={`nb-chip${showMoreHeader?" open":""}`} onClick={()=>setShowMoreHeader(v=>!v)}>
            <span className="e">🧰</span><span>Más</span>
          </button>

          {/* Guardar */}
          <button title="Guardar nota" className="nb-save" style={{marginLeft:"auto"}} onClick={()=>onSave(note)}>
            💾
          </button>
        </div>

        {showMoreHeader&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"2px 10px 10px"}}>
            <button className="nb-fmt" style={{"--fc14":`${ACCENT}1c`}} title={`Panel de nota · Fuente: ${bodyFontSize}px`} onClick={()=>{setSidebarOpen(true);setShowMoreHeader(false);}}>
              <span className="e">📊</span><span className="t" style={{color:ACCENT}}>{bodyFontSize}px</span>
            </button>
            <button className="nb-fmt" style={{"--fc14":"#f7c94822"}} title="Cambiar ícono" onClick={()=>{setShowEmoji(e=>!e);setShowColor(false);setShowReminder(false);setShowMoreHeader(false);}}>
              <span className="e">{note.icon}</span><span className="t" style={{color:"#f7c948"}}>Ícono</span>
            </button>
            <button className="nb-fmt" style={{"--fc14":"#7c3aed22"}} title={note.archived?"Restaurar nota":"Archivar nota"} onClick={()=>{onArchive(note.id);showToast(note.archived?"📤 Nota restaurada":"📦 Nota archivada");onBack();}}>
              <span className="e">{note.archived?"📤":"📦"}</span><span className="t" style={{color:"#9d6bfa"}}>{note.archived?"Restaurar":"Archivar"}</span>
            </button>
            <button className="nb-fmt" style={{"--fc14":"#f9767622"}} title="Eliminar nota" onClick={()=>onDelete(note.id)}>
              <span className="e">🗑️</span><span className="t" style={{color:"#f97676"}}>Eliminar</span>
            </button>
          </div>
        )}
      </div>

      {/* ── PANELS (emoji, color, reminder, snippets) */}
      {showEmoji&&(
        <div style={{...G.glass,padding:14,margin:"0 12px 8px",borderRadius:14}} className="anim-modal">
          <div style={{fontSize:12,color:ACCENT,marginBottom:8,fontWeight:700}}>Ícono de nota</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{EMOJI_ICONS.map(e=><button key={e} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,padding:4,borderRadius:8}} onClick={()=>{upd("icon",e);setShowEmoji(false);}}>{e}</button>)}</div>
        </div>
      )}
      {showColor&&(
        <div style={{...G.glass,padding:14,margin:"0 12px 8px",borderRadius:14}} className="anim-modal">
          <div style={{fontSize:12,color:ACCENT,marginBottom:8,fontWeight:700}}>Color de fondo</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{NOTE_COLORS.map(c=><button key={c} style={{width:32,height:32,borderRadius:8,background:c,cursor:"pointer",border:note.color===c?`2px solid ${ACCENT}`:"2px solid transparent"}} onClick={()=>{upd("color",c);setShowColor(false);}} />)}</div>
        </div>
      )}
      {showReminder&&(
        <div style={{...G.glass,padding:14,margin:"0 12px 8px",borderRadius:14}} className="anim-modal">
          <div style={{fontSize:12,color:ACCENT,marginBottom:8,fontWeight:700}}>🔔 Recordatorio</div>
          <button onClick={()=>{setShowReminderModal(true);}} style={{width:"100%",background:`${ACCENT}15`,border:`1.5px solid ${ACCENT}40`,color:ACCENT,padding:"10px 14px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
            {note.reminder
              ? `🔔 ${new Date(note.reminder).toLocaleString("es",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}${note.recurrence?` · ${RECURRENCE_OPTS.find(r=>r.id===note.recurrence.type)?.label||""}`:""}`
              : "📅 Configurar recordatorio..."}
          </button>
          {note.reminder&&(
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {note.recurrence&&(
                <div style={{flex:1,fontSize:11,color:"#8AACDC"}}>
                  {note.recurrence.type!=="once"&&`⏱ ${note.recurrence.times?.join(", ")}`}
                </div>
              )}
              <button style={{background:"none",border:"none",cursor:"pointer",color:"#f97676",fontSize:12,fontFamily:"inherit"}} onClick={()=>{upd("reminder",null);upd("recurrence",null);setShowReminder(false);showToast("🔔 Recordatorio eliminado");}}>Quitar</button>
            </div>
          )}
        </div>
      )}
      {showSnippets&&(
        <div style={{...G.glass,padding:14,margin:"0 12px 8px",borderRadius:14,maxHeight:420,overflowY:"auto"}} className="anim-modal">
          <div style={{fontSize:12,color:ACCENT,marginBottom:10,fontWeight:700}}>📄 Plantillas · {SNIPPETS.length}</div>
          <TemplateGallery mode="insert" onSelect={insertSnippet} />
        </div>
      )}

      {/* ── TOOLBAR REDISEÑADA: Vista / Formato / Multimedia en una sola línea, sin contornos */}
      <div style={{padding:"6px 12px 10px",borderBottom:`1px solid ${ACCENT}10`}}>
        <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
          <button className={`nb-tab${toolGroup==="vista"?" open":""}`} style={{"--tc":"#7eb8f722","--tsolid":"#7eb8f7"}} onClick={()=>setToolGroup("vista")}>
            <span className="e">👁️</span><span>Vista</span>
          </button>
          {(section==="write"||section==="blocks")&&<>
            <button className={`nb-tab${toolGroup==="formato"?" open":""}`} style={{"--tc":"#f7c94822","--tsolid":"#f7c948"}} onClick={()=>setToolGroup("formato")}>
              <span className="e">🎨</span><span>Formato</span>
            </button>
            <button className={`nb-tab${toolGroup==="multimedia"?" open":""}`} style={{"--tc":"#4ade8022","--tsolid":"#4ade80"}} onClick={()=>setToolGroup("multimedia")}>
              <span className="e">🎬</span><span>Multimedia</span>
            </button>
          </>}
        </div>

        {/* Panel Vista: los 3 modos de sección */}
        {(toolGroup==="vista"||section==="checklist")&&(
          <div style={{display:"flex",gap:4,flexWrap:"wrap",paddingTop:8}}>
            {[{id:"write",label:"Texto",icon:"🔤",col:"#7eb8f7"},{id:"blocks",label:"Bloques",icon:"🧱",col:"#a78bfa"},{id:"checklist",label:"Lista",icon:"📋",col:"#6feab1"}].map(s=>(
              <button key={s.id} className={`nb-fmt${section===s.id?" active":""}`} style={{"--fc14":`${s.col}22`}} title={s.label} onClick={()=>setSection(s.id)}>
                <span className="e">{s.icon}</span>
                <span className="t" style={{color:s.col}}>{s.label}</span>
              </button>
            ))}
          </div>
        )}

        {/* Panel Formato */}
        {toolGroup==="formato"&&(section==="write"||section==="blocks")&&(
          <div style={{display:"flex",gap:4,flexWrap:"wrap",paddingTop:8}}>
            {FORMATS.slice(0,5).map((f,i)=>(
              <button key={i} className="nb-fmt" style={{"--fc14":`${f.color}22`}} onClick={f.action} title={f.label}>
                <span className="e">{f.icon}</span>
                <span className="t" style={{color:f.color}}>{f.label}</span>
              </button>
            ))}
          </div>
        )}

        {/* Panel Multimedia */}
        {toolGroup==="multimedia"&&(section==="write"||section==="blocks")&&(
          <div style={{display:"flex",gap:4,flexWrap:"wrap",paddingTop:8}}>
            {FORMATS.slice(5).map((f,i)=>(
              <button key={i} className="nb-fmt" style={{"--fc14":`${f.color}22`}} onClick={f.action} title={f.label}>
                <span className="e">{f.icon}</span>
                <span className="t" style={{color:f.color}}>{f.label}</span>
              </button>
            ))}
            <button className="nb-fmt" style={{"--fc14":"#6feab122"}} onClick={()=>setShowDrawing(true)} title="Lienzo de dibujo">
              <span className="e">🖌️</span><span className="t" style={{color:"#6feab1"}}>Dibujo</span>
            </button>
            <button className="nb-fmt" style={{"--fc14":"#f9767622"}} onClick={()=>setShowAudioRec(true)} title="Grabar audio">
              <span className="e">🎙️</span><span className="t" style={{color:"#f97676"}}>Audio</span>
            </button>
            <button className="nb-fmt" style={{"--fc14":"#00f0ff22"}} onClick={()=>insert("[[","]]")} title="Enlazar otra nota">
              <span className="e">🔗</span><span className="t" style={{color:ACCENT}}>Enlace</span>
            </button>
          </div>
        )}
      </div>

      {/* ── TITLE */}
      <input
        style={{background:"transparent",border:"none",color:TEXT.primary,fontSize:TYPE.headline.fontSize,fontWeight:TYPE.headline.fontWeight,padding:"16px 16px 6px",width:"100%",fontFamily:"'Outfit',sans-serif",outline:"none",letterSpacing:TYPE.headline.letterSpacing}}
        placeholder="Título…"
        value={note.title}
        onChange={e=>handleTitleChange(e.target.value)}
      />

      {/* ── HINTS ROW: NLP + duplicate warning + font size */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px 8px",gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {note.reminder&&<span style={{fontSize:12,color:TEXT.warn}}>🤖 Recordatorio detectado</span>}
          {hasDuplicate&&<span style={{fontSize:12,color:"#f7c948",background:"#f7c94812",border:"1px solid #f7c94830",padding:"2px 8px",borderRadius:20}}>⚠️ Título duplicado — considera fusionar</span>}
        </div>
        <div style={{fontSize:12,color:TEXT.faint,display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:12}}>Aa</span>
          <span style={{color:TEXT.muted,fontWeight:600}}>{bodyFontSize}px</span>
          <span style={{fontSize:12,opacity:.6}}>🤏</span>
        </div>
      </div>

      {/* ── TAGS */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"0 14px 10px",alignItems:"center"}}>
        {note.tags.map(t=><span key={t} className="tag-chip" onClick={()=>upd("tags",note.tags.filter(x=>x!==t))}>#{t} ✕</span>)}
        {showTagInput?(
          <div style={{position:"relative"}}>
            <input style={{background:"#00003a",border:`1px solid ${ACCENT}40`,color:TEXT.primary,padding:"3px 10px",borderRadius:10,fontSize:12,fontFamily:"inherit",width:100,outline:"none"}} value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTag()} autoFocus placeholder="etiqueta" />
            <button style={{background:`${ACCENT}20`,border:`1px solid ${ACCENT}50`,cursor:"pointer",color:ACCENT,padding:"3px 10px",borderRadius:10,fontFamily:"inherit",fontSize:12,marginLeft:4}} onClick={()=>addTag()}>+</button>
            {tagSuggestions.length>0&&(
              <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,background:"#0a1220",border:`1px solid ${ACCENT}30`,borderRadius:10,padding:4,zIndex:50,minWidth:140,boxShadow:"0 8px 20px #000a"}}>
                <div style={{fontSize:9,color:TEXT.faint,padding:"2px 6px 4px",letterSpacing:.5}}>YA EXISTEN</div>
                {tagSuggestions.map(t=>(
                  <div key={t} onClick={()=>addTag(t)} style={{padding:"5px 8px",borderRadius:6,cursor:"pointer",fontSize:12,color:ACCENT}} onMouseEnter={e=>e.currentTarget.style.background="#00f0ff15"} onMouseLeave={e=>e.currentTarget.style.background="none"}>#{t}</div>
                ))}
              </div>
            )}
          </div>
        ):(
          <button style={{background:"none",border:`1px dashed ${ACCENT}25`,cursor:"pointer",color:TEXT.muted,padding:"3px 10px",borderRadius:10,fontSize:12,fontFamily:"inherit"}} onClick={()=>setShowTagInput(true)}>+ etiqueta</button>
        )}
      </div>

      {/* ══════════════════════════════════
          SECTION: write (textarea normal)
      ══════════════════════════════════ */}
      {section==="write"&&(
        <div style={{position:"relative",flex:1,display:"flex",flexDirection:"column"}}>
          <textarea
            ref={taRef}
            className="note-textarea"
            style={{fontSize:bodyFontSize,lineHeight:1.8,flex:1}}
            placeholder={"Escribe aquí…\n\nEscribe / para abrir el menú de comandos\nEscribe [[ para enlazar otra nota\nPellizca con 2 dedos para cambiar el tamaño del texto\nDesliza desde el borde derecho para abrir el panel"}
            value={note.content}
            onChange={e=>handleContentChange(e.target.value)}
            onKeyDown={e=>{
              if(e.key==="Tab"&&predict.suggestion){ e.preventDefault(); acceptPredict(); }
              else if(e.key!=="Tab"&&predict.suggestion&&!["Shift","Control","Alt","Meta"].includes(e.key)){ setPredict({suggestion:"",wordStart:-1}); }
            }}
          />
          {predict.suggestion&&(
            <div style={{position:"absolute",bottom:8,right:8,display:"flex",alignItems:"center",gap:6,background:"#0a1220",border:`1px solid ${ACCENT}40`,borderRadius:20,padding:"5px 10px",cursor:"pointer",fontSize:12,boxShadow:"0 6px 16px #000a"}} onClick={acceptPredict}>
              <span style={{color:TEXT.faint}}>…{predict.suggestion}</span>
              <span style={{background:`${ACCENT}20`,color:ACCENT,borderRadius:6,padding:"1px 6px",fontSize:10,fontWeight:700}}>Tab ⇥</span>
            </div>
          )}
          {slash.open&&(
            <SlashMenu
              query={slash.query}
              pos={{y:slash.screenY,x:slash.screenX}}
              onSelect={handleSlashSelect}
              onClose={()=>setSlash(s=>({...s,open:false}))}
            />
          )}
          {linkMenu.open&&(
            <LinkMenu
              query={linkMenu.query}
              pos={{y:linkMenu.screenY,x:linkMenu.screenX}}
              notes={allNotes||[]}
              currentNoteId={note.id}
              onSelect={handleLinkSelect}
              onClose={()=>setLinkMenu(s=>({...s,open:false}))}
            />
          )}
          {backlinks.length>0&&(
            <div style={{padding:"10px 16px",borderTop:`1px solid ${ACCENT}12`,flexShrink:0}}>
              <div style={{fontSize:11,color:TEXT.muted,fontWeight:700,letterSpacing:.5,marginBottom:6}}>🔗 NOTAS QUE ENLAZAN AQUÍ ({backlinks.length})</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {backlinks.map(n=>(
                  <button key={n.id} onClick={()=>onOpenNote&&onOpenNote(n)} style={{display:"flex",alignItems:"center",gap:6,background:`${ACCENT}10`,border:`1px solid ${ACCENT}30`,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit"}}>
                    <span style={{fontSize:14}}>{n.icon||"📝"}</span>
                    <span style={{fontSize:12,color:ACCENT}}>{n.title||"Sin título"}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ══════════════════════════════════
          SECTION: blocks — drag-and-drop
      ══════════════════════════════════ */}
      {section==="blocks"&&(
        <div style={{padding:"8px 8px 16px",flex:1,overflowY:"auto"}}>
          <div style={{fontSize:12,color:TEXT.muted,padding:"0 8px 10px",lineHeight:1.6}}>
            <span style={{color:ACCENT,fontWeight:600}}>✦ Modo bloques</span> · cada párrafo es independiente · arrastra ⠿ para reordenar
          </div>
          {blocks.map((blk,i)=>(
            <div
              key={i}
              className={`block-row${dropIdx===i&&dropSide==="top"?" drag-over-top":dropIdx===i&&dropSide==="bot"?" drag-over-bot":""}`}
              style={{padding:"4px 8px",borderRadius:8,border:`1px solid ${dragIdx===i?ACCENT+"40":"transparent"}`,background:dragIdx===i?`${ACCENT}08`:"transparent"}}
              draggable
              onDragStart={()=>handleDragStart(i)}
              onDragOver={e=>handleDragOver(e,i)}
              onDragEnd={handleDrop}
            >
              <span className="drag-handle" title="Arrastrar bloque">⠿</span>
              <div className="block-content-area">
                <div style={{fontSize:bodyFontSize-1,color:TEXT.primary,lineHeight:1.75,whiteSpace:"pre-wrap",padding:"2px 0"}}>
                  {blk||<span style={{color:TEXT.faint,fontStyle:"italic"}}>(bloque vacío)</span>}
                </div>
                <div style={{display:"flex",gap:5,marginTop:3}}>
                  <button style={{background:"none",border:`1px solid ${ACCENT}15`,cursor:"pointer",color:TEXT.muted,padding:"2px 8px",borderRadius:6,fontSize:12,fontFamily:"inherit"}} onClick={()=>{
                    const arr=[...blocks];arr.splice(i,0,"");saveBlocks(arr);showToast("➕ Bloque insertado");
                  }}>+ arriba</button>
                  <button style={{background:"none",border:`1px solid ${ACCENT}15`,cursor:"pointer",color:TEXT.muted,padding:"2px 8px",borderRadius:6,fontSize:12,fontFamily:"inherit"}} onClick={()=>{
                    if(blocks.length<=1){showToast("⚠️ Solo queda un bloque");return;}
                    const arr=[...blocks];arr.splice(i,1);saveBlocks(arr);showToast("🗑 Bloque eliminado");
                  }}>🗑</button>
                </div>
              </div>
            </div>
          ))}
          <button style={{width:"100%",background:`${ACCENT}10`,border:`1px dashed ${ACCENT}30`,cursor:"pointer",color:ACCENT,padding:"10px",borderRadius:10,marginTop:10,fontSize:13,fontFamily:"inherit"}} onClick={()=>{upd("content",note.content+(note.content.endsWith("\n\n")?"":"\n\n")+"");showToast("➕ Bloque creado");}}>
            + Añadir bloque
          </button>
        </div>
      )}

      {/* ══════════════════════════════════
          SECTION: checklist (+ optional text above)
      ══════════════════════════════════ */}
      {section==="checklist"&&(
        <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
          {/* Mini text area for notes above checklist */}
          {(note.content||"").trim().length>0&&(
            <div style={{padding:"0 14px 8px",borderBottom:`1px solid ${ACCENT}10`,flexShrink:0,maxHeight:"34vh",overflowY:"auto"}}>
              <textarea
                className="note-textarea"
                style={{fontSize:bodyFontSize-1,lineHeight:1.7,minHeight:60,height:"auto",flex:"none",resize:"none",overflow:"visible",padding:0}}
                ref={el=>{if(el){el.style.height="auto";el.style.height=el.scrollHeight+"px";}}}
                placeholder="Notas adicionales…"
                value={note.content}
                onChange={e=>handleContentChange(e.target.value)}
              />
            </div>
          )}
          {!( (note.content||"").trim().length>0 )&&(
