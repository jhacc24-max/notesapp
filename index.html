  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #293241; font-family: 'Roboto', system-ui, sans-serif; }

    /* ===== SPLASH SCREEN ===== */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #293241 0%, #2d3a4f 50%, #334766 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #splash.hiding {
      opacity: 0; transform: scale(1.05);
      pointer-events: none;
    }

    .splash-bg-orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25; pointer-events: none;
    }
    .orb1 { width: 300px; height: 300px; background: #7B8CDE; top: -80px; right: -60px; animation: orbFloat 6s ease-in-out infinite; }
    .orb2 { width: 200px; height: 200px; background: #A78BFA; bottom: 60px; left: -40px; animation: orbFloat 8s ease-in-out infinite reverse; }
    .orb3 { width: 150px; height: 150px; background: #60A5FA; top: 40%; left: 60%; animation: orbFloat 5s ease-in-out infinite 1s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(20px, -30px) scale(1.1); }
    }

    .splash-logo {
      position: relative; z-index: 2;
      width: 100px; height: 100px; border-radius: 28px;
      background: linear-gradient(135deg, #334766, #2d3a4f);
      border: 2px solid rgba(123,140,222,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(123,140,222,0.35), 0 8px 32px rgba(0,0,0,0.5);
      animation: logoAppear 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes logoAppear {
      from { transform: scale(0.4) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);     opacity: 1; }
    }

    .splash-title {
      position: relative; z-index: 2;
      font-size: 32px; font-weight: 700; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #7B8CDE, #A78BFA, #60A5FA);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: fadeUp 0.7s ease 0.3s both;
    }
    .splash-subtitle {
      position: relative; z-index: 2;
      font-size: 14px; color: rgba(200,210,255,0.5); margin-top: 6px; letter-spacing: 0.5px;
      animation: fadeUp 0.7s ease 0.5s both;
    }

    .splash-loader {
      position: relative; z-index: 2;
      margin-top: 48px; display: flex; gap: 8px;
      animation: fadeUp 0.7s ease 0.7s both;
    }
    .splash-dot {
      width: 8px; height: 8px; border-radius: 50%; background: rgba(123,140,222,0.5);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40%            { transform: scale(1.2); opacity: 1; background: #7B8CDE; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== APP WRAPPER ===== */
    #app-wrapper {
      position: fixed; inset: 0; z-index: 1;
      display: none; opacity: 0; transform: scale(0.97);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #app-wrapper.visible {
      display: block;
    }
    #app-wrapper.ready {
      opacity: 1; transform: scale(1);
    }
    #root { width: 100%; height: 100%; }

    /* Install banner */
    #install-banner {
      position: fixed; bottom: 80px; left: 12px; right: 12px; z-index: 8000;
      background: rgba(29,42,68,0.95); border: 1px solid rgba(123,140,222,0.3);
      border-radius: 16px; padding: 14px 16px;
      display: none; align-items: center; gap-x: 12px;
      backdrop-filter: blur(16px); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: slideUp 0.4s ease;
    }
    #install-banner.show { display: flex; }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .install-text { flex: 1; font-size: 13px; color: #C8CCFF; line-height: 1.4; }
    .install-text strong { color: #7B8CDE; display: block; }
    .install-btn { background: #7B8CDE; color: #fff; border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .install-close { background: none; border: none; color: rgba(200,210,255,0.4); font-size: 18px; cursor: pointer; padding: 2px 4px; }
  </style>

let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner && !sessionStorage.getItem('install_dismissed')) {
    setTimeout(() => banner.classList.add('show'), 3500);
  }
});
window.addEventListener('appinstalled', () => {
  _installPrompt = null;
  const b = document.getElementById('install-banner');
  if (b) b.classList.remove('show');
});
window._getInstallPrompt = () => _installPrompt;
</script>

window.addEventListener('DOMContentLoaded', async () => {
  // Start loading app in background during splash
  loadApp();

  // Show splash for minimum time
  const splashDelay = new Promise(r => setTimeout(r, 2200));

  await splashDelay;

  const splash = document.getElementById('splash');
  splash.classList.add('hiding');

  setTimeout(() => {
    splash.style.display = 'none';
    enterApp('direct');
  }, 600);
});

// ---- Biometric (WebAuthn / fingerprint) ----
async function triggerBiometric() {
  const btn = document.getElementById('fpBtn');
  const status = document.getElementById('authStatus');
  if (!btn || !status) return;

  // Check if WebAuthn available
  if (!window.PublicKeyCredential) {
    // Fallback: use PIN with fingerprint icon as trigger
    status.textContent = 'Usa el PIN para acceder';
    status.className = 'auth-status scan';
    return;
  }

  btn.classList.add('scanning');
  status.textContent = 'Escaneando huella digital...';
  status.className = 'auth-status scan';

  try {
    // Check if platform authenticator available (fingerprint/FaceID)
    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();

    if (!available) {
      btn.classList.remove('scanning');
      status.textContent = 'Huella no disponible — usa PIN';
      status.className = 'auth-status fail';
      setTimeout(() => {
        status.textContent = 'Ingresa tu PIN para continuar';
        status.className = 'auth-status ready';
      }, 2000);
      return;
    }

    // Check if credential already registered
    const credId = localStorage.getItem('notasapp_cred_id');

    if (!credId) {
      // First time: register credential
      await registerBiometric();
    } else {
      // Returning user: authenticate
      await authenticateBiometric(credId);
    }

  } catch (err) {
    btn.classList.remove('scanning');
    if (err.name === 'NotAllowedError') {
      status.textContent = 'Cancelado — usa el PIN';
    } else {
      status.textContent = 'Error de autenticación';
    }
    status.className = 'auth-status fail';
    btn.classList.add('error');
    setTimeout(() => {
      btn.classList.remove('error');
      status.textContent = 'Toca para intentar de nuevo';
      status.className = 'auth-status ready';
    }, 2000);
  }
}

async function registerBiometric() {
  const status = document.getElementById('authStatus');
  status.textContent = 'Registrando huella digital...';

  const challenge = new Uint8Array(32);
  crypto.getRandomValues(challenge);

  const userId = new Uint8Array(16);
  crypto.getRandomValues(userId);

  const credential = await navigator.credentials.create({
    publicKey: {
      challenge,
      rp: { name: 'NotasApp', id: location.hostname || 'localhost' },
      user: { id: userId, name: 'usuario@notasapp', displayName: 'Usuario NotasApp' },
      pubKeyCredParams: [{ alg: -7, type: 'public-key' }, { alg: -257, type: 'public-key' }],
      authenticatorSelection: {
        authenticatorAttachment: 'platform',
        userVerification: 'required',
        requireResidentKey: false,
      },
      timeout: 60000,
      attestation: 'none',
    }
  });

  // Store credential ID
  const credIdB64 = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
  localStorage.setItem('notasapp_cred_id', credIdB64);

  biometricSuccess();
}

async function authenticateBiometric(credIdB64) {
  const challenge = new Uint8Array(32);
  crypto.getRandomValues(challenge);

  // Decode stored credential ID
  const credIdBytes = Uint8Array.from(atob(credIdB64), c => c.charCodeAt(0));

  await navigator.credentials.get({
    publicKey: {
      challenge,
      rpId: location.hostname || 'localhost',
      allowCredentials: [{ type: 'public-key', id: credIdBytes, transports: ['internal'] }],
      userVerification: 'required',
      timeout: 60000,
    }
  });

  biometricSuccess();
}

function biometricSuccess() {
  const btn = document.getElementById('fpBtn');
  const status = document.getElementById('authStatus');

  btn.classList.remove('scanning');
  btn.classList.add('success');
  status.textContent = '¡Autenticación exitosa!';
  status.className = 'auth-status ok';

  setTimeout(() => enterApp('biometric'), 700);
}

// ---- PIN logic ----
function getStoredPin() {
  return localStorage.getItem(PIN_STORAGE_KEY) || CORRECT_PIN;
}

function pinKey(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDisplay();

  if (pinBuffer.length === 4) {
    setTimeout(checkPin, 100);
  }
}

function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDisplay();
}

function updatePinDisplay() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}

function checkPin() {
  const stored = getStoredPin();
  const correct = pinBuffer === stored;

  // Animate dots
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.className = 'pin-dot ' + (correct ? 'ok' : 'err');
  }

  const status = document.getElementById('authStatus');
  if (correct) {
    status.textContent = '¡PIN correcto!';
    status.className = 'auth-status ok';
    setTimeout(() => enterApp('pin'), 500);
  } else {
    status.textContent = 'PIN incorrecto — intenta de nuevo';
    status.className = 'auth-status fail';
    setTimeout(() => {
      pinBuffer = '';
      updatePinDisplay();
      for (let i = 0; i < 4; i++) document.getElementById('d' + i).className = 'pin-dot';
      status.textContent = 'Ingresa tu PIN de 4 dígitos';
      status.className = 'auth-status ready';
    }, 1200);
  }
}

// ---- Enter app ----
function enterApp(method) {
  const appWrapper = document.getElementById('app-wrapper');
  appWrapper.classList.add('visible');

  const tryShow = () => {
    if (appLoaded || method === 'skip' || method === 'direct') {
      requestAnimationFrame(() => {
        appWrapper.classList.add('ready');
      });
    } else {
      setTimeout(tryShow, 100);
    }
  };
  tryShow();
}
