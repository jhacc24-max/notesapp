// ── DRAWING CANVAS MODAL
function DrawingCanvas({ onSave, onClose }) {
  const canvasRef = useRef(null);
  const [tool, setTool] = React.useState("pen"); // pen | eraser
  const [color, setColor] = React.useState("#00f0ff");
  const [lineWidth, setLineWidth] = React.useState(4);
  const [history, setHistory] = React.useState([]);
  const drawing = useRef(false);
  const lastPos = useRef(null);

  const COLORS = ["#00f0ff","#f7c948","#6feab1","#f97676","#a78bfa","#DCE2F9","#ffffff","#fb923c"];

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#050a10";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }, []);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY,
      };
    }
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  };

  const saveSnapshot = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const snap = canvas.toDataURL();
    setHistory(h => [...h.slice(-19), snap]);
  };

  const startDraw = (e) => {
    e.preventDefault();
    saveSnapshot();
    drawing.current = true;
    const pos = getPos(e, canvasRef.current);
    lastPos.current = pos;
    const ctx = canvasRef.current.getContext("2d");
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, (tool === "eraser" ? lineWidth * 4 : lineWidth) / 2, 0, Math.PI * 2);
    ctx.fillStyle = tool === "eraser" ? "#050a10" : color;
    ctx.fill();
  };

  const draw = (e) => {
    e.preventDefault();
    if (!drawing.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = tool === "eraser" ? "#050a10" : color;
    ctx.lineWidth = tool === "eraser" ? lineWidth * 4 : lineWidth;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();
    lastPos.current = pos;
  };

  const stopDraw = (e) => { drawing.current = false; };

  const undo = () => {
    if (!history.length) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const prev = history[history.length - 1];
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0); };
    img.src = prev;
    setHistory(h => h.slice(0, -1));
  };

  const clear = () => {
    saveSnapshot();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#050a10";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  };

  const handleSave = () => {
    const dataURL = canvasRef.current.toDataURL("image/png");
    onSave(dataURL);
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:600,background:"rgba(5,10,16,0.92)",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:`1px solid ${ACCENT}20`,...G.glass}}>
        <span style={{fontSize:18}}>✏️</span>
        <span style={{fontSize:14,fontWeight:700,color:ACCENT,flex:1}}>Lienzo de dibujo</span>
        <button style={{background:"none",border:`1px solid ${ACCENT}30`,color:TEXT.muted,padding:"4px 10px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit"}} onClick={onClose}>✕ Cancelar</button>
        <button style={{background:`${ACCENT}25`,border:`1px solid ${ACCENT}60`,color:ACCENT,padding:"5px 14px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700}} onClick={handleSave}>💾 Guardar</button>
      </div>

      {/* Toolbar */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",flexWrap:"wrap",borderBottom:`1px solid ${ACCENT}12`}}>
        {/* Tool toggle */}
        <div style={{display:"flex",gap:4}}>
          {[{id:"pen",icon:"✏️",label:"Pincel"},{id:"eraser",icon:"⬜",label:"Borrador"}].map(t=>(
            <button key={t.id} style={{background:tool===t.id?`${ACCENT}25`:"none",border:`1px solid ${tool===t.id?ACCENT+"60":"#1a2a5a"}`,color:tool===t.id?ACCENT:TEXT.muted,padding:"5px 10px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}} onClick={()=>setTool(t.id)}>
              <span>{t.icon}</span><span>{t.label}</span>
            </button>
          ))}
        </div>
        {/* Colors */}
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {COLORS.map(c=>(
            <button key={c} style={{width:22,height:22,borderRadius:"50%",background:c,border:color===c?"2px solid #fff":"2px solid transparent",cursor:"pointer",flexShrink:0}} onClick={()=>{setColor(c);setTool("pen");}} />
          ))}
        </div>
        {/* Size */}
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:12,color:TEXT.muted}}>Grosor:</span>
          <input type="range" min="1" max="24" value={lineWidth} onChange={e=>setLineWidth(+e.target.value)} style={{width:70,accentColor:ACCENT}} />
          <span style={{fontSize:12,color:TEXT.muted,width:18,textAlign:"right"}}>{lineWidth}</span>
        </div>
        {/* Undo / Clear */}
        <button style={{background:"#f7c94818",border:"1px solid #f7c94830",color:"#f7c948",padding:"5px 10px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit"}} onClick={undo} disabled={!history.length}>↩ Deshacer</button>
        <button style={{background:"#f9767618",border:"1px solid #f9767630",color:"#f97676",padding:"5px 10px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit"}} onClick={clear}>🗑 Limpiar</button>
      </div>

      {/* Canvas area */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:12,overflow:"hidden"}}>
        <canvas
          ref={canvasRef}
          width={700}
          height={480}
          style={{borderRadius:12,border:`1px solid ${ACCENT}25`,touchAction:"none",cursor:tool==="eraser"?"cell":"crosshair",maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}}
          onMouseDown={startDraw}
          onMouseMove={draw}
          onMouseUp={stopDraw}
          onMouseLeave={stopDraw}
          onTouchStart={startDraw}
          onTouchMove={draw}
          onTouchEnd={stopDraw}
        />
      </div>
    </div>
  );
}

// ── AUDIO RECORDER MODAL (with Base64 persistence)
function AudioRecorderModal({ onSave, onClose }) {
  const [phase, setPhase] = React.useState("idle"); // idle | recording | converting | transcribing | done
  const [elapsed, setElapsed] = React.useState(0);
  const [audioUrl, setAudioUrl] = React.useState(null);
  const [audioB64, setAudioB64] = React.useState(null);
  const [finalTranscript, setFinalTranscript] = React.useState("");
  const [interimTranscript, setInterimTranscript] = React.useState("");
  const [bars, setBars] = React.useState(Array(20).fill(3));
  const [apiError, setApiError] = React.useState(null);
  const [apiRaw, setApiRaw] = React.useState(null);
  const mediaRef = useRef(null);
  const recRef = useRef(null);
  const timerRef = useRef(null);
  const analyserRef = useRef(null);
  const animRef = useRef(null);
  const startTs = useRef(0);
  const chunksRef = useRef([]);
  const elapsedRef = useRef(0);
  const finalRef = useRef("");
  const interimRef = useRef(""); // ref para no perder interim en el closure de onend
  const srEndedRef  = useRef(true);  // true when SR has fully finished (or never started)
  const sessionBaseRef = useRef(""); // transcript accumulated from previous SR sessions (Android fix)

  const fmt = (ms) => { const s = Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; };

  // animate waveform bars from AnalyserNode
  const animateBars = (analyser) => {
    const data = new Uint8Array(analyser.fftSize);
    const tick = () => {
      analyser.getByteTimeDomainData(data);
      const step = Math.floor(data.length / 20);
      const newBars = Array.from({length:20}, (_,i) => {
        const v = Math.abs(data[i*step] - 128);
        return Math.max(3, Math.min(36, v * 1.2));
      });
      setBars(newBars);
      animRef.current = requestAnimationFrame(tick);
    };
    animRef.current = requestAnimationFrame(tick);
  };

  const startRec = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // AnalyserNode for waveform
      try {
        const ctx = new AudioContext();
        const src = ctx.createMediaStreamSource(stream);
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        src.connect(analyser);
        analyserRef.current = analyser;
        animateBars(analyser);
      } catch(_) {}

      chunksRef.current = [];
      // pick best supported mime — Android Chrome prefers mp4/aac, desktop Chrome prefers webm/opus
      const isAndroidUA = /android/i.test(navigator.userAgent);
      const mimeList = isAndroidUA
        ? ["audio/mp4;codecs=mp4a.40.2","audio/mp4","audio/webm;codecs=opus","audio/webm","audio/ogg"]
        : ["audio/webm;codecs=opus","audio/webm","audio/ogg","audio/mp4"];
      const mime = mimeList.find(m => {
        try { return MediaRecorder.isTypeSupported(m); } catch { return false; }
      }) || "";
      const mr = new MediaRecorder(stream, mime ? {mimeType: mime} : {});
      mr.ondataavailable = e => { if(e.data.size>0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        cancelAnimationFrame(animRef.current);
        setBars(Array(20).fill(3));
        setPhase("converting");
        const blob = new Blob(chunksRef.current, { type: mr.mimeType || "audio/webm" });
        const url = URL.createObjectURL(blob);
        setAudioUrl(url);
        stream.getTracks().forEach(t => t.stop());

        // b64 solo para el reproductor de la UI
        const reader = new FileReader();
        reader.onloadend = () => setAudioB64(reader.result);
        reader.readAsDataURL(blob);

        // ── Transcripción con Groq Whisper (FormData, sin base64) ──
        setPhase("transcribing");
        setApiError(null);
        setApiRaw(null);
        const storedKey = (localStorage.getItem("myo_groq_key")||"").trim();
        if (!storedKey) {
          setApiError("Sin clave Groq. Ve a ⚙️ Ajustes → IA / Transcripción y pega tu clave gsk_...");
          setPhase("done");
          return;
        }
        const ext = (blob.type||"audio/webm").includes("mp4") ? "m4a" : "webm";
        const formData = new FormData();
        formData.append("file", blob, `audio.${ext}`);
        formData.append("model", "whisper-large-v3-turbo");
        formData.append("response_format", "json");
        fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
          method: "POST",
          headers: { "Authorization": `Bearer ${storedKey}` },
          body: formData
        })
        .then(r => r.json())
        .then(data => {
          setApiRaw(JSON.stringify(data, null, 2));
          if (data.error) {
            setApiError(`Groq Error: ${data.error.message}`);
            setPhase("done");
            return;
          }
          const txt = (data.text || "").trim();
          finalRef.current = txt;
          setFinalTranscript(txt);
          setPhase("done");
        })
        .catch(err => {
          setApiError(`Fetch error: ${err.message} — Verifica tu clave Groq en Ajustes.`);
          setPhase("done");
        });
      };
      mr.start(100); // collect every 100ms for smoother data
      mediaRef.current = mr;
      startTs.current = Date.now();
      elapsedRef.current = 0;
      setElapsed(0);
      timerRef.current = setInterval(() => {
        const e = Date.now() - startTs.current;
        elapsedRef.current = e;
        setElapsed(e);
      }, 200);
      setPhase("recording");
      finalRef.current = "";
      interimRef.current = "";
      srEndedRef.current = false;  // SR will be used — block premature save
      setFinalTranscript("");
      setInterimTranscript("");

      // Speech recognition — restartable sessions, works on Android
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const isAndroid = /android/i.test(navigator.userAgent);
      if (SR) {
        sessionBaseRef.current = ""; // reset accumulated base transcript

        // Factory: creates and starts a fresh SR session.
        // On Android, continuous=true is unreliable so we use continuous=false
        // and recreate the instance on each restart with a small delay.
        const startSRSession = () => {
          // Don't start if recording already stopped
          if (!mediaRef.current || mediaRef.current.state !== "recording") return;
          let srFailed = false;
          const r = new SR();
          const lang = navigator.language || "es-ES";
          r.lang = lang.startsWith("es") ? lang : "es-ES";
          // continuous=true works on desktop; Android handles it better with false + manual restart
          r.continuous = !isAndroid;
          r.interimResults = true;
          r.maxAlternatives = 1;

          r.onresult = (e) => {
            // Build this-session's finals from e.results (only current session)
            let sessionFin = "";
            let interim = "";
            for (let i = 0; i < e.results.length; i++) {
              if (e.results[i].isFinal) sessionFin += e.results[i][0].transcript + " ";
              else interim += e.results[i][0].transcript;
            }
            // Combine with transcript saved from previous sessions
            const combined = sessionBaseRef.current + sessionFin;
            finalRef.current = combined;
            interimRef.current = interim;
            setFinalTranscript(combined);
            setInterimTranscript(interim);
          };

          r.onerror = (evt) => {
            if (evt.error === "no-speech") return;  // normal during pauses
            if (evt.error === "aborted") return;    // we called stop()
            console.warn("SpeechRecognition error:", evt.error);
            if (["service-not-allowed","not-allowed","network","audio-capture","language-not-supported"].includes(evt.error)) {
              srFailed = true;
              srEndedRef.current = true;
              recRef.current = null;
              setInterimTranscript("(transcripción no disponible en este dispositivo)");
            }
          };

          r.onend = () => {
            if (srFailed) return;
            if (mediaRef.current && mediaRef.current.state === "recording") {
              // Still recording — save finals so far and start a new SR instance.
              // We MUST use a new instance (calling r.start() on the same one throws
              // InvalidStateError on Android, silently killing transcription).
              sessionBaseRef.current = finalRef.current; // save accumulated finals
              interimRef.current = "";
              setInterimTranscript("");
              // Small delay before restart: avoids InvalidStateError on Android
              setTimeout(startSRSession, isAndroid ? 350 : 100);
              return;
            }
            // Recording has ended — absorb any unfinalized interim text
            if (interimRef.current.trim() && !interimRef.current.startsWith("(transcripción")) {
              const absorbed = (finalRef.current + " " + interimRef.current).trim() + " ";
              finalRef.current = absorbed;
              setFinalTranscript(absorbed);
            }
            interimRef.current = "";
            setInterimTranscript("");
            srEndedRef.current = true;
          };

          try {
            r.start();
            recRef.current = r;
          } catch(srErr) {
            console.warn("SR start failed:", srErr);
            srEndedRef.current = true;
            recRef.current = null;
          }
        };

        srEndedRef.current = false; // ensure SR blocks premature save
        startSRSession();
      } else {
        // SpeechRecognition not available (some Android WebViews, Firefox, etc.)
        srEndedRef.current = true;
      }
    } catch(err) {
      alert("❌ No se pudo acceder al micrófono: " + err.message);
    }
  };

  const stopRec = () => {
    clearInterval(timerRef.current);
    recRef.current?.stop();
    mediaRef.current?.stop();
    setPhase("converting");
  };

  const handleSave = () => {
    const doSave = () => {
      onSave({
        b64: audioB64,
        transcript: finalRef.current.trim(),
        duration: elapsedRef.current,
        createdAt: Date.now()
      });
    };
    // If SR was never started, or has already finished, save immediately
    if (!recRef.current || srEndedRef.current) { doSave(); return; }
    // Otherwise poll until SR onend fires (up to 2 s), then save whatever we have
    let waited = 0;
    const poll = setInterval(() => {
      waited += 80;
      if (srEndedRef.current || waited >= 2000) { clearInterval(poll); doSave(); }
    }, 80);
  };

  // cleanup on unmount
  React.useEffect(() => () => {
    clearInterval(timerRef.current);
    cancelAnimationFrame(animRef.current);
    recRef.current?.stop();
    mediaRef.current?.stop();
  }, []);

  const allTranscript = (finalTranscript + (interimTranscript ? " " + interimTranscript : "")).trim();

  return (
    <div style={{position:"fixed",inset:0,zIndex:600,background:"rgba(5,10,16,0.94)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{...G.glass,borderRadius:22,padding:"24px 22px",width:"100%",maxWidth:400,border:`1px solid ${ACCENT}35`,display:"flex",flexDirection:"column",gap:0}}>

        {/* ── Header */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <span style={{fontSize:20}}>🎙</span>
          <span style={{fontSize:15,fontWeight:700,color:ACCENT,flex:1,letterSpacing:.3}}>Grabadora de voz</span>
          <button style={{background:"none",border:"none",color:TEXT.muted,cursor:"pointer",fontSize:18,lineHeight:1,padding:4}} onClick={onClose}>✕</button>
        </div>

        {/* ── Waveform bars (during recording) */}
        {phase==="recording"&&(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,height:44,marginBottom:14}}>
            {bars.map((h,i)=>(
              <div key={i} style={{
                width:4, height:h, borderRadius:3,
                background: h>20 ? "#f97676" : h>10 ? "#f7c948" : ACCENT,
                transition:"height .08s ease",
                opacity: 0.7+i%3*0.1
              }}/>
            ))}
          </div>
        )}

        {/* ── Big record button */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
          <button
            style={{
              width:90, height:90, borderRadius:"50%",
              background: phase==="recording" ? "#f9767622" : phase==="done" ? "#6feab122" : `linear-gradient(135deg,${ACCENT2}45,${ACCENT}35)`,
              border: `2.5px solid ${phase==="recording"?"#f97676":phase==="done"?"#6feab1":ACCENT}`,
              cursor: phase==="converting" ? "default" : "pointer",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:36, transition:"all .3s",
              boxShadow: phase==="recording" ? "0 0 24px #f9767640" : `0 0 18px ${ACCENT}35`
            }}
            className={phase==="recording"?"anim-pulse":""}
            onClick={phase==="idle"?startRec : phase==="recording"?stopRec : undefined}
          >
            {phase==="idle"?"🎙" : phase==="recording"?"⏹" : phase==="converting"?"⏳":"✅"}
          </button>
        </div>

        {/* ── Timer / status */}
        {phase==="recording"&&(
          <div style={{textAlign:"center",fontSize:22,fontFamily:"JetBrains Mono,monospace",color:"#f97676",letterSpacing:4,marginBottom:12}}>
            ● {fmt(elapsed)}
          </div>
        )}
        {phase==="converting"&&(
          <div style={{textAlign:"center",fontSize:13,color:TEXT.muted,marginBottom:12}}>Procesando audio…</div>
        )}
        {phase==="transcribing"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div className="anim-pulse" style={{width:10,height:10,borderRadius:"50%",background:ACCENT,boxShadow:`0 0 8px ${ACCENT}`}}/>
              <span style={{fontSize:13,color:ACCENT,fontWeight:600,letterSpacing:.3}}>Transcribiendo con IA…</span>
            </div>
            <span style={{fontSize:11,color:TEXT.faint}}>Groq Whisper transcribiendo…</span>
          </div>
        )}
        {phase==="done"&&(
          <div style={{textAlign:"center",fontSize:12,color:TEXT.muted,marginBottom:12,letterSpacing:.3}}>
            ✅ Listo · {fmt(elapsed)}
          </div>
        )}
        {phase==="idle"&&(
          <div style={{textAlign:"center",color:TEXT.muted,fontSize:13,lineHeight:1.7,marginBottom:16}}>
            Toca el micrófono para grabar.<br/>
            <span style={{fontSize:12,color:TEXT.faint}}>Audio + transcripción se guardarán en la nota.</span>
          </div>
        )}

        {/* ── Audio player (done) */}
        {phase==="done"&&audioUrl&&(
          <audio src={audioUrl} controls style={{width:"100%",marginBottom:12,borderRadius:8,accentColor:ACCENT}} />
        )}

        {/* ── Live transcript (recording + transcribing + done) */}
        {(phase==="recording"||phase==="transcribing"||phase==="done")&&(
          <div style={{background:`${ACCENT}07`,border:`1px solid ${ACCENT}20`,borderRadius:12,padding:"10px 12px",marginBottom:14,minHeight:54}}>
            <div style={{fontSize:10,color:ACCENT,fontWeight:700,letterSpacing:1.2,marginBottom:5,display:"flex",alignItems:"center",gap:5}}>
              {phase==="recording"&&<span style={{color:"#f97676",fontSize:8}}>●</span>}
              TRANSCRIPCIÓN {phase==="recording"?"EN VIVO":phase==="transcribing"?"IA":""}
            </div>
            {phase==="transcribing" ? (
              <div style={{fontSize:12,color:TEXT.faint,fontStyle:"italic"}}>Analizando audio con Claude…</div>
            ) : allTranscript ? (
              <div style={{fontSize:13,color:TEXT.primary,lineHeight:1.7}}>
                <span style={{color:TEXT.primary}}>{finalTranscript}</span>
                {interimTranscript&&<span style={{color:TEXT.muted,fontStyle:"italic"}}>{interimTranscript}</span>}
              </div>
            ) : (
              <div style={{fontSize:12,color:TEXT.faint,fontStyle:"italic"}}>
                {phase==="recording" ? "Escuchando…" : "(sin transcripción)"}
              </div>
            )}
          </div>
        )}

        {/* ── No API key warning (idle) */}
        {phase==="idle"&&!(localStorage.getItem("myo_groq_key")||"").trim()&&(
          <div style={{background:"#f7c94810",border:"1px solid #f7c94840",borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:11,color:"#f7c948",lineHeight:1.5}}>
            ⚠️ Sin clave API — la transcripción IA no funcionará.<br/>
            <span style={{color:TEXT.faint}}>Ve a ⚙️ Ajustes → IA / Transcripción.</span>
          </div>
        )}

        {/* ── API error / debug panel */}
        {(apiError || apiRaw) && phase==="done" && (
          <div style={{background:"#0d1520",border:`1px solid ${apiError?"#f97676":"#f7c94840"}`,borderRadius:10,padding:"10px 12px",marginBottom:14,maxHeight:160,overflow:"auto"}}>
            {apiError&&(
              <div style={{fontSize:11,color:"#f97676",fontWeight:600,marginBottom:apiRaw?6:0,lineHeight:1.4}}>
                ⚠️ {apiError}
              </div>
            )}
            {apiRaw&&(
              <>
                <div style={{fontSize:9,color:TEXT.faint,fontWeight:700,letterSpacing:.8,marginBottom:3}}>RAW API RESPONSE</div>
                <pre style={{fontSize:9,color:TEXT.secondary,whiteSpace:"pre-wrap",wordBreak:"break-all",margin:0}}>
                  {apiRaw}
                </pre>
              </>
            )}
          </div>
        )}

        {/* ── Actions */}
        <div style={{display:"flex",gap:8}}>
          <button
            style={{flex:1,background:"#f9767612",border:"1px solid #f9767630",color:"#f97676",padding:"10px",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:500}}
            onClick={onClose}
          >
            Cancelar
          </button>
          {phase==="done"&&(
            <button
              style={{flex:2,background:audioB64?`${ACCENT}22`:"#1a2a5a",border:`1px solid ${audioB64?ACCENT+"55":"#1a2a5a"}`,color:audioB64?ACCENT:TEXT.faint,padding:"10px",borderRadius:10,cursor:audioB64?"pointer":"default",fontSize:13,fontFamily:"inherit",fontWeight:700,transition:"all .2s"}}
              onClick={audioB64?handleSave:undefined}
            >
              💾 Guardar en nota
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SEARCH
function SearchScreen({ notes, searchQuery, setSearchQuery, onEdit, onBack }) {
  const results=searchQuery.length>1?notes.filter(n=>{
    const q=searchQuery.toLowerCase();
    const checklistText=(n.checklist||[]).map(c=>c.text).join(" ").toLowerCase();
    return n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)||n.tags.some(t=>t.includes(q))||checklistText.includes(q);
  }):[];
  return (
    <div style={{minHeight:"100vh"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",position:"sticky",top:0,...G.glass,borderBottom:`1px solid ${ACCENT}15`,zIndex:50}}>
        <button style={{background:"#f9767618",border:"1px solid #f9767630",cursor:"pointer",padding:"6px 9px",borderRadius:10,fontSize:18,lineHeight:1}} onClick={onBack}>✕</button>
        <input autoFocus style={{flex:1,background:"#00003a",border:`1px solid ${ACCENT}30`,color:TEXT.primary,padding:"10px 14px",borderRadius:24,fontSize:TYPE.body.fontSize,fontFamily:"inherit",outline:"none"}} value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="🔍 Buscar en todas las notas..." />
      </div>
      {searchQuery.length<2&&<div style={{textAlign:"center",color:"#6A8CC0",fontSize:13,padding:40}}>Escribe al menos 2 caracteres</div>}
      {searchQuery.length>=2&&results.length===0&&<div style={{textAlign:"center",color:"#6A8CC0",fontSize:13,padding:40}}>Sin resultados para "{searchQuery}"</div>}
      <div style={{padding:"10px 12px 90px"}}>
        {results.map((n,i)=>(
          <div key={n.id} className="anim-card hover-lift" style={{...G.glass,...G.card,display:"flex",alignItems:"center",gap:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",borderLeft:`3px solid ${ACCENT}`,animationDelay:`${i*30}ms`}} onClick={()=>onEdit(n)}>

              <div style={{fontSize:TYPE.title.fontSize,fontWeight:TYPE.title.fontWeight,color:TEXT.primary}}>{n.title}</div>
              <div className="list-preview">{getPreview(n, 70)}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── SETTINGS
function SettingsScreen({ stats, allTags, onBack }) {
  const [installable, setInstallable] = React.useState(!!window.__pwaInstallPrompt);
  const [installed, setInstalled] = React.useState(false);
  const [apiKey, setApiKey] = React.useState(() => localStorage.getItem("myo_groq_key") || "");
  const [apiKeySaved, setApiKeySaved] = React.useState(false);

  const saveApiKey = (val) => {
    const trimmed = val.trim();
    localStorage.setItem("myo_groq_key", trimmed);
    setApiKey(trimmed);
    setApiKeySaved(true);
    setTimeout(() => setApiKeySaved(false), 2000);
  };

  React.useEffect(() => {
    const check = () => setInstallable(!!window.__pwaInstallPrompt);
    const interval = setInterval(check, 800);
    window.addEventListener('appinstalled', () => { setInstalled(true); setInstallable(false); });
    return () => clearInterval(interval);
  }, []);

  const handleInstall = async () => {
    const prompt = window.__pwaInstallPrompt;
    if (!prompt) return;
    prompt.prompt();
    const { outcome } = await prompt.userChoice;
    if (outcome === 'accepted') {
      window.__pwaInstallPrompt = null;
      setInstallable(false);
      setInstalled(true);
    }
  };
  return (
    <div style={{paddingBottom:40}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",borderBottom:`1px solid ${ACCENT}15`,...G.glass,position:"sticky",top:0,zIndex:50}}>
        <button style={{background:"#6feab122",border:"1px solid #6feab155",cursor:"pointer",padding:"7px 14px",borderRadius:10,fontSize:14,lineHeight:1,color:"#6feab1",fontWeight:700,display:"flex",alignItems:"center",gap:5}} onClick={onBack}>
          ← Volver
        </button>
        <span style={{color:"#e0e8ff",fontSize:16,fontWeight:700}}>⚙️ Configuración</span>
        <div style={{width:80}} />
      </div>
      <div style={{padding:"16px 14px"}}>
        {[{title:"📊 Estadísticas",rows:Object.entries(stats).map(([k,v])=>({l:k,r:String(v),rc:ACCENT}))},{title:"🔒 Privacidad",rows:[{l:"Bloqueo biométrico",r:"Configurar"},{l:"Cifrado E2E",r:"Activo",rc:"#6feab1"}]}].map((sec,i)=>(
          <div key={i} style={{...G.glass,...G.card,padding:"14px 16px",marginBottom:12}} className="anim-card">
            <div style={{fontSize:12,fontWeight:700,color:ACCENT,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{sec.title}</div>
            {sec.rows.map((r,j)=>(
              <div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${ACCENT}08`}}>
                <span style={{color:TEXT.secondary,fontSize:TYPE.title.fontSize,fontWeight:TYPE.body.fontWeight}}>{r.l}</span>
                <span style={{color:r.rc||TEXT.muted,fontSize:TYPE.label.fontSize,fontWeight:TYPE.label.fontWeight}}>{r.r}</span>
              </div>
            ))}
          </div>
        ))}
        {(installable || installed) && (
          <div style={{...G.glass,...G.card,padding:"14px 16px",marginBottom:12}} className="anim-card">
            <div style={{fontSize:12,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>📲 Instalar App</div>
            {installed ? (
              <div style={{color:"#6feab1",fontSize:14,fontWeight:600}}>✅ ¡notapp instalada correctamente!</div>
            ) : (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:TEXT.secondary,fontSize:TYPE.title.fontSize,fontWeight:TYPE.body.fontWeight}}>Añadir a pantalla de inicio</span>
                <button
                  style={{background:"#a78bfa22",border:"1px solid #a78bfa55",cursor:"pointer",padding:"7px 14px",borderRadius:10,color:"#a78bfa",fontFamily:"inherit",fontSize:13,fontWeight:700,transition:"all .18s"}}
                  onClick={handleInstall}
                >Instalar 📲</button>
              </div>
            )}
          </div>
        )}
        {!installable && !installed && (
          <div style={{...G.glass,...G.card,padding:"14px 16px",marginBottom:12,opacity:.7}} className="anim-card">
            <div style={{fontSize:12,fontWeight:700,color:TEXT.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📲 Instalar App</div>
            <div style={{color:TEXT.muted,fontSize:12,lineHeight:1.5}}>
              Para instalar: abre esta página en <b style={{color:TEXT.secondary}}>Chrome Android</b>, espera unos segundos y vuelve aquí, o usa el menú ⋮ → "Añadir a pantalla de inicio".
            </div>
          </div>
        )}
          <div style={{...G.glass,...G.card,padding:"14px 16px",marginBottom:12}} className="anim-card">
            <div style={{fontSize:12,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>🎙 IA / Transcripción</div>
            <div style={{fontSize:11,color:TEXT.faint,lineHeight:1.6,marginBottom:10}}>
              Transcripción con <strong>Groq Whisper</strong> — gratis, sin tarjeta, 7200 req/día:<br/>
              <a href="https://console.groq.com/keys" target="_blank" style={{color:"#a78bfa",textDecoration:"none"}}>console.groq.com → API Keys</a>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input
                type="password"
                placeholder="gsk_..."
                value={apiKey}
                onChange={e=>setApiKey(e.target.value)}
                style={{
                  flex:1, background:"#0a1120", border:`1px solid ${apiKey?"#a78bfa55":"#1a2a5a"}`,
                  borderRadius:8, padding:"8px 10px", color:TEXT.primary, fontFamily:"JetBrains Mono,monospace",
                  fontSize:11, outline:"none"
                }}
                onKeyDown={e=>{ if(e.key==="Enter") saveApiKey(apiKey); }}
              />
              <button
                style={{background:apiKeySaved?"#6feab122":"#a78bfa22",border:`1px solid ${apiKeySaved?"#6feab1":"#a78bfa55"}`,color:apiKeySaved?"#6feab1":"#a78bfa",padding:"8px 12px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700,whiteSpace:"nowrap",transition:"all .2s"}}
                onClick={()=>saveApiKey(apiKey)}
              >
                {apiKeySaved ? "✅ OK" : "Guardar"}
              </button>
            </div>
            {apiKey&&<div style={{fontSize:10,color:"#6feab1",marginTop:6}}>✓ Groq configurado · {apiKey.slice(0,8)}…</div>}
            {!apiKey&&<div style={{fontSize:10,color:"#f7c948",marginTop:6}}>Sin clave — transcripción IA desactivada</div>}
          </div>

          <div style={{...G.glass,...G.card,padding:"14px 16px"}} className="anim-card">
            <div style={{fontSize:12,fontWeight:700,color:ACCENT,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>🏷 Etiquetas activas</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{allTags.map(t=><span key={t} className="tag-chip">#{t}</span>)}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── HOME SCREEN WRAPPER
function HomeScreen({ notes, allNotes, stats, view, setView, activeTab, setActiveTab, allTags, filterTag, setFilterTag, sortBy, setSortBy, onEdit, onPin, onArchive, onDelete, onPermanentDelete, onRestoreDeleted, onCreate }) {
  const VIEWS=[
    {id:"dashboard", label:"Inicio",    emoji:"🏠", color:ACCENT},
    {id:"analytics", label:"Analytics", emoji:"📊", color:"#f7c948"},
    {id:"grid",      label:"Tarjetas",  emoji:"🗂",  color:"#a78bfa"},
    {id:"list",      label:"Listas",    emoji:"📋", color:"#34d399"},
    {id:"kanban",    label:"Kanban",    emoji:"🗃",  color:"#f97676"},
    {id:"pinned",    label:"Fijadas",   emoji:"📌", color:"#fb923c"},
    {id:"calendar",  label:"Agenda",    emoji:"📅", color:"#6feab1"},
    {id:"map",       label:"Mapa",      emoji:"🧠", color:"#38bdf8"},
  ];
  const SORTS=[
    {id:"updated", emoji:"🕐", label:"Reciente"},
    {id:"created", emoji:"✨", label:"Creación"},
    {id:"alpha",   emoji:"🔤", label:"A – Z"},
  ];
  const ROW1 = VIEWS.slice(0,5);
  const ROW2 = VIEWS.slice(5); // 3 views: fijadas, agenda, mapa
  const TABS=[{id:"all",label:"🗒 Todas"},{id:"pinned",label:"📌 Fijadas"},{id:"archived",label:"📦 Archivadas"},{id:"locked",label:"🔒 Privadas"},{id:"deleted",label:"🗑 Papelera",count:stats.deleted}];

  const r1Idx = ROW1.findIndex(v=>v.id===view);
  const r2Idx = ROW2.findIndex(v=>v.id===view);
  const currentSort = SORTS.find(s=>s.id===sortBy)||SORTS[0];
  const cycleSort = () => { const i=SORTS.findIndex(s=>s.id===sortBy); setSortBy(SORTS[(i+1)%SORTS.length].id); };

  // Row 2 has 4 slots total (3 views + 1 sort), laser width = 25%
  const laserR2Style = r2Idx>=0 ? {
    left:`${r2Idx*25}%`, width:"25%",
    background:ROW2[r2Idx].color,
    boxShadow:`0 0 10px ${ROW2[r2Idx].color}, 0 0 22px ${ROW2[r2Idx].color}50`,
  } : {width:0};

  const laserR1Style = r1Idx>=0 ? {
    left:`${r1Idx*(100/ROW1.length)}%`,
    width:`${100/ROW1.length}%`,
    background:ROW1[r1Idx].color,
    boxShadow:`0 0 10px ${ROW1[r1Idx].color}, 0 0 22px ${ROW1[r1Idx].color}50`,
  } : {width:0};

  return (
    <div style={{paddingBottom:0}}>
      {/* Row 1 — 5 views */}
      <div className="lbar-row lbar-r1">
        {ROW1.map(v=>(
          <div key={v.id} className={`lbar-it${view===v.id?" lbar-on":""}`} style={{"--lc":v.color}} onClick={()=>setView(v.id)}>
            <span className="lbar-em">{v.emoji}</span>
            <span className="lbar-lb">{v.label}</span>
          </div>
        ))}
        <div className="lbar-laser" style={laserR1Style} />
      </div>

      {/* Row 2 — 3 views + sort cell */}
      <div className="lbar-row">
        {ROW2.map(v=>(
          <div key={v.id} className={`lbar-it${view===v.id?" lbar-on":""}`} style={{"--lc":v.color}} onClick={()=>setView(v.id)}>
            <span className="lbar-em">{v.emoji}</span>
            <span className="lbar-lb">{v.label}</span>
          </div>
        ))}
        {/* Sort cycling cell */}
        <div className="lbar-it lbar-sort" onClick={cycleSort} title="Cambiar orden">
          <span className="lbar-em" style={{fontSize:16,transition:"transform .3s",transform:sortBy==="alpha"?"rotate(0deg)":sortBy==="created"?"rotate(120deg)":"rotate(240deg)"}}>{currentSort.emoji}</span>
          <span className="lbar-lb">{currentSort.label}</span>
        </div>
        <div className="lbar-laser" style={laserR2Style} />
      </div>

      {/* Tabs */}
      {view!=="dashboard"&&view!=="analytics"&&view!=="kanban"&&view!=="calendar"&&view!=="map"&&(
        <div style={{display:"flex",gap:4,padding:"8px 10px",overflowX:"auto",borderBottom:`1px solid ${ACCENT}08`,alignItems:"center"}}>
          {TABS.map(t=>(
            <button key={t.id} style={{background:activeTab===t.id?(t.id==="deleted"?"#f9767618":`${ACCENT}18`):"none",border:`1px solid ${activeTab===t.id?(t.id==="deleted"?"#f9767640":ACCENT+"40"):"#1a2a5a30"}`,cursor:"pointer",color:activeTab===t.id?(t.id==="deleted"?"#f97676":ACCENT):"#8AACDC",padding:"5px 12px",borderRadius:20,fontSize:12,whiteSpace:"nowrap",transition:"all .18s",fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}} onClick={()=>setActiveTab(t.id)}>
              {t.label}{t.count>0&&<span style={{background:"#f97676",color:"#fff",borderRadius:10,padding:"0 5px",fontSize:10,fontWeight:700,lineHeight:"16px"}}>{t.count}</span>}
            </button>
          ))}
          {activeTab!=="deleted"&&allTags.length>0&&allTags.slice(0,4).map(t=>(
            <button key={t} style={{background:filterTag===t?`${ACCENT}18`:"none",border:`1px solid ${filterTag===t?ACCENT+"40":"#1a2a5a20"}`,cursor:"pointer",color:filterTag===t?ACCENT:"#8AACDC",padding:"5px 10px",borderRadius:20,fontSize:12,whiteSpace:"nowrap",transition:"all .15s",fontFamily:"inherit"}} onClick={()=>setFilterTag(filterTag===t?null:t)}>#{t}</button>
          ))}
        </div>
      )}

      {view==="dashboard"&&<DashboardView stats={stats} notes={notes} onEdit={onEdit} onCreate={onCreate} />}
      {view==="analytics"&&<AnalyticsDashboard notes={allNotes} />}
      {view==="grid"&&activeTab!=="deleted"&&<GridView notes={notes} onEdit={onEdit} onPin={onPin} onArchive={onArchive} onDelete={onDelete} />}
      {view==="grid"&&activeTab==="deleted"&&<TrashView notes={notes} onRestore={onRestoreDeleted} onPermanentDelete={onPermanentDelete} />}
      {view==="list"&&activeTab!=="deleted"&&<ListView notes={notes} onEdit={onEdit} onPin={onPin} onArchive={onArchive} onDelete={onDelete} />}
      {view==="list"&&activeTab==="deleted"&&<TrashView notes={notes} onRestore={onRestoreDeleted} onPermanentDelete={onPermanentDelete} />}
      {view==="kanban"&&<KanbanView notes={notes} onEdit={onEdit} onCreate={onCreate} />}
      {view==="pinned"&&<GridView notes={notes.filter(n=>n.pinned)} onEdit={onEdit} onPin={onPin} onArchive={onArchive} onDelete={onDelete} />}
      {view==="calendar"&&<CalendarView notes={notes} onEdit={onEdit} />}
      {view==="map"&&<MindMapView notes={notes} onEdit={onEdit} />}
    </div>
  );
}

// ── MAIN APP
function SplashScreen({ onDone }) {
  const [phase, setPhase] = React.useState(0); // 0=enter, 1=hold, 2=exit
  React.useEffect(() => {
    const t1 = setTimeout(() => setPhase(1), 150);
    const t2 = setTimeout(() => setPhase(2), 2400);
    const t3 = setTimeout(() => onDone(), 2900);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, []);

  // Elegant particle dots
  const particles = React.useMemo(() => Array.from({length:12}, (_,i) => ({
    id: i,
    angle: (i / 12) * 360,
    delay: i * 60,
    size: i % 3 === 0 ? 5 : i % 3 === 1 ? 3 : 2,
    color: ["#00f0ff","#7c3aed","#6feab1","#f7c948"][i % 4],
    dist: 80 + (i % 3) * 20,
  })), []);

  return (
    <div style={{
      position:"fixed", inset:0,
      background:"radial-gradient(ellipse at 50% 45%, #0a1628 0%, #050a10 70%)",
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      zIndex:9999,
      opacity: phase===2 ? 0 : 1,
      transform: phase===2 ? "scale(1.04)" : "scale(1)",
      transition: phase===2 ? "opacity 0.5s ease, transform 0.5s ease" : "opacity 0.3s ease"
    }}>
      {/* Ambient glow ring */}
      <div style={{
        position:"absolute",
        width: phase===1 ? 260 : 100,
        height: phase===1 ? 260 : 100,
        borderRadius:"50%",
        background:"radial-gradient(circle, #00f0ff12 0%, transparent 70%)",
        transition:"all 1.2s cubic-bezier(.16,1,.3,1) 0.1s",
        pointerEvents:"none"
      }}/>

      {/* Orbit particles */}
      {particles.map(p => {
        const rad = (p.angle * Math.PI) / 180;
        const x = Math.cos(rad) * p.dist;
        const y = Math.sin(rad) * p.dist;
        return (
          <div key={p.id} style={{
            position:"absolute",
            width: p.size, height: p.size,
            borderRadius:"50%",
            background: p.color,
            boxShadow: `0 0 ${p.size*2}px ${p.color}`,
            transform: phase===1
              ? `translate(${x}px, ${y}px) scale(1)`
              : `translate(0px, 0px) scale(0)`,
            opacity: phase===1 ? 0.85 : 0,
            transition: `all 0.9s cubic-bezier(.34,1.2,.64,1) ${0.1 + p.delay/1000}s`,
            pointerEvents:"none"
          }}/>
        );
      })}

      {/* Icon container */}
      <div style={{
        position:"relative",
        transform: phase===1 ? "scale(1) translateY(0)" : "scale(0.3) translateY(40px)",
        opacity: phase===1 ? 1 : 0,
        transition: "all 0.8s cubic-bezier(.34,1.3,.64,1) 0.05s",
      }}>
        {/* Glowing border ring */}
        <div style={{
          position:"absolute", inset:-3, borderRadius:34,
          background: phase===1
            ? "linear-gradient(135deg, #00f0ff60, #7c3aed40, #6feab140)"
            : "transparent",
          transition:"all 1s ease 0.3s",
          zIndex:0,
        }}/>
        <img
          src={ICON_SRC}
          style={{
            position:"relative", zIndex:1,
            width:114, height:114, borderRadius:30,
            objectFit:"cover", display:"block",
            boxShadow: phase===1
              ? "0 0 0 1px #00f0ff30, 0 8px 40px #00f0ff40, 0 0 80px #7c3aed30"
              : "none",
            transition:"box-shadow 0.8s ease 0.2s",
          }}
        />
      </div>

      {/* App name */}
      <div style={{
        marginTop: 32,
        opacity: phase===1 ? 1 : 0,
        transform: phase===1 ? "translateY(0)" : "translateY(20px)",
        transition: "all 0.7s cubic-bezier(.16,1,.3,1) 0.35s",
        textAlign:"center"
      }}>
        <div style={{
          fontSize: 52,
          color: "#00f0ff",
          textShadow: "0 0 24px #00f0ffcc, 0 0 60px #00f0ff50",
          fontFamily: "'Fredericka the Great', serif",
          lineHeight: 1.1,
          letterSpacing: 3,
        }}>notapp</div>
        {/* Subtitle tagline */}
        <div style={{
          marginTop: 8,
          fontSize: 12,
          color: "#00f0ff55",
          letterSpacing: 4,
          textTransform:"uppercase",
          fontWeight: 400,
          opacity: phase===1 ? 1 : 0,
          transition:"opacity 0.6s ease 0.6s",
        }}>tu segundo cerebro</div>
      </div>

      {/* Bottom progress line */}
      <div style={{
        position:"absolute", bottom: 60,
        width: 120, height: 2,
        background:"#00f0ff18",
        borderRadius: 2,
        overflow:"hidden",
      }}>
        <div style={{
          height:"100%",
          background:"linear-gradient(90deg, transparent, #00f0ff, transparent)",
          width: phase===1 ? "100%" : "0%",
          transition:"width 2s cubic-bezier(.4,0,.2,1) 0.3s",
        }}/>
      </div>
    </div>
  );
}

function MyoNotes() {
  const showSplash = false;
  const [notifPermission, setNotifPermission] = React.useState(
    (/iphone|ipad|ipod/i.test(navigator.userAgent) || typeof Notification === "undefined") ? "denied" : Notification.permission
  );
  const scheduledRef = useRef(new Set()); // track already-scheduled note ids

  // ── Request notification permission (once, after splash)
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const notifSupported = typeof Notification !== "undefined" && !isIOS;
  const requestNotifPermission = async () => {
    if (!notifSupported) return "denied";
    const perm = await Notification.requestPermission();
    setNotifPermission(perm);
    return perm;
  };

  // ── Schedule a notification via Service Worker message
  const scheduleNotif = React.useCallback(async (note) => {
    if (!note.reminder || scheduledRef.current.has(note.id)) return;
    const fireAt = new Date(note.reminder).getTime();
    const delay = fireAt - Date.now();
    if (delay < 0 || delay > 7 * 24 * 3600 * 1000) return; // only within 7 days

    let perm = notifPermission;
    if (perm === "default") perm = await requestNotifPermission();
    if (perm !== "granted") return;

    const sw = navigator.serviceWorker?.controller;
    if (!sw) return;

    sw.postMessage({
      type: "SCHEDULE_NOTIF",
      id: note.id,
      title: `🔔 ${note.icon || "📝"} ${note.title || "Nota sin título"}`,
      body: note.content ? note.content.slice(0, 100).replace(/[*_#\[\]]/g, "") : "Tienes un recordatorio pendiente",
      delay,
    });
    scheduledRef.current.add(note.id);
  }, [notifPermission]);

  // ── In-app reminder banner state
  const [dueReminders, setDueReminders] = React.useState([]);
  const [dismissedReminders, setDismissedReminders] = React.useState(new Set());

  // ── Polling engine: check reminders every 30s
  React.useEffect(() => {
    const check = () => {
      const now = Date.now();
      const due = notes.filter(n =>
        n.reminder &&
        !n.archived && !n.deleted &&
        !dismissedReminders.has(n.id) &&
        Math.abs(new Date(n.reminder).getTime() - now) < 30 * 60 * 1000 && // within ±30 min
        new Date(n.reminder).getTime() <= now + 5 * 60 * 1000  // fires up to 5min early
      );
      setDueReminders(due);

      // Schedule SW notifications for upcoming reminders
      notes.filter(n => n.reminder && !n.archived && !n.deleted)
           .forEach(n => scheduleNotif(n));
    };
    check();
    const t = setInterval(check, 30_000);
    return () => clearInterval(t);
  }, [notes, dismissedReminders, scheduleNotif]);

  // ── Ask permission after splash dismissal
  React.useEffect(() => {
    if (!showSplash && notifPermission === "default" && notifSupported) {
      setTimeout(requestNotifPermission, 1500);
    }
  }, [showSplash]);

  const [notes,setNotes]=useState(()=>{const s=loadNotes();return s.length?s:SAMPLES;});
  const [view,setView]=useState("dashboard");
  const [screen,setScreen]=useState("home");
  const [editingNote,setEditingNote]=useState(null);
  const [searchQuery,setSearchQuery]=useState("");
  const [activeTab,setActiveTab]=useState("all");
  const [sortBy,setSortBy]=useState("updated");
  const [filterTag,setFilterTag]=useState(null);
  const [toast,setToast]=useState(null);
  const [animIn,setAnimIn]=useState(true);
  const [clipboardUrl,setClipboardUrl]=useState(null);

  const persistNotes=(n)=>{setNotes(n);saveNotes(n);};
  const showToast=(msg,type="info")=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};
  
  const navigate=(s,v)=>{
    setAnimIn(false);
    setTimeout(()=>{if(s)setScreen(s);if(v)setView(v);setAnimIn(true);},160);
  };

  // Clipboard detection
  useEffect(()=>{
    const check=async()=>{
      try{
        if(!document.hasFocus())return;
        const text=await navigator.clipboard.readText();
        if(text&&(text.startsWith("http")||text.includes("youtube.com")||text.includes("youtu.be"))){
          setClipboardUrl(text.slice(0,200));
        }
      }catch{}
    };
    const t=setTimeout(check,1200);
    return()=>clearTimeout(t);
  },[]);

  const createNote=(prefill={})=>{
    const now2=Date.now();
    setEditingNote({id:String(now2),title:"",content:"",icon:"📝",color:"#0a1520",tags:[],pinned:false,archived:false,locked:false,checklist:[],reminder:null,kanbanCol:"Ideas",createdAt:now2,updatedAt:now2,drawings:[],audioClips:[],...prefill});
    navigate("editor");
  };

  const saveNote=(n)=>{
    const u={...n,updatedAt:Date.now()};
    const idx=notes.findIndex(x=>x.id===n.id);
    const arr=idx>=0?notes.map((x,i)=>i===idx?u:x):[u,...notes];
    persistNotes(arr);showToast("✅ Nota guardada");navigate("home");
  };
  const deleteNote=(id)=>{persistNotes(notes.map(n=>n.id===id?{...n,deleted:true,deletedAt:Date.now()}:n));showToast("🗑 Movida a papelera","warn");if(screen==="editor")navigate("home");};
  const permanentDelete=(id)=>{persistNotes(notes.filter(n=>n.id!==id));showToast("🗑 Eliminada definitivamente","warn");};
  const restoreDeleted=(id)=>{persistNotes(notes.map(n=>n.id===id?{...n,deleted:false,deletedAt:null}:n));showToast("♻️ Nota restaurada");};
  const togglePin=(id)=>persistNotes(notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));
  const toggleArchive=(id)=>persistNotes(notes.map(n=>n.id===id?{...n,archived:!n.archived}:n));

  const allTags=[...new Set(notes.flatMap(n=>n.tags))];
  const filtered=notes.filter(n=>{
    if(activeTab==="deleted") return n.deleted;
    if(n.deleted) return false;
    if(activeTab==="pinned"&&!n.pinned)return false;
    if(activeTab==="archived"&&!n.archived)return false;
    if(activeTab==="locked"&&!n.locked)return false;
    if(activeTab==="all"&&n.archived)return false;
    if(filterTag&&!n.tags.includes(filterTag))return false;
    if(searchQuery){const q=searchQuery.toLowerCase();const ck=(n.checklist||[]).map(c=>c.text).join(" ").toLowerCase();return n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)||n.tags.some(t=>t.includes(q))||ck.includes(q);}
    return true;
  }).sort((a,b)=>{if(sortBy==="alpha")return a.title.localeCompare(b.title);if(sortBy==="created")return b.createdAt-a.createdAt;return b.updatedAt-a.updatedAt;});

  const stats={total:notes.filter(n=>!n.archived&&!n.deleted).length,pinned:notes.filter(n=>n.pinned&&!n.deleted).length,withReminder:notes.filter(n=>n.reminder&&!n.deleted).length,archived:notes.filter(n=>n.archived&&!n.deleted).length,tags:allTags.length,deleted:notes.filter(n=>n.deleted).length};


  return (
    <div style={{fontFamily:"'Outfit',sans-serif",background:BASE,minHeight:"100vh",color:TEXT.primary,display:"flex",flexDirection:"column",position:"relative",overflowX:"hidden"}}>
      <style>{CSS}</style>

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:toast.type==="warn"?"#1a0011":"#00004d",color:"#e0e8ff",padding:"10px 20px",borderRadius:20,fontSize:13,zIndex:300,whiteSpace:"nowrap",boxShadow:`0 4px 20px ${ACCENT}30`,border:`1px solid ${ACCENT}30`}} className="anim-toast">{toast.msg}</div>
      )}

      {/* Clipboard snackbar */}
      {clipboardUrl&&screen==="home"&&(
        <ClipboardSnack url={clipboardUrl} onCreate={()=>{createNote({title:"Enlace guardado",content:clipboardUrl,icon:"🔗",tags:["enlace"]});setClipboardUrl(null);}} onDismiss={()=>setClipboardUrl(null)} />
      )}

      {/* Header */}
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",...G.glass,position:"sticky",top:0,zIndex:100,borderBottom:`1px solid ${ACCENT}18`}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <img src={ICON_SRC} style={{width:34,height:34,borderRadius:10,objectFit:"cover",boxShadow:`0 0 12px ${ACCENT}30`}} className="anim-glow" />
          <div style={{display:"flex",flexDirection:"column",lineHeight:1.1}}>
            <span style={{
              fontSize: 20,
              color: ACCENT,
              textShadow: `0 0 14px ${ACCENT}80`,
              fontFamily: "'Fredericka the Great', serif",
              letterSpacing: 1,
              lineHeight: 1
            }}>notapp</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <button style={{background:"#f9767618",border:"1px solid #f9767630",cursor:"pointer",padding:"6px 8px",borderRadius:10,transition:"all .18s",display:"flex",fontSize:18,lineHeight:1}} onClick={()=>navigate("audio")} title="Modo Audio">
            🎙️
          </button>
          <button style={{background:"#f7c94818",border:"1px solid #f7c94830",cursor:"pointer",padding:"6px 8px",borderRadius:10,transition:"all .18s",display:"flex",fontSize:18,lineHeight:1}} onClick={()=>navigate("workflows")} title="Workflows / Automatizaciones">
            ⚡
          </button>
          <button style={{background:`${ACCENT}14`,border:`1px solid ${ACCENT}28`,cursor:"pointer",padding:"6px 8px",borderRadius:10,transition:"all .18s",display:"flex",fontSize:18,lineHeight:1}} onClick={()=>navigate("search")} title="Buscar notas">
            🔍
          </button>
          <button style={{background:"#a78bfa18",border:"1px solid #a78bfa30",cursor:"pointer",padding:"6px 8px",borderRadius:10,transition:"all .18s",display:"flex",fontSize:18,lineHeight:1}} onClick={()=>navigate("settings")} title="Ajustes">
            ⚙️
          </button>
        </div>
      </header>

      {/* ── IN-APP REMINDER BANNERS */}
      {dueReminders.filter(n=>!dismissedReminders.has(n.id)).map(n=>(
        <div key={n.id} style={{
          margin:"6px 10px 0",
          background:"linear-gradient(90deg,#f7c94818,#f7c94808)",
          border:"1px solid #f7c94855",
          borderRadius:12,
          padding:"10px 14px",
          display:"flex",alignItems:"center",gap:10,
          animation:"slideDown .3s ease",
          zIndex:50,position:"relative"
        }}>
          <span style={{fontSize:22,flexShrink:0}}>🔔</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:"#f7c948",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
              {n.icon} {n.title||"Nota sin título"}
            </div>
            <div style={{fontSize:11,color:TEXT.muted,marginTop:2}}>
              {new Date(n.reminder).toLocaleString("es",{weekday:"short",hour:"2-digit",minute:"2-digit"})}
              {n.content&&<span> · {n.content.slice(0,60).replace(/[*_#]/g,"")}{n.content.length>60?"…":""}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button
              style={{background:"#f7c94825",border:"1px solid #f7c94850",color:"#f7c948",fontSize:11,padding:"5px 10px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}
              onClick={()=>{ setEditingNote(n); }}
            >Ver</button>
            <button
              style={{background:"none",border:"1px solid #4A6494",color:TEXT.muted,fontSize:11,padding:"5px 8px",borderRadius:8,cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>setDismissedReminders(s=>new Set([...s,n.id]))}
            >✕</button>
          </div>
        </div>
      ))}

      {/* ── NOTIFICATION PERMISSION NUDGE (if denied/default) */}
      {!showSplash && notifPermission !== "granted" && dueReminders.length === 0 && notes.some(n=>n.reminder&&!n.archived&&!n.deleted) && (
        <div style={{
          margin:"6px 10px 0",
          background:"#00f0ff08",
          border:"1px solid #00f0ff25",
          borderRadius:10,
          padding:"8px 12px",
          display:"flex",alignItems:"center",gap:8
        }}>
          <span style={{fontSize:16}}>🔕</span>
          {isIOS ? (
            <span style={{flex:1,fontSize:11,color:TEXT.muted,lineHeight:1.5}}>
              En iOS, las notificaciones solo funcionan si instalas la app desde Safari (Compartir → Añadir a pantalla de inicio).
            </span>
          ) : (
            <>
              <span style={{flex:1,fontSize:11,color:TEXT.muted,lineHeight:1.5}}>
                Activa notificaciones para recibir tus recordatorios.
              </span>
              <button
                style={{background:`${ACCENT}20`,border:`1px solid ${ACCENT}40`,color:ACCENT,fontSize:11,padding:"5px 10px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontWeight:600,flexShrink:0}}
                onClick={requestNotifPermission}
              >Activar 🔔</button>
            </>
          )}
        </div>
      )}

      {/* Main content */}
      <div style={{flex:1,overflowY:"auto",scrollbarGutter:"stable",opacity:animIn?1:0,transform:animIn?"translateY(0)":"translateY(14px)",transition:"all .2s cubic-bezier(.4,0,.2,1)"}}>
        {screen==="home"&&<HomeScreen notes={filtered} allNotes={notes} stats={stats} view={view} setView={v=>navigate(null,v)} activeTab={activeTab} setActiveTab={setActiveTab} allTags={allTags} filterTag={filterTag} setFilterTag={setFilterTag} sortBy={sortBy} setSortBy={setSortBy} onEdit={n=>{setEditingNote({...n});navigate("editor");}} onPin={togglePin} onArchive={toggleArchive} onDelete={deleteNote} onPermanentDelete={permanentDelete} onRestoreDeleted={restoreDeleted} onCreate={createNote} />}
        {screen==="editor"&&editingNote&&<EditorScreen note={editingNote} setNote={setEditingNote} onSave={saveNote} onDelete={deleteNote} onArchive={toggleArchive} onBack={()=>navigate("home")} showToast={showToast} allNotes={notes} />}
        {screen==="search"&&<SearchScreen notes={notes} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onEdit={n=>{setEditingNote({...n});navigate("editor");}} onBack={()=>navigate("home")} />}
        {screen==="settings"&&<SettingsScreen stats={stats} allTags={allTags} onBack={()=>navigate("home")} />}
        {screen==="audio"&&<AudioMode notes={notes} onBack={()=>navigate("home")} showToast={showToast} />}
        {screen==="workflows"&&<WorkflowsScreen notes={notes} onBack={()=>navigate("home")} showToast={showToast} />}
      </div>

      {/* FAB */}
      {screen==="home"&&<FabMenu onCreate={createNote} onAudio={()=>navigate("audio")} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MyoNotes />);
  </script>
</body>
